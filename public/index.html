  </style>
  <div class="section-head"><h2>맞춤 교육 과정</h2><span class="muted">역할별 단계별 학습 → 퀴즈 만점 시 이수 (${esc(userName(curUser()))} · ${myDone}/${PROGRAMS.length} 이수)</span></div>

let _quizState=null;
function startProgram(pid){
  const p=progOf(pid);
  DB.started=DB.started||[];
  if(!DB.started.some(s=>s.program===pid&&s.user===curUser())){ DB.started.push({program:pid,user:curUser(),at:nowTs()}); save(); }
  const steps=p.steps.map((s,i)=>`
    <div class="step-row">
      <div class="step-num">${i+1}</div>
      <div style="flex:1">
        <div style="font-weight:700;font-size:13.5px">${esc(s.t)}</div>
        <div class="muted" style="font-size:12.3px;margin:2px 0 6px">${esc(s.o)}</div>
        <button class="btn sm" onclick="openStep('${pid}',${i})">📖 자료 열기</button>
      </div>
    </div>`).join("");
  openModal(`${p.icon} ${esc(p.title)}`, `
    <div class="muted" style="margin-bottom:12px">${esc(p.target)} · ${esc(p.time)} · ${p.steps.length}단계 학습 후 퀴즈</div>
    <h4 style="margin:0 0 8px">단계별 학습</h4>${steps}
    <div id="quizArea"></div>
  `, `<button class="btn pri" onclick="buildQuiz('${pid}')">퀴즈 시작 →</button><button class="btn" onclick="closeModal()">닫기</button>`);
}
function openStep(pid,i){
  const s=progOf(pid).steps[i];
  closeModal();
  if(s.ref.type==="viewer"){ const d=DB.documents.find(x=>x.docNo===s.ref.doc)||DB.documents[0]; if(d){ setViewerDoc(d.id); nav("viewer"); if(s.ref.kw){ setTimeout(()=>{ const inp=document.getElementById("vwrSearch"); if(inp){inp.value=s.ref.kw; viewerSearch(s.ref.kw);} },120);} } }
  else if(s.ref.type==="visual"){ nav("visuals"); setTimeout(()=>scrollVis(s.ref.id),120); }
  else if(s.ref.type==="tab"){ openTab(s.ref.hub,s.ref.tab); }
}
function getQuiz(pid){ return (DB.quizzes&&DB.quizzes[pid]&&DB.quizzes[pid].length)?DB.quizzes[pid]:progOf(pid).quiz; }
function buildQuiz(pid){
  const quiz=getQuiz(pid); _quizState={pid,answers:{}};
  const qs=quiz.map((q,qi)=>`
    <div class="qz-q" id="qz_${qi}">
      <div class="qq">Q${qi+1}. ${esc(q.q)}</div>
      ${q.c.map((c,ci)=>`<label class="qz-c"><input type="radio" name="q${qi}" value="${ci}" onchange="_quizState.answers[${qi}]=${ci}"> ${esc(c)}</label>`).join("")}
    </div>`).join("");
  document.getElementById("quizArea").innerHTML=`<h4 style="margin:16px 0 8px">이수 퀴즈 (${quiz.length}문항 · 만점 시 이수)</h4>${qs}<div id="quizResult"></div>`;
  document.querySelector(".mf").innerHTML=`<button class="btn pri" onclick="gradeQuiz()">채점·제출</button><button class="btn" onclick="closeModal()">닫기</button>`;
  document.querySelector(".mb").scrollTop=document.querySelector(".mb").scrollHeight;
}
function gradeQuiz(){
  const p=progOf(_quizState.pid); const quiz=getQuiz(_quizState.pid); let correct=0;
  quiz.forEach((q,qi)=>{
    const box=document.getElementById("qz_"+qi); const chosen=_quizState.answers[qi];
    box.querySelectorAll(".qz-c").forEach((lb,ci)=>{ lb.classList.remove("correct","wrong"); if(ci===q.a)lb.classList.add("correct"); else if(ci===chosen)lb.classList.add("wrong"); });
    if(!box.querySelector(".qz-e")){ const e=document.createElement("div"); e.className="qz-e"; e.textContent="해설: "+q.e; box.appendChild(e); }
    if(chosen===q.a)correct++;
  });
  const total=quiz.length; const pass=correct===total;
  const res=document.getElementById("quizResult");
  res.innerHTML=`<div class="alert ${pass?'i':'w'}" style="margin-top:12px"><span class="ai">${pass?'✅':'✍'}</span><div><b>${correct}/${total} 정답</b> — ${pass?'만점입니다! 교육 이수로 기록합니다.':'만점이 아니면 이수되지 않습니다. 해설을 확인하고 다시 시도하세요.'}</div></div>`;
  if(pass){
    if(!progDone(_quizState.pid)){
      DB.progress.push({program:_quizState.pid,user:curUser(),at:nowTs(),score:correct+"/"+total});
      DB.trainings.push({id:uid("tr"),docId:null,program:p.title,version:"-",assignee:curUser(),type:"과정이수",assignedAt:today(),due:today(),completedAt:today(),signed:true,score:100,passed:true});
      logAudit("교육 과정 이수(만점)",p.title);
      save();
    }

  const quiz=getQuiz(pid); const q=(qi!=null)?quiz[qi]:{q:"",c:["","","",""],a:0,e:""};

function saveQuizItem(pid,qi){
  const store=ensureQuizStore(pid);
  const c=[0,1,2,3].map(i=>document.getElementById("qiC"+i).value.trim());
  const qtext=document.getElementById("qiQ").value.trim();
  const aEl=document.querySelector('input[name="qiA"]:checked'); const a=aEl?parseInt(aEl.value):0;
  if(!qtext){alert("질문을 입력하세요.");return;}
  const filled=c.filter(x=>x); if(filled.length<2){alert("보기를 2개 이상 입력하세요.");return;}
  if(!c[a]){alert("정답으로 선택한 보기가 비어 있습니다.");return;}
  const item={q:qtext,c:c.filter((x,i)=>x||i<2),a,e:document.getElementById("qiE").value.trim()};
  // reindex answer if trailing empties trimmed (kept simple: keep 4 slots)
  item.c=c;
  if(qi===null||qi===undefined||qi==='null') store.push(item); else store[qi]=item;
  logAudit("퀴즈 문항 저장",progOf(pid).title); save(); manageQuiz(pid);

function genQuestions(docId,n){
  const cur=latestRev(docId); if(!cur) return [];
  const lines=mergeWrapped(cur.content.split("\n")).map(l=>l.trim()).filter(l=>l&&l.length>=12&&l.length<=150&&!isMajor(l));
  const out=[]; const numRe=/(\d+(?:\.\d+)?)\s?(mg\/dL|시간|일|년|회|%|SD|분)/; const seen=new Set();
  for(const l of lines){
    if(out.length>=n) break;
    const m=l.match(numRe); if(!m) continue;
    const val=m[1], unit=m[2], whole=m[0]; const num=parseFloat(val); if(seen.has(l))continue; seen.add(l);
    const set=[val]; [num*2,num/2,num+(num>=10?10:1),Math.max(0.1,num-(num>=10?10:1))].forEach(x=>{ const s=(Number.isInteger(x)?x:parseFloat(x.toFixed(1))).toString(); if(!set.includes(s))set.push(s); });
    const opts=set.slice(0,4); if(opts.length<3) continue;
    let choices=opts.map(o=>o+unit); let a=0;
    const target=out.length%choices.length; [choices[0],choices[target]]=[choices[target],choices[0]]; a=target;
    out.push({q:`다음 빈칸에 알맞은 값은?  “${l.replace(whole,"____")}”`, c:choices, a, e:`지침 원문: ${l}`, _draft:true});
  }
  return out;
}
function autoGenQuiz(pid){
  const docId=document.getElementById("genDoc").value;
  const drafts=genQuestions(docId,5);
  if(!drafts.length){ alert("이 지침서에서 자동 생성할 수치형 문항을 찾지 못했습니다. 다른 지침서를 선택하거나 직접 추가하세요."); return; }
  const store=ensureQuizStore(pid); drafts.forEach(d=>store.push(d));
  logAudit("퀴즈 자동 생성(초안)",progOf(pid).title+" +"+drafts.length); save();
  refreshQuizList(pid);
  alert(drafts.length+"개 초안 문항을 추가했습니다. 각 문항의 [편집]에서 보기·정답·표현을 검수·수정하세요.");
}

  const head=`<th>이름</th><th>직군</th>${PROGRAMS.map(p=>`<th style="text-align:center">${esc(p.icon)} ${esc(p.title.replace(/(과정|기본과정)$/,''))}</th>`).join("")}<th style="text-align:center">개별교육</th>`;
  const rows=users.map(u=>{
    const cells=PROGRAMS.map(p=>{ const done=userProgDone(u.id,p.id); return `<td style="text-align:center">${done?`<span class="chip c-ok" title="${userProgAt(u.id,p.id)||''}">✔</span>`:'<span class="chip c-grey">–</span>'}</td>`;}).join("");
    const tr=DB.trainings.filter(t=>t.assignee===u.id);
    const doneN=tr.filter(t=>t.completedAt).length, openN=tr.filter(t=>!t.completedAt).length, odN=tr.filter(overdue).length;
    const indiv=`<span class="chip ${odN?'c-bad':'c-blue'}">이수 ${doneN}${openN?` · 미이수 ${openN}`:''}${odN?` · 초과 ${odN}`:''}</span>`;
    return `<tr><td><b>${esc(u.name)}</b></td><td class="muted">${esc(u.short)}</td>${cells}<td style="text-align:center">${indiv}</td></tr>`;
  }).join("");
  // program completion summary
  const psum=PROGRAMS.map(p=>{ const n=users.filter(u=>userProgDone(u.id,p.id)).length; const pct=Math.round(n/users.length*100); return `<tr><td>${esc(p.icon)} <b>${esc(p.title)}</b></td><td>${n}/${users.length}명</td><td style="width:45%"><div class="bar"><i style="width:${pct}%;background:${pct>=80?'#1a8f5a':pct>=50?'#c47d0a':'#c0392b'}"></i></div></td><td>${pct}%</td></tr>`;}).join("");
  const totalDone=DB.progress.length, teamRate=Math.round(users.reduce((a,u)=>a+PROGRAMS.filter(p=>userProgDone(u.id,p.id)).length,0)/(users.length*PROGRAMS.length)*100);
  const overdueTotal=DB.trainings.filter(overdue).length;
  return `
  <div class="section-head no-print"><h2 style="font-size:17px">팀 교육 이수 현황</h2><span class="muted">관리자 리포트 · ${esc(DB.lab)}</span></div>
  <div class="grid g3" style="margin-bottom:16px">
    <div class="card kpi"><div class="label">팀 인원</div><div class="val">${users.length}<small>명</small></div><div class="sub">전문의 ${users.filter(u=>roleGroup(u.role)==='전문의').length} · 임상병리사 ${users.filter(u=>roleGroup(u.role)==='임상병리사').length}</div></div>
    <div class="card kpi"><div class="label">과정 이수 완료(연인원)</div><div class="val">${totalDone}<small>건</small></div><div class="sub">팀 평균 이수율 ${teamRate}%</div></div>
    <div class="card kpi"><div class="label">기한초과 미이수</div><div class="val" style="color:${overdueTotal?'#c0392b':'#1f3864'}">${overdueTotal}<small>건</small></div><div class="sub">개별 교육(숙지·술기)</div></div>
  </div>
  <div class="toolbar no-print"><button class="btn" onclick="printTeamReport()">🖨 리포트 인쇄</button><button class="btn" onclick="exportTeamCSV()">CSV 내보내기</button></div>
  <div class="card" style="margin-bottom:16px"><h3>맞춤 과정 이수 매트릭스</h3>
    <div class="tbl-wrap"><table><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>
    <div class="legend"><span><span class="chip c-ok">✔</span> 이수</span><span><span class="chip c-grey">–</span> 미이수</span></div>
  </div>
  <div class="card"><h3>과정별 이수율</h3><table><tbody>${psum}</tbody></table></div>`;
};
function printTeamReport(){
  const users=USERS;
  const head=`<th style="text-align:left;border-bottom:1px solid #999;padding:4px">이름</th><th style="text-align:left;border-bottom:1px solid #999;padding:4px">직군</th>${PROGRAMS.map(p=>`<th style="border-bottom:1px solid #999;padding:4px">${esc(p.title)}</th>`).join("")}`;
  const rows=users.map(u=>`<tr><td style="padding:4px">${esc(u.name)}</td><td style="padding:4px">${esc(u.short)}</td>${PROGRAMS.map(p=>`<td style="text-align:center;padding:4px">${userProgDone(u.id,p.id)?'✔ '+(userProgAt(u.id,p.id)||''):'–'}</td>`).join("")}</tr>`).join("");
  printContent("팀 교육 이수 현황 리포트",`<h1 class="pa-title">팀 교육 이수 현황</h1><div class="muted">${esc(DB.lab)} · 출력 ${nowTs()}</div><table style="width:100%;border-collapse:collapse;font-size:11px;margin-top:10px"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table>`);
}
function exportTeamCSV(){
  const users=USERS; const hdr=["이름","직군",...PROGRAMS.map(p=>p.title),"이수과정수"];
  const lines=[hdr.join(",")];
  users.forEach(u=>{ const cells=PROGRAMS.map(p=>userProgDone(u.id,p.id)?(userProgAt(u.id,p.id)||"이수"):"미이수"); const cnt=PROGRAMS.filter(p=>userProgDone(u.id,p.id)).length; lines.push([u.name,u.short,...cells,cnt].join(",")); });
  const blob=new Blob(["﻿"+lines.join("\n")],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="team_training_"+today()+".csv"; a.click();
  logAudit("팀 이수 현황 CSV 내보내기","");
}

/* ===== 승인 대기 개정본 (검토·승인 워크플로우) ===== */
function pendingApprovalDocs(){ return DB.documents.filter(d=>{ const r=latestRev(d.id); return r && !r.approveBy && d.status!=="사용중단"; }); }
V.approvals=function(){
  if(!canReview()) return `<div class="empty">이 목록은 전문의·파트장만 열람할 수 있습니다.</div>`;
  const pend=pendingApprovalDocs();
  if(!pend.length) return `<div class="empty">승인 대기 중인 개정본이 없습니다. ✔</div>`;
  const rows=pend.map(d=>{ const cur=latestRev(d.id);
    const reviewed=!!cur.reviewBy, approved=!!cur.approveBy;
    const needReview=!reviewed, needApprove=reviewed&&!approved&&canApprove();
    const st= needReview?'<span class="chip c-warn">검토 대기</span>':'<span class="chip c-blue">승인 대기</span>';
    return `<tr>
      <td><b>${esc(d.docNo)}</b><div class="muted">${esc(d.title)}</div></td>
      <td>v${esc(cur.version)}</td>
      <td>${esc(userName(cur.editor))}<div class="muted">${cur.date}</div></td>
      <td style="max-width:280px">${esc(cur.reason||'-')}</td>
      <td>${st}${reviewed?`<div class="muted">검토 ${esc(userName(cur.reviewBy.u))}</div>`:''}</td>
      <td class="row-actions">
        <button class="btn sm" onclick="openDoc('${d.id}')">열기·diff</button>
        ${needReview&&canReview()?`<button class="btn sm ok" onclick="signDoc('${d.id}','review')">검토 서명</button>`:''}
        ${needApprove?`<button class="btn sm ok" onclick="signDoc('${d.id}','approve')">승인·발효</button>`:''}
        ${reviewed&&!approved&&!canApprove()?'<span class="muted" style="font-size:11.5px">전문의 승인 대기</span>':''}
      </td></tr>`;
  }).join("");
  return `<div class="section-head no-print"><h2 style="font-size:17px">승인 대기 개정본 <span class="chip c-bad">${pend.length}</span></h2><span class="muted">검토·승인 워크플로우 (근거 08/21.210.460)</span></div>
    <div class="notice no-print">개정본을 <b>열기·diff</b>로 변경 내용을 확인한 뒤, 파트장은 <b>검토 서명</b>, 전문의는 <b>승인·발효</b>합니다. 승인 시 유효 최신본으로 전환되고 대상자 재숙지 교육이 자동 배정됩니다.</div>
    <div class="tbl-wrap"><table><thead><tr><th>문서</th><th>버전</th><th>수정자</th><th>사유</th><th>상태</th><th>작업</th></tr></thead><tbody>${rows}</tbody></table></div>`;
};

/* ================= SHELL ================= */
let currentView="dashboard";
const TITLES={dashboard:"대시보드",mypage:"마이페이지",viewer:"지침서 열람·검색",visuals:"시각 가이드",learn:"교육 과정",manage:"지침서 관리",quality:"인증·품질",settings:"설정"};
/* Hub (tabbed) views — consolidates related sub-views under one menu */
const HUBS={
  mypage:{title:"마이페이지",tabs:[{key:"mpProfile",label:"프로필"},{key:"mpLibrary",label:"나의 자료실"},{key:"mpProgress",label:"교육 이수중"},{key:"mpHistory",label:"이수 내역"}]},
  learn:{title:"교육 과정",tabs:[{key:"programs",label:"맞춤 교육 과정"},{key:"education",label:"지침서 숙지 점검"},{key:"training",label:"교육 이수 현황"},{key:"teamreport",label:"팀 이수 현황",admin:true}]},
  manage:{title:"지침서 관리",tabs:[{key:"documents",label:"지침서"},{key:"approvals",label:"승인 대기"},{key:"guidelines",label:"가이드라인"}]},
  quality:{title:"인증·품질",tabs:[{key:"accreditation",label:"인증 준비도"},{key:"survey",label:"실사 대응"},{key:"capa",label:"시정·예방(CAPA)"},{key:"indicators",label:"핵심지표"}]},
  settings:{title:"설정",tabs:[{key:"data",label:"데이터·설정"},{key:"audit",label:"감사로그"}]}
};
function hubTabs(hub){ return HUBS[hub].tabs.filter(t=>!t.admin||canReview()); }
function hubShell(hub){
  const h=HUBS[hub]; if(!DB._tab) DB._tab={}; const list=hubTabs(hub); let active=DB._tab[hub]||list[0].key;
  if(!list.some(t=>t.key===active)) active=list[0].key;
  const tabs=list.map(t=>`<button class="pill-tabs-btn ${t.key===active?'on':''}" onclick="showTab('${hub}','${t.key}')">${esc(t.label)}${t.admin?' 🔒':''}</button>`).join("");
  return `<div class="hub-tabs no-print">${tabs}</div><div id="hubBody"></div>`;
}
function showTab(hub,key){
  DB._tab=DB._tab||{}; DB._tab[hub]=key; save();
  const lbl=HUBS[hub].tabs.find(t=>t.key===key); const lblTxt=lbl?lbl.label+(lbl.admin?' 🔒':''):'';
  document.querySelectorAll(".hub-tabs .pill-tabs-btn").forEach(b=>b.classList.toggle("on",b.textContent===lblTxt));
  const body=document.getElementById("hubBody"); if(!body)return;
  body.innerHTML=V[key]();
  if(key==="survey"){const s=document.getElementById("surveyItem");if(s)renderSurvey(s.value);}
  if(key==="education"){const b=document.getElementById("eduBody");if(b)b.innerHTML=eduRender(DB._eduDoc);}
  if(key==="programs"){/* static */}
  window.scrollTo(0,0);
}
function render(){
  document.getElementById("content").innerHTML=V[currentView]();
  document.getElementById("viewTitle").textContent=TITLES[currentView]||"";
  if(HUBS[currentView]){ const a=(DB._tab&&DB._tab[currentView])||HUBS[currentView].tabs[0].key; showTab(currentView,a); }
  if(currentView==="viewer"){renderViewer();}
  updateBadges();
}
function updateBadges(){
  const setB=(id,n)=>{const el=document.getElementById(id);if(!el)return;if(n>0){el.textContent=n;el.style.display="";}else el.style.display="none";};
  setB("nb-learn",DB.trainings.filter(overdue).length);
  setB("nb-manage",DB.guidelines.filter(g=>g.status==="반영필요").length + (canReview()?pendingApprovalDocs().length:0));
  setB("nb-quality",DB.capa.filter(c=>c.status!=="완료"&&c.due<today()).length);
  setB("nb-mypage",DB.trainings.filter(t=>t.assignee===curUser()&&overdue(t)).length);
}
function nav(v){currentView=v;document.querySelectorAll("#nav a").forEach(a=>a.classList.toggle("active",a.dataset.view===v));render();window.scrollTo(0,0);}
function openTab(hub,key){ DB._tab=DB._tab||{}; DB._tab[hub]=key; nav(hub); }
/* hub view functions */
V.learn=()=>hubShell("learn"); V.manage=()=>hubShell("manage"); V.quality=()=>hubShell("quality"); V.settings=()=>hubShell("settings"); V.mypage=()=>hubShell("mypage");
function openModal(title,body,footer){
  document.getElementById("modal").innerHTML=`<div class="mh"><h3>${title}</h3><button class="x" onclick="closeModal()">×</button></div><div class="mb">${body}</div><div class="mf">${footer||''}</div>`;
  document.getElementById("overlay").classList.add("show");
}
function closeModal(){document.getElementById("overlay").classList.remove("show");}

/* ===== Auth / Login ===== */
function roleGroup(role){ return /전문의/.test(role)?"전문의":"임상병리사"; }
let _loginGroup="전문의", _loginSel=null;
function updateUserChip(){
  const u=USERS.find(x=>x.id===DB.curUser); const el=document.getElementById("userChip"); if(!el||!u)return;
  el.innerHTML=`<span class="av">${esc(u.name.slice(0,1))}</span><span><span class="nm">${esc(u.name)}</span> <span class="rl">${esc(u.role)}</span></span>`;
}
function showLogin(){ document.getElementById("loginGate").classList.remove("hidden"); renderLogin(); }
function renderLogin(){
  const groups=["전문의","임상병리사"];
  const list=USERS.filter(u=>roleGroup(u.role)===_loginGroup);
  if(!_loginSel||!list.some(u=>u.id===_loginSel))_loginSel=list[0]?list[0].id:null;
  document.getElementById("loginCard").innerHTML=`
    <div class="lg-logo">K‑<span>LabDoc</span></div>
    <div class="lg-sub">검사실 지침서 지식관리·업무지원 · 로그인</div>
    <div class="lg-roletabs">${groups.map(g=>`<button class="${g===_loginGroup?'on':''}" onclick="loginGroup('${g}')">${g==='전문의'?'👨‍⚕️ 전문의':'🔬 임상병리사'}</button>`).join("")}</div>
    <div class="lg-users">${list.map(u=>`<div class="lg-user ${u.id===_loginSel?'sel':''}" onclick="loginPick('${u.id}')"><span class="av">${esc(u.name.slice(0,1))}</span><div><div class="nm">${esc(u.name)}</div><div class="rl">${esc(u.role)}</div></div></div>`).join("")||'<div class="muted" style="text-align:center;padding:14px">해당 직군 사용자가 없습니다.</div>'}</div>
    <div class="lg-pin"><input id="lgPin" type="password" inputmode="numeric" maxlength="4" placeholder="PIN 4자리" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="lg-err" id="lgErr"></div>
    <button class="lg-btn" onclick="doLogin()">로그인</button>
    <div class="lg-hint">데모 PIN: <b>0000</b> · PIN은 마이페이지에서 변경할 수 있습니다.</div>`;
  setTimeout(()=>{const pin=document.getElementById("lgPin");if(pin)pin.focus();},50);
}
function loginGroup(g){ _loginGroup=g; _loginSel=null; renderLogin(); }
function loginPick(id){ _loginSel=id; renderLogin(); }
/* Railway 인증 연동: http(s)로 서버에서 제공되면 서버 인증, 로컬 파일(file:)이면 로컬 PIN 폴백 */
const KLAB_API = (location.protocol==='http:'||location.protocol==='https:') ? (location.origin + '/api') : null;
window.__klabToken = null;
async function serverLogin(id, pin){
  const r = await fetch(KLAB_API+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,pin})});
  if(!r.ok) return null;
  const d = await r.json(); window.__klabToken = d.token; return d.user;
}
async function doLogin(){
  const pinEl=document.getElementById("lgPin"); const errEl=document.getElementById("lgErr");
  const pin=((pinEl&&pinEl.value)||"").trim();
  if(!_loginSel){errEl.textContent="사용자를 선택하세요.";return;}
  if(KLAB_API){
    errEl.textContent="확인 중…";
    try{
      const u=await serverLogin(_loginSel,pin);
      if(!u){errEl.textContent="ID 또는 PIN이 올바르지 않습니다.";return;}
    }catch(e){ errEl.textContent="서버 연결 오류 — 잠시 후 다시 시도하세요."; return; }
  } else {
    const expect=(DB.pins&&DB.pins[_loginSel])||"0000";
    if(pin!==expect){errEl.textContent="PIN이 올바르지 않습니다.";return;}
  }
  DB.curUser=_loginSel; DB.session={user:_loginSel,at:nowTs()}; save(); logAudit("로그인",KLAB_API?"Railway 서버 인증":"로컬 인증");
  document.getElementById("loginGate").classList.add("hidden");
  updateUserChip(); currentView="dashboard"; nav("dashboard");
}
function logout(){ logAudit("로그아웃",""); window.__klabToken=null; DB.session={user:null}; save(); showLogin(); }

/* init */
load();
document.getElementById("labName").value=DB.lab||"";
document.getElementById("labName").addEventListener("input",e=>{DB.lab=e.target.value;save();});
document.getElementById("nav").addEventListener("click",e=>{const a=e.target.closest("a");if(a){e.preventDefault();nav(a.dataset.view);}});
document.getElementById("overlay").addEventListener("click",e=>{if(e.target.id==="overlay")closeModal();});
updateUserChip();
render();
if(!DB.session||!DB.session.user){ showLogin(); }
else { document.getElementById("loginGate").classList.add("hidden"); }
</script>
</body>
