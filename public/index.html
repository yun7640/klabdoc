<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-LabDoc · 진단검사실 지침서·인증 통합관리 대시보드</title>
<style>
:root{
  --navy:#1f3864; --blue:#2e5496; --blue2:#3a6bc4; --light:#eef3fb; --line:#dfe6f1;
  --ok:#1a8f5a; --okbg:#e3f6ec; --warn:#c47d0a; --warnbg:#fdf3e0; --bad:#c0392b; --badbg:#fbe9e7;
  --grey:#6b7688; --bg:#f4f6fb; --card:#ffffff; --ink:#20293a;
}
*{box-sizing:border-box}
body{margin:0;font-family:"Malgun Gothic","맑은 고딕","Apple SD Gothic Neo",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.55}
button{font-family:inherit;cursor:pointer}
a{color:var(--blue)}
.app{display:flex;min-height:100vh}
/* Sidebar */
.side{width:220px;background:linear-gradient(180deg,#1f3864,#152943);color:#dbe4f2;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0}
.brand{padding:18px 18px 12px;border-bottom:1px solid rgba(255,255,255,.12)}
.brand .logo{font-size:20px;font-weight:800;letter-spacing:.5px;color:#fff}
.brand .logo span{color:#8fb4ff}
.brand .sub{font-size:11px;color:#9fb2d4;margin-top:3px}
.nav{padding:10px 0;flex:1;overflow-y:auto}
.nav a{display:flex;align-items:center;gap:9px;padding:10px 18px;color:#c7d4ea;text-decoration:none;font-size:13.5px;border-left:3px solid transparent}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}
.nav a.active{background:rgba(143,180,255,.16);border-left-color:#8fb4ff;color:#fff;font-weight:700}
.nav a .ic{width:18px;text-align:center;font-size:15px}
.navgrp{font-size:10px;color:#7d93bd;text-transform:uppercase;letter-spacing:.6px;padding:12px 18px 4px;font-weight:700}
@media(max-width:900px){.navgrp{display:none}}
.nav .badge{margin-left:auto;background:#c0392b;color:#fff;border-radius:10px;font-size:10.5px;padding:1px 7px;font-weight:700}
.side .foot{padding:12px 16px;font-size:10.5px;color:#8298bd;border-top:1px solid rgba(255,255,255,.1)}
/* Main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{background:#fff;border-bottom:1px solid var(--line);padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:20}
.top h1{font-size:17px;margin:0;font-weight:800;color:var(--navy)}
.top .spacer{flex:1}
.top .role{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--grey)}
.top select,.top input{padding:6px 9px;border:1px solid var(--line);border-radius:7px;font-family:inherit;font-size:12.5px}
.content{padding:22px 24px;max-width:1180px;width:100%}
/* Cards & grid */
.grid{display:grid;gap:16px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:0 1px 2px rgba(20,40,80,.04)}
.card h3{margin:0 0 12px;font-size:14px;color:var(--navy);display:flex;align-items:center;gap:8px}
.card h3 .r{margin-left:auto;font-size:12px;font-weight:600}
.kpi{position:relative}
.kpi .label{font-size:12px;color:var(--grey);font-weight:600}
.kpi .val{font-size:30px;font-weight:800;color:var(--navy);margin-top:2px;line-height:1.1}
.kpi .val small{font-size:14px;color:var(--grey);font-weight:600}
.kpi .sub{font-size:11.5px;color:var(--grey);margin-top:4px}
.kpi .ic{position:absolute;right:14px;top:12px;font-size:22px;opacity:.25}
/* Progress */
.bar{height:9px;background:#eef1f6;border-radius:6px;overflow:hidden;margin-top:6px}
.bar > i{display:block;height:100%;border-radius:6px;background:var(--blue2)}
.ring{--p:0;width:120px;height:120px;border-radius:50%;background:conic-gradient(var(--blue2) calc(var(--p)*1%),#e7ecf4 0);display:flex;align-items:center;justify-content:center;margin:4px auto}
.ring > div{width:88px;height:88px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring b{font-size:24px;color:var(--navy)}
.ring small{font-size:10.5px;color:var(--grey)}
/* Tables */
table{width:100%;border-collapse:collapse;font-size:12.8px}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid #eef1f6;vertical-align:top}
th{background:#f7f9fc;color:#425067;font-weight:700;font-size:12px;position:sticky;top:0}
tbody tr:hover{background:#f9fbfe}
.tbl-wrap{overflow:auto;border:1px solid var(--line);border-radius:10px;background:#fff}
/* Chips */
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.c-ok{background:var(--okbg);color:var(--ok)} .c-warn{background:var(--warnbg);color:var(--warn)}
.c-bad{background:var(--badbg);color:var(--bad)} .c-grey{background:#eef1f6;color:#5a6577}
.c-blue{background:#e6effd;color:var(--blue)} .c-navy{background:var(--navy);color:#fff}
.cls{font-weight:800;border-radius:5px;padding:1px 6px;font-size:10.5px}
.cls-C{background:#fde2e2;color:#b0281f} .cls-R{background:#fdefd6;color:#a5680a} .cls-B{background:#e2ecfb;color:#2e5496}
/* Buttons */
.btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:7px 13px;border-radius:8px;font-size:12.5px;font-weight:600}
.btn:hover{background:#f3f6fb}
.btn.pri{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.pri:hover{background:var(--navy)}
.btn.ok{background:var(--ok);border-color:var(--ok);color:#fff}
.btn.sm{padding:4px 9px;font-size:11.5px}
.btn.gho{background:transparent}
.btn.danger{color:var(--bad);border-color:#f0c6c1}
.row-actions{display:flex;gap:6px;flex-wrap:wrap}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.toolbar .spacer{flex:1}
.section-head{display:flex;align-items:center;gap:12px;margin:0 0 6px}
.section-head h2{font-size:19px;margin:0;color:var(--navy)}
.muted{color:var(--grey);font-size:12.5px}
.pill-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.pill-tabs button{border:1px solid var(--line);background:#fff;border-radius:20px;padding:5px 14px;font-size:12.5px;color:#4a5568}
.pill-tabs button.on{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:700}
.hub-tabs{display:flex;gap:4px;border-bottom:2px solid var(--line);margin-bottom:18px;flex-wrap:wrap}
.pill-tabs-btn{border:none;background:none;padding:9px 16px;font-size:13.5px;color:#5a6577;font-weight:600;border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer}
.pill-tabs-btn:hover{color:var(--navy)}
.pill-tabs-btn.on{color:var(--navy);border-bottom-color:var(--blue);font-weight:800}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(18,30,55,.5);display:none;align-items:flex-start;justify-content:center;z-index:100;overflow:auto;padding:30px 16px}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:720px;box-shadow:0 20px 60px rgba(0,0,0,.3);margin:auto}
.modal .mh{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.modal .mh h3{margin:0;font-size:16px;color:var(--navy)}
.modal .mh .x{margin-left:auto;border:none;background:none;font-size:22px;color:#98a2b3;line-height:1}
.modal .mb{padding:18px 20px;max-height:70vh;overflow:auto}
.modal .mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:700;color:#445;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13px}
.field textarea{min-height:120px;resize:vertical;line-height:1.5}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hint{font-size:11px;color:var(--grey);margin-top:4px}
/* Diff */
.diff{font-family:"Consolas",monospace;font-size:12px;background:#fbfcfe;border:1px solid var(--line);border-radius:8px;padding:10px;max-height:320px;overflow:auto;white-space:pre-wrap;line-height:1.5}
.diff .add{background:#e3f6ec;color:#146c43;display:block}
.diff .del{background:#fbe9e7;color:#a1332a;text-decoration:line-through;display:block}
.diff .same{color:#5a6577;display:block}
/* Signature list */
.sign{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#f7f9fc;border-radius:8px;margin-bottom:6px;font-size:12.5px}
.sign .who{font-weight:700}
.timeline{border-left:2px solid var(--line);margin-left:6px;padding-left:14px}
.timeline .ev{position:relative;padding:6px 0;font-size:12px;color:#4a5568}
.timeline .ev::before{content:"";position:absolute;left:-20px;top:11px;width:8px;height:8px;border-radius:50%;background:var(--blue2)}
.alert{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-radius:9px;margin-bottom:8px;font-size:12.8px}
.alert.w{background:var(--warnbg)} .alert.d{background:var(--badbg)} .alert.i{background:var(--light)}
.alert .ai{font-size:16px}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--grey);margin-top:8px}
.legend b{color:var(--ink)}
.empty{text-align:center;color:var(--grey);padding:26px;font-size:13px}
.notice{background:#fff8e6;border:1px solid #f0dca0;border-radius:9px;padding:9px 13px;font-size:12px;color:#7a5a12;margin-bottom:14px;display:flex;gap:8px;align-items:center}
@media print{
  .side,.top,.no-print{display:none!important}
  .main{display:block} .content{padding:0;max-width:none}
  .card{break-inside:avoid;box-shadow:none}
  body{background:#fff;font-size:12px}
  .print-only{display:block!important}
}
.print-only{display:none}
/* login + user chip */
.userchip{display:flex;align-items:center;gap:8px;padding:5px 12px;border:1px solid var(--line);border-radius:22px;cursor:pointer;font-size:12.5px;background:#fff}
.userchip:hover{background:#f3f6fb}
.userchip .av{width:26px;height:26px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
.userchip .nm{font-weight:700;color:var(--navy)} .userchip .rl{color:var(--grey)}
.login-gate{position:fixed;inset:0;z-index:200;background:linear-gradient(130deg,#1f3864,#0f1d33);display:flex;align-items:center;justify-content:center;padding:20px}
.login-gate.hidden{display:none}
.login-card{background:#fff;border-radius:18px;width:100%;max-width:440px;box-shadow:0 24px 70px rgba(0,0,0,.4);padding:30px 30px 26px}
.login-card .lg-logo{font-size:26px;font-weight:800;color:var(--navy);text-align:center}
.login-card .lg-logo span{color:var(--blue2)}
.login-card .lg-sub{text-align:center;color:var(--grey);font-size:12.5px;margin:4px 0 20px}
.lg-roletabs{display:flex;gap:6px;margin-bottom:14px}
.lg-roletabs button{flex:1;padding:9px;border:1px solid var(--line);background:#fff;border-radius:9px;font-size:13px;font-weight:600;color:#4a5568;cursor:pointer}
.lg-roletabs button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.lg-users{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;max-height:220px;overflow:auto}
.lg-user{display:flex;align-items:center;gap:11px;padding:10px 12px;border:1.5px solid var(--line);border-radius:11px;cursor:pointer}
.lg-user:hover{background:#f5f8fd} .lg-user.sel{border-color:var(--blue);background:#eef3fb}
.lg-user .av{width:36px;height:36px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
.lg-user .nm{font-weight:700;color:var(--ink)} .lg-user .rl{font-size:11.5px;color:var(--grey)}
.lg-pin{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.lg-pin input{flex:1;padding:11px;border:1px solid var(--line);border-radius:9px;font-size:16px;letter-spacing:6px;text-align:center;font-family:inherit}
.lg-err{color:var(--bad);font-size:12px;min-height:16px;text-align:center;margin-bottom:6px}
.lg-btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.lg-btn:hover{background:var(--navy)}
.lg-hint{text-align:center;color:#9aa7bd;font-size:11px;margin-top:12px}
.mp-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;margin-bottom:7px;font-size:13px}
.mp-item .mi-ic{width:30px;height:30px;border-radius:8px;background:var(--light);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.cert{border:2px solid var(--navy);border-radius:12px;padding:26px 30px;text-align:center;background:#fff}
.cert h2{color:var(--navy);margin:0 0 4px} .cert .seal{font-size:40px;margin:10px 0}
#printArea{display:none}
#printArea .pa-head{font-size:11px;color:#555;border-bottom:1px solid #ccc;padding-bottom:6px;margin-bottom:14px}
#printArea .pa-title{font-size:19px;color:#1f3864;margin:0 0 4px}
#printArea .pa-h2{font-size:15px;color:#fff;background:#1f3864;padding:5px 10px;border-radius:5px;margin:16px 0 8px}
#printArea .v-h3{font-size:13px;font-weight:700;color:#1f3864;margin:10px 0 4px;border-bottom:1px solid #eee}
#printArea .v-p,#printArea .v-i1,#printArea .v-i2,#printArea .v-bul{font-size:12px;margin:2px 0;color:#222;line-height:1.5}
#printArea .v-i1{margin-left:16px}#printArea .v-i2{margin-left:30px}#printArea .v-bul{margin-left:14px}
#printArea .v-row span{padding:2px 8px;border-right:1px dashed #ccc;display:inline-block}
#printArea .v-star{display:none}
@media print{ body.printing .app{display:none!important} body.printing #printArea{display:block!important} }
@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}.g3,.g2{grid-template-columns:1fr}.side{width:64px}.brand .sub,.nav a span.t,.side .foot{display:none}}
</style>
</head>
<body>
<div class="app">
  <aside class="side no-print">
    <div class="brand">
      <div class="logo">K‑<span>LabDoc</span></div>
      <div class="sub">검사실 지침서 지식관리·업무지원</div>
    </div>
    <nav class="nav" id="nav">
      <a data-view="dashboard" class="active"><span class="ic">▤</span><span class="t">대시보드</span></a>
      <a data-view="mypage"><span class="ic">👤</span><span class="t">마이페이지</span><span class="badge" id="nb-mypage" style="display:none"></span></a>
      <div class="navgrp">지침 참조 · 교육</div>
      <a data-view="viewer"><span class="ic">▤</span><span class="t">지침서 열람·검색</span></a>
      <a data-view="learn"><span class="ic">◇</span><span class="t">교육 과정</span><span class="badge" id="nb-learn" style="display:none"></span></a>
      <a data-view="visuals"><span class="ic">◫</span><span class="t">시각 가이드</span></a>
      <div class="navgrp">관리</div>
      <a data-view="manage"><span class="ic">▥</span><span class="t">지침서 관리</span><span class="badge" id="nb-manage" style="display:none"></span></a>
      <a data-view="quality"><span class="ic">✔</span><span class="t">인증·품질</span><span class="badge" id="nb-quality" style="display:none"></span></a>
      <a data-view="settings"><span class="ic">⚙</span><span class="t">설정</span></a>
    </nav>
    <div class="foot">v1.2 · 2026<br>대한임상화학회 업무자동화 공모전</div>
  </aside>

  <div class="main">
    <header class="top no-print">
      <h1 id="viewTitle">대시보드</h1>
      <div class="spacer"></div>
      <div class="role">
        <span>검사실</span>
        <input id="labName" style="width:150px" placeholder="검사실명">
      </div>
      <div class="userchip" onclick="nav('mypage')" id="userChip" title="마이페이지"></div>
      <button class="btn sm" onclick="logout()" title="로그아웃" style="margin-left:8px">로그아웃</button>
    </header>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- Login gate -->
<div class="login-gate" id="loginGate">
  <div class="login-card" id="loginCard"></div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

<script>
"use strict";
/* =========================================================
   K-LabDoc — single-file laboratory document & accreditation manager
   Storage: localStorage (local-first). Export/import JSON for backup.
   ========================================================= */
const LS_KEY = "klabdoc_db_v5";

var SEED_IM="", SEED_CH="";
SEED_IM="Ⅲ-4. 검사방법평가17\nⅢ-8. HIV 업무 Flow32\nⅠ. 운영지침서의 개요\n진단검사의학과 자동화학검사실 임상병리사는 정도관리에 관련된 업무를 수행하고 기록하며 이상이 발견되는 즉시 적절한 조치를 취할 의무를 가지며 담당병리사와 진단검사의학과장(담당전문의)는 이에 대한 통합 관리의 책임을 가짐. 아래와 같은 기본 원칙으로 시행함.\n1) 외부 및 내부정도관리 지침의 설정\n2) 외부 및 내부정도관리 지침의 교육 및 시행\n3) 검사실 정도관리의 평가지침 준수\n4) 검사실 정도관리 프로그램의 수준향상 및 향후 계획 설정\n5) Calibration 및 QC의 시행지침 준수\n6) 지속적인 질관리(Quality management)\n7) 시약관리 및 분석장비(분석기) 관리\n8) 결과보고 및 검체관리\n9) 일반기구 및 장비관리\n10) 자료보관 및 기록\n11) 업무규정\nⅡ. 외부정도관리 (External Quality control & Proficiency test)\n국내 외부정도관리에 적극 참여하며 그 결과를 담당병리사, 진단검사의학과 담당전문의가 적극적으로 검토 함.\n문제점이 발생한 경우 이에 대한 조치사항을 파트장병리사와 함께 기록하고 보완하여 외부정도관리 평가 및 대책기록서에 기록으로 남겨 4년간 보관함.\n외부정도관리 프로그램에 참가하지 않는 검사는 환자 검체를 매 6개월마다 검사실간 비교\n(Inter-laboratory proficiency test)를 시행 함.\n검사실에서 시행되고 있는 전체 검사 종목과 외부정도관리를 시행하지 않는 종목의 리스트를 작성 함.\n1. 외부정도관리 (External Quality control)\n1) 외부정도관리 시행규정(검사실간 비교 시행규정 포함.)\n(1) 외부 정도관리 검체분석은 실제 환자의 검체와 동일한 방법으로 동일한 검사자인 소속 담당 병리사에 의하여 시행하며 외부정도관리물질의 검사를 위해 내부정도관리를 다시 시행하지 않음.\n(2) 외부정도관리 분석결과를 보고하기 이전에는 외부검사실 간의 어떠한 형태의 의사교환이나 검체\n교환이 있어서는 안 됨.\n(3) 외부정도관리 결과와 타 기관과의 비교검사 결과는 매 회마다 보고서 수령일로부터 한 달 이내에 결과를 분석하고 문제가 있는 경우 대책을 수립하여 적절하게 대책을 시행한 자료를 보관하고, 이에 대하여 담당전문의가 적극적으로 검토 함.\n(4) 외부정도관리프로그램 참여\n[ 국내외부정도관리 참여기관 ]\n① 대한진단검사정도관리협회 주관의 정도관리프로그램에 따라 실시.\n- 정도관리프로그램: 표1. 참조\n- 실시횟수: 년 2회\n** 대표ID: qa0159 / Pass: qa0159640\n2) 외부정도관리 평가지침 및 허용기준\n외부정도관리 정량검사는 각 항목별 SDI수치로 평가함,\n외부정도관리평가 허용기준 | 외부정도관리평가 허용기준 | 평가 | 평가대응책\n정량 | S.D.I: ± 1.5 이하 | Exellent\n(Accept ) | 현행유지\n정량 | S.D.I: ± 1.5초과 ~ ±2.0이하 | Good\n(Accept) | 다음 외부정도관리결과 추이관찰 분석\n정량 | S.D.I: ±2.0 초과 | Unaccept | 원인분석 및 개선조치\n정성 | 집계결과(정답)와 100% 일치 | Accept | 현행유지\n정성 | 집계결과(정답)와 불일치 | Unaccept | 원인분석 및 개선조치\n2. 검사실간 결과비교 (Interlaboratory Proficiency Test)\n외부정도관리를 실시하지 않는 모든 검사 종목에 대하여 환자 검체를 이용하여 6개월마다 타기관 검사실과 비교 평가를 시행함. 이때, 가능한 동일한 검사방법과 장비, 동일한 보고 단위를 사용하는 기관<peer group>과 비교평가를 시행하며 오차 허용 기준을 벗어난 경우 이에 합당한 적절한 조치를 취하고 이를 기록하여 보관함.\n[검체조건]\n정량검사 : 농도가 다른 2개 이상의 검체(권장: 참고치 이내의 농도, High)\n정성검사 : 2개 이상의 검체(권장: Negative, Positive 모두 포함 되도록 선정)\n<자동화 면역혈청의 검사실 간 비교 평가기준>\n- 정량검사 – bias (%) 검사 항목별 설정\n① 검체 2개 : 모두 Diff(%) 10% 이내 -> Acceptable\n② 검체 3개 이상 : 2개 이상 Diff(%) 허용 기준 10% 이내 -> Acceptable\n③ 검체 5개 이상 : 3개 이상 Diff(%) 허용 기준 10% 이내 -> Acceptable\nBias 20% :, folate, SCC\nBias 10% ; 호르몬 검사 I (TSH, Free T4, T3,B-HCG, Estradiol), 호르몬 검사 II (procalcitonin, Vit D, intact PTH), insulin, C-peptide, ACTH, V.B12\n종양표지자 (AFP, CEA, PSA,CA 125,15-3,19-9),\n심장표지자 (CK-MB, HCY, Myoglobin, hs-Tni, p-BNP, BNP), ferritin,\n[예외] 저농도 검체는 오차율이 크게 계산되므로 판정 시 이를 고려하여 결정.\n* 저농도물질: 각 항목별 AMR의 1/4 분위 값\n- 정성검사 : 양성/음성: 모든 검사 100% 일치\n- 반정량검사: ± 1 titer 이하\n3. 외부정도관리 및 검사실간 비교 허용기준 벗어난 경우 조치사항\n1) 외부정도관리 벗어난 경우\n- 세분류 SDI를 평가기준 기본원칙으로 하고, 세분류 SDI 가 없을 시 기준분류로 평가-> 원인분석\n- Calibrator, Control, Reagent등의 상태를 확인 후 교정\n- 외부정도관리 보관 물질을 재 검사하여 확인(가능할 경우).\n- Proficiency Test 실시하고 전문의 검토 확인.\n- 원인 분석에 따라 장비상태 점검(maintenance) 하고 필요시 장비회사의 학술 및 기술부의\n도움을 요청한다.\n2) 검사실간 결과비교 벗어난 경우\n① 장비상태 점검(maintenance)\n② Calibrator, Control Date 확인 후 필요 시 교정.\n③ 5개 이상 검체로 Proficiency Test 재평가 -> 전문의 검토 확인\n④ Unaacceptable 시 장비회사의 학술 및 기술부(장비상태 점검) 요청-> 원인분석 및 문제해결.\n⑤ 10개 이상 검체로 Proficiency Test 재평가 전문의 검토 확인\n⑥ 두 기관 모두 재검 실시\n⑦ 제3의 기관에 검증 요청\n진단면역 외부정도관리 프로그램\nⅢ. 내부정도관리 (Internal Quality control)\n진단검사의학과 자동면역혈청 검사실에서 행해지는 내부정도관리 결과는 LIS QC Program에서\n관리되거나 별도의 내부정도관리 기록장부 또는 프로그램을 구비하여 담당병리사와 진단검사의학과장\n(담당전문의)이 적극적으로 관리 및 검토함.\n시약관리, 장비관리, Control, Calibration기록 등의 중요한 기록은 담당병리사, 파트장병리사가 검토하고 서명하며 매달 진단검사의학과 담당전문의가 확인하고 서명함.\n담당병리사는 Q.C기록이 벗어난 결과를 보이는 즉시 이를 파트장병리사에게 보고하며 적절한 조치\n(Cal., ReCal., ReQC 등)를 취하고 이를 업무일지 또는 KIS Program을 통해 조치사항을 기록함.\n자동화면역•혈청 검사담당자는 지속적으로 안정되고 정확한 결과 산출을 위하여 다음과 같은 방법으로\n내부정도관리를 시행.\nⅢ-1. 내부정도관리지침\n1. 시행지침\n1) 모든 내부정도관리는 자동화진단면역 운영지침서에 준하여 실시.\n2) 내부정도관리는 검사를 담당하는 검사자가 직접 환자 검체와 동일한 방법으로 시행.\n3) Q.C 주기는 기기 및 시약회사에서 권장하는 간격보다 길어서는 안되며,\n정량검사의 경우 2가지 농도 이상의 정도관리 물질을 사용한다.[ III-5. Cal & Cont참고].\n4) 모든 정도관리는 다음과 같은 Rule을 정하여 시행(허용기준).\n(1) 매회 QC 시행 시 마다 Westgard’ rules중 1 3S, 2 2S, R 4S rule을 검토하여 검사를 시행할지 여부를 결정\n- 정량검사: 1 3S, 2 2S, R 4S rule 검토.-> 원인분석 및 조치\n- 정성검사: 1 3S, R 4S rule 검토. -> 원인분석 및 조치\n(2) QC 결과 값이1 2S rule을 벗어나는 경우는 환자검체에 대한 검사는 시행하되 이전 Q.C 결과\n값을 재검토하고, QC 결과 값이1 3S, 2 2S, R 4S rule을 벗어나는 경우에는 환자 검체에 대한\n검사 시행을 중지하고 내부정도관리가 벗어난 원인 분석 및 조치를 취한 후 Q.C를 다시 시행하여\n결과 값이 상기 rule을 위반하지 않는 것을 확인 후 환자 검체에 대한 검사를 시행함.\n(LIS에서 자동으로 “결과저장” 단계로 전환 됨.)\n(3) 내부정도관리 rule을 벗어난 경우 담당자는 Calibration이나 Q.C를 진행하고 재검 후에도 같은 결과를 보이면 정도관리 물질, 시약 및 검사방법에 대한 점검\n에러의 원인을 제거하고 QC를 재 시행하여 결과가 허용 범위 이내임을 확인해야 함.\n(4) 정성검사의 정도관리 시행\n① 모든 정성검사는 검사 수행일 마다 양성, 음성 정도관리 물질을 사용하여 시행.\n② 정도관리 실시 후 음성 정도관리 검체는 음성 결과로 양성 정도관리 검체는 양성 결과로\n산출되었는지 확인하여 검사의 정확성을 확인.\n* S/CO 값 또는 Index 값의 Mean/SD 설정하여 1 3S, R 4S rule 적용하여 관리하도록 한다.\n2. 내부 정도관리물질 허용범위 설정지침\n1) 정도관리 물질의 lot. change가 있는 경우 또는 다른 회사제품으로 바뀌는 경우, 약 20회 (요일검사의 경우 10회) 정도의 Q.C daily test를 시행하여 mean, SD를 구하고 확인 서명하여 그 기록을 보관.\n2) 사용하는 정도관리 물질이 assayed material인 경우, 설명서의 수치는 참고하되 정도관리 물질을\n각 lot. 마다 반복적으로 측정하여 평균과 표준편차를 산출하여 통계학적으로 타당한 허용범위를\n설정하여 사용. 허용기준 : CV : 5%이내 (일부항목:3~10%)\n3) 허용범위 설정 시 약20회 정도의 누적결과로부터 새lot.의 mean, SD를 구하는 것을 원칙으로\n하되, 새lot.의 QC물질의 임시 mean(10회)을 구하고 Insert의 허용범위 이내임을 확인 후\n이전의 SD값으로 일시적인 임시 허용범위로 정하여 사용하는 것도 가능.\n그 후 새lot의 측정치가 20회 이상 누적되면 이 측정치를 사용하여 새로운 Mean, SD를\n산출하여 적용, 단, 새롭게 측정한 결과로 산출한 SD가 기존의 SD와 유사하다면 기존SD를 그대로 적용.\n3-1) 기존SD 적용할 경우, 만약 새로운 lot의 정도관리물질 평균농도가 기존물질의 농도와 크게 다르다면 SD대신 변이계수(CV,%)를 활용하여 SD를 계산할 수 있다.\n4) 동일한 lot의 정도관리물질을 사용하면서 검사시약 또는 보정물질 lot 변경 후 정도관리물질의 기질효과(matrix effect)가 의심되는 경우 정도관리물질 허용범위를 재설정 할 수 있다.\n5) 정성검사도 정량검사에 준하여 관리하며, Control Parallel test는 S/CO 또는 index 값의 Mean/SD Range설정으로 대체한다.\n6) 정도관리물질 특성으로 lot이 자주 변경되거나 새로운lot의 정도관리물질 허용범위를 신속하게 설정해야 하는 경우 하루에 두 번 이상 측정하여 측정일수를 줄일 수 있다.\n3. 허용범위를 벗어났을 경우 조치사항\n1) 중대한 기기적인 고장이나 지속적인 QC의 문제로 검사를 진행할 수 없게 되는 경우 담당 임상\n병리사는 파트장병리사에게 보고.\n파트장병리사는 해결책을 논의하고 사건의 경중을 판단하여 각 진료과나 병동에 알리고 자동화면역혈청 담당전문의에게 즉시 보고.\n2) 정도관리가 허용범위를 초과하면 이를 교정하고, 그 조치사항을 업무일지 또는 LIS 정도관리 조치사항에 기록.\n3) 검사항목별 내부정도관리 정도관리 물질의 정밀도 허용범위는 2.문항의 정량검사의 정도관리\n물질허용범위 설정방법에 의하여 산출한 자체평균과 표준편차에 Westgard’s rule 중 1 3S, 2 2S,\nR 4S를 적용하여 매 QC시행 시 마다 확인.\n4) 내부정도관리 결과는 L-J Chart로 관리하며, 그 기록에는 허용범위를 벗어난 경우나 기타 조치사\n항과 현재 사용 중인 정도관리 물질의 Lot No.농도별 Mean, SD와 같은 물질정보가 함께 기록되\n도록 함.\n5) Control이 허용범위를 벗어났을 경우 조치순서.(자동화진단면역)\n- Control결과가 기준을 벗어난 경우에 다음과 같은 단계로 조치를 취하고 업무일지에 기록.\n(1) Control 물질의 상태, Lot No./ Exp.date등이 이상이 없는지 확인.\n(2) 최근 일주일 정도의 QC data 추이를 관찰.\n(3) QC data가 Shifting 혹은 Trending 을 보이는 경우, Calibration을 시행하고,\n다시 QC물질을 측정.\n(4) Calibration시행 후에는 Cal. Factor등을 확인하고 허용범위 이내임을 확인함.\n(5) 위 단계에서도 교정이 안될 경우, 다른 Lot.의 Calibrator로 교체, 시약의 교체, QC 물질의 교체 등을 시행함.\n(6) 이상의 단계에서도 교정이 안 될 경우는 파트장병리사 및 담당전문의에게 알림.\n(7) 필요하면 장비회사에 연락하고 문제를 해결하도록 함.\n4. 내부 정도관리 종합검토 지침\n1) 정량으로 보고되는 검사인 경우 매월 내부정도관리 통계인 LIS - 정밀성 검증을 통한 Mean, SD, CV를 산출하여 그 결과가 이전 달과 차이가 있는지를 파트장병리사와 진단검사의학과 전문의가 적극적으로 확인, 검토하고 그 내용에 관하여 확인 서명.\n만약, 정밀도의 변화가 있는 경우 이에 대한 조치와 검토여부를 내부정도관리장부에 기록.\n2) 내부정도관리 결과는 L-J Chart로 최대 분기별 출력하여 관리하며, 그 기록에는 허용범위를 벗어난 경우나 기타 조치사항과 현재 사용 중인 정도관리 물질의 Lot No. 농도별 Mean, SD와 같은\n물질정보가 함께 기록되어야 함.\n3) 모든 정도관리시행 시 매회 업무일지에 Q.C 실시내역을 기록.\n4) 월별 내부정도관리 정밀성 검증 기준\n- 당월 CV : 5%이내 : 7,10%외 전체항목\n7%이내 : ferttin, CKMB lv1\n10% 이내 : SCC, AFP lv1, CEA, CA19-9,HCY, PCT, Vit D, VB12,Fol, Corti,E2,FSH\n(**일부 검사항목의IQC에서 당월CV 기준의 상향은 제조사에서 제시한 검사 정밀도를 검토하여 평가기준 변경함)\n- % Diff.(Mean) : ±5%이내 *(% Diff.(Mean) = (당월 Mean – 전월 Mean)/전월Mean x 100\n- Diff.(CV) : ±3%이내 *Diff.(CV) = 당월CV – 전월CV)\n5. 장비간 비교검증 (Correlation)\n두 장비 이상으로 검사하는 항목의 경우 20개 이상의 검체를 이용하여 년 2회 상관성평가 실시.\n단, 동일 기종 기기와 동일lot의 정도관리물질 및 시약을 사용하는 경우 누적된 정도관리물질 측정결과를 비교평가에 이용할 수 있다.\n(자동화진단면역의 경우 Atellica, Alinity, cobas 장비 비교검증 검사를 시행.)\n1) 자동화 면역혈청의 장비간 일치도 허용 기준\n정성: 일치\n정량: R2 ≥ 0.95 , Diff(%) ≤ ±10 %\n(저농도 검체는 오차율이 크게 계산되므로 이를 고려하여 판정)\n2) 허용기준 벗어난 경우: 장비점검 후 재시행\n[참고] 진단면역 정도관리 허용기준\n분 류 | 분 류 | 허용기준 | 허용기준\n내부정도관리 | QC Westgard rule | 정량 : 1,3 S, 2.2S, R4S / 정성 : 1,3 S, R4S | 정량 : 1,3 S, 2.2S, R4S / 정성 : 1,3 S, R4S\n내부정도관리 | Cal | Cobas e801 : Factor 0.8~1.2이내\nAlinity I : Cal verification 허용기준\nHBsAg; 고치\n11) 결과판정\n12) 즉시 보고해야 하는 검사결과의 기준\n13) 결과에 영향을 미칠 수 있는 사항\n14) 정도관리(정도관리 물질의 제조회사, 공급회사 기록), 구체적 방법 기록\n15) 참고문헌 및 참고사항\n2. 운영지침서(검사지침, 정도관리지침 포함)는 쉽게 활용 할 수 있도록\n자동화학검사실내에 일정장소나 작업대에 비치하여 항상 숙지함.\n또한 시약 insert paper도 작업대 근처에 함께 비치해 둠.\n3. 검사지침서는 파트장병리사, 진단검사의학과장(담당전문의)에 의해 매년 검토되어야 하며 검토여부를 기록. 모든 자동화학검사실 병리사는 검사지침서를 숙지하여 충분히 익혀야 하며 매년 이에 대한 확인 서명을 함. 담당자가 바뀌면 검사지침서를 숙지하고 이에 대한 확인 서명함.\n4. 새로운 검사가 setup되면 즉시 검사지침서를 작성하고, 파트장병리사와 진단검사의학과장 (담당전문의)은 그 내용을 검토하여 확인서명함.\n5. 검사지침서의 내용 중 매년 개정시기 사이에 수시로 변경되는 사항은 담당병리사와\n진단검사의학과장(담당전문의)과 의논한 후 확인서명 기록지의 비고란에 기재한 후 개정.\n6. 시약 kit에 들어있는 insert를 검사 시 그대로 이용하지 않으며 반드시 검사지침서에 일부 내용으로 기술하여 사용함. 담당병리사는 새lot 번호의 시약 kit가 도입될 때마다 Insert에 기술된 검사방법을 체크하여 변경 유무가 있는지 검토,확인함.\n7. 중단된 검사나 시약이 바뀐 경우의 매뉴얼은 검사시작일과 중단일을 기록하여 2년간 별도보관.\n8. 즉시 검사가 불가능할 경우는 원심 분리한 후 분주(Aliquot)하여 냉장 또는 냉동 보관함.\nⅢ-3. 시약관리\n모든 시약은 환자 검체에 적용하기 전 제조사의 설명서에 따라 시약기능을 확인하며 제조 및 보관의 원칙을 준수하여 유효  기간내 사용하는 것을 원칙으로 하고 유효기간이 가까워지는 시약의 경우는 납품업체 (공급업체)와  상의하여 유효기간이 더욱 긴 시약으로 교체하여 사용. 만약 교체가 어려운 시약의 경우  control물질의 결과를 확인하여 유효기간을 연장하여 사용하고 Data가 불안정(허용범위 초과, 재현성 불량 등..)할 경우는 즉시 폐기.  담당병리사는 시약에 대한 입고일(수령일), 개봉일 등의 labelling이 잘되었는지 확인함.\n1. 시약이 제조회사로부터 케어캠프(물류서비스사)를 통하여 공급되면 검사담당자는 입고된 시약의 Lot No. 및 유효기간, 수량 등을 확인하고 인수증 확인 거쳐 입고일 기재 후 시약 보관 냉장고에 입고.\n2. 시약의 입고, 사용, 재고관리는 케어캠프 전용 프로그램 및 전용 홈페이지를 통하여 시행.\n3. 검사실내에서 사용하고 있는 시약용기에는 내용물(제품명), 유효기간, 보관조건, 개봉일이 반드시 적혀 있어야 하며 사용 중인 시약은 원칙적으로는 같은 Lot.No.를 사용함.\n4. 모든 시약은 반드시 Insert에 명시된 보관조건을 준수하여 보관하며, 시약의 유효기간을 확인하고, 유효기간이 지난 시약은 파트장병리사에게 보고하고 폐기한다.\n5. Kit 내에 시약들이 여러 개로 구성되어 있는 경우 제조회사가 특별히 명시하지 않는 한 검사에 사용되는 시약은 같은 lot 번호를 가진 것끼리 만 사용하며 만일 kit 내에 남는 시약이 있는 경우 폐기하며 같은 lot 번호라 하더라도 다른 kit 와 섞어서 사용하지 않는 것을 원칙으로 한다.\n6. Reagent Parallel Test 시행지침\n1)시약이 다른 회사 제품으로 변경되거나 시약의 Lot No.가 변경되는 경우 기존의 시약과 새로운 시약에 대한 비교 검증을 시행한 후 사용.\n2) Reagent Parallel Test 시 정량검사의 경우 Control 물질과 2개 이상의 농도를 아는 환자 검체를 사용하여 검사한다.\n정성 및 반정량의 경우 기존시약으로 검사를 시행한 환자 검체중 적어도 한 개 이상의 양성 및 음성 검체를 이용하여 새로운lot의 시약으로 재검한 결과가 동일한지 확인함.\n- 정도관리물질이 포함된 키트를 사용하는 경우 키트에 포함된 정도관리물질도 함께 검증함.\n3) Reagent Parallel Test 평가기준\n(1)허용기준 : 정량검사: 평균 Diff(%)값= ≤±10%- Acceptable\n(저농도검체의 경우 평균 Diff(%)값≤ ±20%)\n정성검사: 100% 일치 - Acceptable\n(2)허용범위를 벗어나는 경우:\n- Control 물질 벗어난 경우: Control Global Recovery 확인\n- 환자 검체가 벗어난 경우10개 이상의 환자 검체로 재검증을 실시함\n- 필요 시 검사실간 비교 검사 실시\n(3)재검증 후에도 벗어나는경우 : 다른 Lot. 시약 요청하여 재평가.\n7. 기존의 시약과 새로운 시약에 대한 비교 검증 test결과는 평가서에 기록하며 담당(책임)병리사와 담당전문의가 확인 서명함.\n8. 동결 건조된 정도관리물질 및 시약사용\n: Volumetric pipette 을 사용하여 제조한다.\n(정확성이 공인된 class A , 용적 측정용 유리용기를 사용)\n- Volumetric pipette은 정도관리물질과 시약 조제에 필요한 D.W만 사용함.\n- 다른 화학적 재료들과 혼용하지 않음.\n1) 건조된 정도관리물질은 각 사용 설명서에 따라 Volumetric pipette 사용하여 제조 및 보관.\n2) Volumetric pipette 사용\n- 용량의 Volumetric pipette을 필러 또는 pipette add 을 사용하여 D.W을 채운다.\n- D.W의 meniscus 와 pipette 표선 및 눈의 위치가 수평이 되도록 하여 meniscus 밑변이 표선과 일치되도록 함.\n- Meniscus와 표선이 일치되면 제조할 정도관리 물질에 DW을 분주.\n- 시약 설명서에 따라 실온에서 부드럽게 mix -> 보관법에 따라 냉장 또는 냉동보관(aliquot).\n- 제조된 물질은 시약명, Lot N. 유효기간, 제조일,제조 후 유효기간을 표시하여 보관.\n- 사용 후 Volumetric pipette 은 검사실에서 사용하는 정제수(Milli-Q: Type II Reagent Water)로 최종 세척 → 세척 후 건조대에서 완전히 건조 → 오염되지 않도록 전용 보관함 또는 캐비닛에 보관한다.\n[정도관리 물질]\nⅢ-4 검사방법평가\n1. 신규검사 도입 및 변경시\n1) CLSI EP15-A3 에 따라 Precision Test 실시\n2) Linearity Test(AMR Test): 제조사에서 제시한 AMR 포함한 저농도 및 고농도 검체를 이용하여\n직선성 확인(CLSI EP6-ED2).\n3). Reference Test: 정상인 20 검체 이용하여 제조사의 참고치 검증 (CLSI EP28-A3c)\n4) Carryover Test: 고농도 검체 4회 연속측정 후 저농도 검체 4회 연속측정, 오염율 확인\n(CLSI EP10-A3)\n5) Accuracy Test *: CRM 3회 이상 반복 측정하여 Mean과 Target 값과 비교\n※ 5) * 는 경우에 따라 시행.\n2. 시약이 다른 회사의 제품으로 변경된 경우\n1) 신규검사 도입 시 1)~4) 평가진행 추가 Comparision test (Correlation) 진행.\n2) Comparision test (Correlation Test): 환자 검체 20개를 검사하여 기존 시약(장비)과 검사 결과\n비교 (CLSI EP9-A3)에 따라 비교 검증.\n3. 평가기준\nPrecision Test : CV = ≤ 5%\nLinearity Test (AMR Test): R2 Value: ≥ 0.95,\nRecovery: ≤ ±10%\nComparision test(Correlation Test): R2 Value = ≥ 0.95, diff(%) ≤ ±10%\nReference Test : 20검체 중 Insert 내 참고치를 벗어나는 검체; ≤ 10% (2개)\nCarryover Test : ∠ ± 1%\nAccuracy Test : Recovery rate = ≥ 95%, Target Value = ≤ ±2SD\n4. 참고치 검증 방법\n1) 검체의 수집\n- 건강 검진 환자의 검체 중 의무 기록 확인 후 환자의 나이, 성별, 유형 등을 고려하여 설정, 항목에 따라 필요시 별도의 참고치 구간 설정\n2) 새로운 검사의 도입, 검사 방법 (시약 및 기기) 변경 시 시행\n3) 적절한 근거가 있는 기존의 참고구간 (제조사, 타 검사실, 교과서, 문헌 등) 을 그대로 사용하기\n위해서는, 검사방법과 검사 대상군이 동일해야 하고, 20개의 정상인 검체 중 제시한 참고\n구간을 벗어나는 경우가 2개(10%) 이하 임을 확인한다. (CLSI EP28-A3c)\nⅢ-5. Calibration and Control\n모든 검사에는 적절한 Calibrator와 Control을 사용하여 검사의 신뢰도를 확인하며 기준을 벗어난 경우 적절한 조치를 취하고 이에 대한 기록을 남기도록 함.\nCalibration이 필요한 검사는 Calibrator(Standard material)를 이용하여 일정기간마다 혹은 필요한\n경우에 Calibration을 실시함. Calibrator와 Control(Q.C material)의 혼용사용 금지.\n자동화검사실의 면역혈청검사는 1일 1회 이상의 정도관리를 시행하며, 시약교체나 정도관리 실패 등, 필요시 해당검사에 대한 Calibration과 Q.C를 시행함.\n1. Calibration 실시시기\n: 세부사항을 정도관리조치사항에 기록 보관.\n각 항목별 cal 주기 이내에 시행한다.\n1) 시약의 Lot No. 변경 시\n2) 정도관리 실패 시\n3) 중요한 유지보수 후\n4) 제조업체가 권유할 때\n5) 적어도 6개월 내에\n6) 시약의 변질이 의심될 때\n7) OBS(Onboard Stability)를 지난 경우,‘Calibration required’ sign이 표시,\n2. Calibration사용가능 물질\n: 제조회사의 전용calibrator 를 기본으로 사용한다.\n3. Cal Verification(Cal Parallel Test)\n1) 시행시기: Cal 시행시기와 동일\n2)시행방법\n- Old Cal. 과 New Cal. 로 각각 Cal 시행 후 Control(2개)물질과 환자검체 2~5개를 선정하여\n시행.-> 허용 기준내-> Acceptable\n- 허용기준 벗어난 경우; Cal 물질교체, 시약, QC물질 교체-> 다른 Lot. 의 Cal 물질로 재시행.\n3) 허용기준: Diff(%) 값= ≤±10 % (저농도≤±20 %)\n4. Calibration시 주의사항\n1) Calibration을 시행 할 때에는 Sample컵이나 pipette 등이 오염되어서는 안됨.\n2) Calibrator의 보관\n- 개봉 전 까지 Insert상 보관조건에 준하여 보관하고, 개봉 후 aliquot 등을 하여 보관할 경우에도,\n제조회사에서 권장하는 보관조건을 반드시 따를 것.\n5. Control 주기\n1) 정규검사/응급면역: 매일 1회 이상 시행(월~ 토)\n2) 요일검사: 검사시행일 검사시행 전\n3) 정량검사 : 2 level 이상을 시행 함. (저농도와 고농도의 물질)\n정성검사 : 양성 및 음성 2가지이상의 정도관리물질을 사용한다.\n6. QC 물질의 제한성\n1) 일반적인 정도관리물질로는 Calibration을 하지 못함(due to matrix interaction of QC materials)\n→ Matrix interactions are common & unpredictable for specific reagent lot or method\n2) 정도관리물질은 Statistical process control을 하기 위하여 고안됨\n→ calibration 간 검사방법의 상대적 안전성을 확인하기 위한 수단.\n3) 정도관리물질을 Calibrator로 사용할 수 있는 경우\n→ 제조회사에 의하여 특정 방법에 대한 측정값을 부여 받고, 검사방법의 calibration 검증에 사용할 수 있도록 제조된 물질.\nⅢ-6. 검체관리\n검사실에 접수되는 검체는 적절한 용기에 적절한 양이 포함되었는지 확인하며 검사에 적합하지 않은 상태인 경우 부적합 장부에 기록하거나 전산상의 부적합 검체관리에 기록을 남긴 후 병동에 Resample 요청. 부적합 검체로 판단되어 무조건 검사하지 않는 것은 아니고 담당부서의 판단하에 검사시행 후 그 검체상태를 소견에 기록하여 임상에 보고할 수 있음. 당일 시행되지 않은 검체는 적절한 온도에 보관하며 검사가 끝난 검체는 정해진 보관기간 동안 (본병원의 보관기준 - 모검체는 냉장실 (4~8℃ 냉장상태)에서 5일간보관) 보관 한 후 폐기. 자검체는 보관하지 않음.\n1. 검체확인\n1) 검체접수 에서 결과보고까지 검사의 모든 단계에 있어 검체가 바뀌거나 소실되지 않도록 계속 적으로 검체를 확인하며 검사를 시행.\n2) 진단검사의학과로 접수된 모든 검체는 환자이름, ID, 검체번호 등이 표기된 바코드가 부착되어\n있어야 함. 바코드가 부착된 용기에서 다른 용기로 분주 할 때는 반드시 해당 바코드를 재출력 하거나 TLA 자검체 바코드를 이용함. 바코드를 재출력 하지 못하는 경우에는 접수번호, 환자ID, 환자이름 등을 용기에 2가지 이상 표기. TLA모검체로부터 자검체가 분리 되는 경우 등록번호, 검체번호, 환자이름 등을 용기에 표기.\n3) 모검체로 부터 분리된 자검체는 다시 모검체에 넣지 않음.\n- TLA 분주LINE에서 검체분주가 정확하게 되었는지를 확인하기 위하여\n검체의 혈청정보(Hemolysis, Lipemic, Icteric Index)와 검체분주정보(모검체Rack No.,\n자검체 Rack No.) 등을 통해 자검체와 모검체가 동일환자의 검체인지를 확인.\n2. 검체채취\n1) 아침 정규채혈 이외에 병동이나 외래채혈실(입원전검사실) 등에서 검체를 채취할 경우에는 바코드 발행기를 이용하여 바코드 발행 후 바코드에 표시된 검체용기에 바코드를 붙인 후 환자확인 과정을 거쳐 정량대로 검체를 채취.\n2) 모든 검체는 채취 즉시 검사실로 운반되는 것을 원칙으로 함. 이는 응급검사가 아니더라도 채혈 후 시간이 경과됨에 따라 결과값의 신빙성이 떨어지는 검사종목이 있기 때문.\n일반 화학용 검체는 검체 채취 후 적어도 2시간 이내에는 원심분리를 하여야 하며, 만일 불가능 하다면 용혈을 피하기 위해 실온 보관.\n3. 검체접수\n검체접수는 진단검사의학과 검체접수실의 자동접수 화면에서 바코드 리더기로 바코드를 스캔하면 부저소리와 함께 접수됨.\n이 시점이 검체 확인접수시각이며 화면으로 조회가 가능함. 검체가 진단검사의학과에 도착하여 검사 대기 중이라는 의미로 해석하며, 해당분석기에 투입되는 시점이 바로 검사가 진행되는 개별접수 시점임.\n확인접수 적용 slip은 L21~L32, L73, L76\n4. 검체처리\n1) 특수한 항목을 제외한 모든 검체는 채혈 후 2시간 이내에 원심분리.\n검체채취 후 검체안정성에 따라 보관하며 당일 검사 불가 48hrs내 검사 시2-8℃에 냉장,\n3~7일(개별지침) 이상 지연 시에는 -20℃ 이하에 냉동보관(개별검사지침에 따른다.).\n2) 검체에 미립자 적혈구, 또는 혼탁함이 보일 때는 검사하기 전에 고속 원심분리 하여 상층액을\n취하거나 여과한 후 검사를 실시함. 열처리된 검체, 지방성 검체, 심한 용혈이 일어난 혈청, 또는\n확실히 미생물 오염이 있는 검체는 검사를 실시하지 않는 것이 원칙.\n3) Body fluid에서 검체가 너무 혼탁하거나 점도가 높아 검사할 수 없는 경우 담당주치의와 상의하여 검사여부를 결정.\n4) 검체는 검체접수 파트에서 전산 자동접수 후 정규근무 시간에는 TLA의 전처리 과정이나 분석장비에서 개별접수를 하고 접수마감 이후와 휴일 및 야간당직 시에는 응급검사는 연속적으로 검사가 진행되나, 정규검사는 도착 확인접수 후 원심분리 해 냉장보관.\n5) 동결한 검체는 해동 후 완전히 혼합하고, 냉동과 해동은 반복하지 않음.\n6) 즉시 검사가 불가능할 경우는 원심 분리한 후 분주(Aliquot)하여 냉장보관.\nSST, PST 와 같이 Gel 로 분리되는 Tube는 원심분리하여 확인 후 냉장보관.\n7) serum 검체를 사용하는 i-PTH는 serum & plasma 상관성 평가에 따라 48시간 이후 검체는 검\n사를 진행하지 않으며 필요시 resample을 요청한다.\n5. 부적합 검체\n검체를 검사하기 전 부적합한 검체에 대해 검사자가 직접 확인을 하며 검사에 부적합 검체에 대해서는 이를 문서화하여 기록하고 부적절한 검체를 사용했을 경우는 환자 결과관리 화면에서 소견 기록을 이용하여 검체 상태를 보고하거나 부적합 검체란에 전산입력하여 담당의사가 확인할 수 있도록 함.\n1) 부적합검체의 정의\n(1) 환자확인을 할 수 없는 검체\n(2) 응괴가 생긴 검체\n(3) 심하게 용혈된 검체\n(4) 육안적으로 세균에 오염된 검체\n(5) 검체량이 부족한 경우\n(6) 부적절한 용기에 채취된 경우 (검체용기 오류)\n(7) 심하게 Lipemic한 검체\n(8) 기타 검사지침서에 있는 검체 채취 및 보관 방법에 따라 채취, 운반, 보관되지 않은 경우\n2) 부적합검체 처리\n- 검체접수시 부적합 검체로 판정된 경우에는 최초 발견자가 자동화 검사실에 즉시 통보하여 검체에 대한 처리방안을 의논하여 조치 함.\n검체 거절시 부적합 사유와 이의 통보자, 피통보자, 통보시각, 검체 재채취여부 등 처리방안을 전산에 기록.\n다시 채혈할 필요가 없다고 판단된 사항은 즉시 해결하여 검사가 지연되지 않도록 함.\n3) 검체 재채취가 어려운 경우\n- 검사 가능한 경우: 검체의 질이 검사결과에 미칠 영향에 대해 의뢰 의사에게 사전에 알리고 그 검사를 꼭 시행할 것인지 의논함.\n검사를 시행하는 경우 결과보고시 소견란에 검체의 상태와 검사결과 한계를\n명시하거나 특이결과, 부적합검체를 등록하여 전산기록.\n- 검사 불가능한 경우: 담당의사 또는 간호사에게 통보하여 재검체를 요청하거나 검사의뢰를 취소.\n재검체 요청 시 전산접수취소 함(접수취소사유, 피통보자 전산등록).\n6. 검체보관\n1) 검사가 끝난 모든검체(모검체, 기타체액검체)의 경우는 냉장상태에서 5일간 보관하는 것을 원칙\n으로 함. 이미 분주된 자검체는 검사가 종료되면 즉시 폐기.\n2) 페기 시 본원 감염관리지침 中 의료폐기물 관리 지침에 따라 시행.\n3) 연구,학술 등의 특정목적에 따라 보관되는 검체는 별도로 필요시 까지 냉장/냉동 보관.\nⅢ-7. 결과보고\n모든 결과는 정해진 검증과정을 거쳐 가능한 빠른 시간 내에 보고일 기준에 따라 보고하며 결과 수정은 파트장병리사와 진단검사의학과장(담당전문의)의 결정에 따라 시행되며 지침에 따라 환자를 담당하는 의료진에게 유선 등을 통해서 알림. 또한 파트장병리사가 부재중일 때 보고되어야 할 결과에 대해서는 담당병리사가 진단검사의학과장(담당전문의)에게 보고하여 확인 과정을 거친 후 수정보고.\n일반검사는 당일보고하며 응급면역검사는 90분, 요일지정 검사는 검사일 또는 익일에\n보고하도록  TAT를 설정하며, TAT허용기준을 벗어난 경우 그 사유를 분석하여 모니터링 함.\n1. TAT (TurnAround Time)\n1) 매월 초 담당병리사는 전월의 LIS - 진단검사 - 조회관리 - TurnAroundTime조회 실시하여\n응급면역(L76) 및 자동화면역혈청(L23, L28, L29, L32)의 TAT를 기록, 관리.\n2) 지연된 사례 발생시 원인을 분석하고 필요한 경우 담당 전문의에게 보고.\n3) 장비 ERROR 등 결과보고의 지연이 예상되는 경우 즉시 파트장병리사 및 담당전문의에게 보고 후 임상에 유선으로 상황을 알리고 원인 분석, 해결 후 통보자, 피통보자, 결과보고의 지연발생 내용을 업무일지에 기록.\n3) 관련 지침은 검사실 운영지침 中 [검사 소요시간 관리지침]에 준하여 실시.\n4) TAT 관리기준\n(1) TAT\n- 응급면역(L76): 도착확인 ~ 최종보고 ≤ 90min\n- 정규 면역혈청 (L23, L28, L29, L32) :\n평일 : 도착확인 ~ 최종보고 ≤24hrs. (접수마감: 15:30 PM )\n주말 : 도착확인 ~ 최종보고 ≤52hrs (토요일 접수마감 10:30 AM )\n접수마감 이후 도착 검체 : 2-8℃에 냉장( p.21 4 1)지침에 따른다)\n- 요일 검사: 도착확인 ~ 최종보고 ≤5Days (검사 해당요일 당일보고)\n(2). 허용기준\n- 원내: 개별항목 초과율 ≤ 10%\nTotal 초과율 ≤ 5%\n** 장비고장 등 결과보고 지연 예상 시\n: 즉시 파트장병리사에게 보고하여 SMS & 유선으로 외래 간호팀장, 응급실, 병동간호부에 결과지연 사유와 검사항목 및 결과보고까지의 예상시간을 알린다.\n2. 모든 검사결과에는 참고치를 함께 제공하고 참고치에 대해서는 Insert지의 제공범위를 검증하거나 병원 자체적으로 검증과정을 거친 참고치 이어야 함.\n3. 참고치는 되도록 검사가 처음 set-up될 때 나이, 성별에 맞게 검사실 자체에서 건강 대상군을 정하여 시행하여 결과값을 얻고 직접 구하기 어려운 경우 진단검사의학과장(담당전문의)이 문헌 등에 이미 발표되어 사용되는 자료를 결정하여 대체할 수 있으며 필요시 전문의의 판단하에 참고치 적합성 평가를 통해 참고치를 확인함.\n환자의 결과가 임상치료에 중요한 결과를 가져올 경우 즉각 이를 임상 전문의나 담당주치의에게 보고할 수 있는 경고치에 대한 자료도 보관하고 있어야 함.\n<참고치 검증 및 설정>\n- 다음과 같은 경우 시약회사의 참고치를 입증하거나 직접 설정하여야 한다.\n1) 새로운 검사의 도입\n2) 검사방법(시약, 기기)의 변경\n3) 시약회사에서 제공한 참고치의 검사방법과 대상 인구집단이 동일하다면 참고치 검증과정을 거친 후\n그 참고치를 사용할 수 있음.\n4) 참고치의 검증은 정상인 20인의 검체 중 2명(10%)이내의 결과가 제시한 참고치를 벗어난 경우\n그 참고치를 검사실에 적용.(CLSI EP28-A3c)\n5) 환자유형의 변형\n4. 정량검사의 경우 장비에서의 얻어지는 linearity 결과로부터 “Measurable Range”를 설정하여야 함.\nMesurable range는 Q.C 물질 또는 농도를 아는 환자 검체를 희석하여 구할 수 있으며, 이 구간을\n벗어나는 결과에 대해서는 재검, 검체의 희석 등 적절한 방법을 이용하여 결과의 검증이 이루어진 후, 임상에 보고함.\n단, Measurable range의 하한치보다 더 낮게 나오는 결과는 검체 채취의 오류, 희석오류 등이 아닌 경우 반복검사 없이 “ - 이하”로 보고할 수 있음.\n분석기의 허용한계치는 각 장비의 확인하기 쉬운 장소에 문서화하여 보관.\n5. 측정가능범위 (AMR,  Analytical  Measurement  Range)\n1) AMR이란 희석이나 농축 등의 과정이 없이 검체를 측정하여 얻을 수 있는 타당성 있는 결과범위를 의미.\n2) 새 기기나 새로운 시약의 검사도입, 기기 또는 주요 부품을 교체하거나 시약의 주요한 변경 등이 발생한 경우 시약 설명서의 AMR이 명시되어 있어도 검사실 자체에서 이 범위를 검증하여야 함.\n3) AMR은 낮은값, 중간값, 높은값을 갖는 측정법에 맞는 성질을 갖고 있는 물질로 AMR을 검증 (AMR validation)하고, 검증한 결과는 문서화하여 보관(각 시약 설명서 참조)\n4) 낮은 농도는 LoD 또는 LoQ 로 대체할 수 있다.\n.\n5) AMR validation 사용가능물질.\n① 임상 검체 중 높은 값과 낮은 값을 가진 검체\n② 다른 비교 검사법이나 참고방법으로 검사를 시행한 임상 검체\n③ 적합한 matrix 성상과 목표치를 알고 있는 1차 혹은 2차 표준물질\n④ 측정 기기를 calibration하기 위해 사용하는 calibrator\n⑤ 적절한 matrix를 갖는 linearity material\n⑥ proficiency testing material\n⑦ Method manufacturer provide materials specific for AMR validation\n⑧ AMR범위에 해당하는 정도관리물질\n6) Calibration 주기가 6개월 미만인 경우, AMR 검증은 실시할 필요가 없으나 단, 이때 사용된\ncalibrator 물질이 AMR의 낮은값, 중간값, 높은값을 갖고 있어야 하며, AMR을 충분히 포함할\n수 있어야 함.\n7) Calibrator 수가 2개 이하인 경우, AMR 검증은 6개월마다 실시.\ni<AMR의 허용범위>\nR2 ≥ 0.95\nRecovery : ≤ ±10%\n※ AMR 검증을 위한 검체희석 방법\n6. 측정가능범위를 초과하는 검체에 대한 처리 방법\n1) AMR의 low level을 보고가능범위의 low level로 설정하고 AMR을 초과하는 결과값이 나온\n경우 적절한 값이 도출될 때까지 희석하여 검사 시행함을 원칙으로 하지만 일부 검사항목의 경우 임상적으로 유용한 한계 내지 한계점을 정하여 희석하여 보고.\n2) 희석된 결과값은 AMR의 25~75% 범위내의 값이 되도록 하며 최초 희석배수를 정하여 희석. 이는 과도한 희석 등으로 인한 검사결과의 불안전성을 해소하기 위함.\n희석된 결과값이 AMR의 25% 이하인 경우에는 재검을 실시.\n3) 제조사가 특별히 명시하지 않은 한 희석액의 종류는 낮은 농도의 환자검체로 함.\n희석배수 | 검체 (㎕) | 희석액 (㎕)\n1:2 | 100 | 100\n1:5 | 100 | 400\n1:10 | 100 | 900\n1:100 | 10 | 990\n4) 희석검사결과 보고방법: 희석된 측정 결과값 X 희석배수\n:“OOO 희석하여 재검한 결과입니다.”라는 소견을 입력하고 최종보고.\n5) 본원의 면역혈청장비는 전용diluent를 사용한다.\n[Atellica IM]\n2026.05 현재\n검사코드 | 참고치 | 단위 | AMR | 추가희석시 적정범위\n(25%~75%) | Diluent | Delta/\nCritical | Panic | Alert*\nAFP | L76101\nL28004\nLS3130 | ∠ 8.1 | ng/mL | 1.3~1000 | (dil=1:19)\n5000~15000 | Multi‑Diluent 2 | (2)\nX | 상한\n(8.1) | 상한\n(999)\nCEA | L76102\nL28005 | ≤ 5.0 | ng/mL | 0.5~100 | (dil=1: 49)\n1250~3750 | CEA DIL | (2)\nX | 상한\n(5.0) | 상한\n(99)\nCA19-9 | L76106 L28006 | ≤ 37 | U/mL | 1.2~700 | (dil=1: 99)\n17500~52500 | CA 9‑9 DIL | (2)\nX | 상한\n(37) | 상한\n(699)\nPSA | L76111 L28011 | ≤ 4.0 ng/mL | ng/mL | 0.03~100 | (dil=1: 9)\n250~750 | Multi‑Diluent 2 | (2)\nX | 상한\n(4.0) | 상한\n(99)\nCA15-3 | L28017 | ≤ 32.4 | U/mL | 0.5~200 | (dil=1: 9)\n500~1500 | Multi‑Diluent 1 | 상한\n(32.4) | 상한\n(199)\nPCT | L76032\nL29032 | ≤ 0.50 (pneumonia) | ng/mL | 0.03~50 | x | x | 상한\n(0.50)\nHCY | L29161\nL76048 | ⓜ 7~20 ⓕ7~17.5 | umol/L | 0.5~65 | (dil=1: 1)\n32.5~97.5 | HCY DIL | (2)\nX | x | 상한\n(64)\nCK-MB | L76002 | 5 ng/mL | ng/mL | 0.18~300 | x | (2)\nX | 상한\n5.1\nTnIH | L76003 | M :∠53.53\n F:∠38.64 | pg/mL | 2.51~25000 | x | (2)\nC(외래) | 상한\n300\nMyo-globin | L76004 | ≤110 ng/mL | ng/mL | 3~1000 | x | (2)\nX | 상한\n110\nBNP | L76005 | ∠100 | pg/mL | 2.0~5000 | x | 상한\n100\nE2 | L29056 | - | ng/mL | 12.0~3000 | (dil=1: 4)\n3750~11250 | eE2 DIL | X | x | 상한\n(2999)\nFSH | L29092 | - | m
