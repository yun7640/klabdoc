한 다른 기기로 검사 권장)를 실시하고 동일한 결과를 보이면 파트장병리사에게 보고.\n결과가 이미 보고된 후 오류가 발견된 경우, 즉시 파트장병리사 또는 진단검사의학과장(담당전문의) 에게 알린 후 담당 의료진에게 전화하여 사유를 설명한 후 결과를 수정한 다음 전산메모(소견)와 특이결과기록에 해당 내용(수정일시,수정 전 후 결과, 수정사유, 연락받은 사람, 연락한 사람)을 기록하여 전산입력.\n수정보고의 경우는 검사당일(접수일기준, 요일검사는 그 해당일) 오후 5시까지 보고.\n7-1) 문제의 발생이 장비고장으로 판명이 된 경우 문제 발견 된 시간대의 검체는 모두 전수 조사하며 이상 발견 시, 문제 발견 한 시간 전 검체 1개 검사 시행, 한 시간 전 검체 문제 발생 시 두 시간 전 검체1개 검사를 시행하고, 2시간 초과된 검체에 대해서는 담당전문의와 상의 후 재채혈 또는 재검사를 결정한다.\n8. 매일 검사 완료 후 결과를 통보하지 않은 결과가 있는지 확인(미완료 확인)하며 매일 아침 결과관리 화면의 미완료에서 환자별로 결과가 완료되지 않은 경우가 있는지 다시 한번 확인.\n진단검사의학과에서 나온 결과는 전산시스템에 저장되며 이미 저장되어 있는 높은 값, 낮은 값,\nCritical Values 등에 대하여 체크하게 되고 정해진 범위를 넘는 결과치는 미완료에 남게 되는데\n매일 담당병리사는 미완료와 결과 저장된 Data를 확인.\n9. Interface 되어 나온 결과는 전산시스템에 저장되어 담당자별 결과등록 화면에서 D/P 이나\nCritical Limit 에 해당되는 결과는 미완료에 결과저장 상태로 남아있게 되고 그 외의 정상소견의 결과는 자동통보 되어 완료화면에서 확인.\n일반적으로 TLA Line에 투입된 검체는 자동재검(Auto-Rerun) 시스템을 이용하여 자검체의 재검 또는 자동희석 재검을 이용하여 재검을 하고,\n필요시에는 검체상태를 육안적으로 파악하기 위하여 검체보관 Program에 저장된 모검체로 직접 재검 할 수 있음. (모/자 검체의 혈청정보도 동시에 확인)\n10. Delta/Panic 화면에서 비정상적인 결과는 과거결과와 비교하며, 필요하면 재검을 시행하고 이상이 없다고 판단되면 결과를 임상에 통보. (재검 시에는 가능한 다른 기기로 검사하는 것을 권장)\n1) LIS상으로 결과를 처리하는 검사는 최종보고 전 (미완료: 결과저장 △)에 Critical Error의 방지를 위해 Delta check 와 Panic value check를 반드시 점검함.\n2) KIS 상에 D/P 가 표시되면 우선 검체의 적합성 여부를 확인하고, 적합한 검체임이 판단되면 즉시 재검 또는 결과보고 함.\n3) 재검결과도 동일하면 최종보고 하며 소견입력 란에 “OOO 재검한 결과입니다.“라고 입력.\n11. Critical value\n검사실에서 정한 Critical Value를 초과하는 환자의 결과는 즉시 재검 한 후 보고일시, 통보자, 피통보자, 보고내용 등을 기록하여 SMS 또는 유선보고.\n수신자가 확인하였는지 여부는 진단검사 결과관리CVR 조회/통계를 통하여 확인.\n단, HIV Ab 의 경우 이전 결과도 Critical Value인 경우 재보고하지 않음.\n※ 자동화면역혈청 검사실의 즉시 보고해야 기준 (Critical Value)\n(1) HIV Ab: ≥1.0 Positive : 유선보고 * HIV 업무 flow 참고\n(2) TnLH: ≥53.53 (외래환자만) : SMS\n<결과보고까지 이어지는 순차적 자동검증 규칙>\n12. 혈청학검사의 보고\n1) 혈청학 검사의 이상결과\n항원 항체 검사의 결과가 기존결과가 있는 경우 Index값을 비교하여 재검여부를 결정하고\n기존결과가 없는 경우 재검을 시행하여 그 결과에 따라 소견입력란에 2)의 보고방법의 내용을 보고.\n<참고: 혈청학적 이상 결과의 해석>\n결과 | 내 용\nHBsAg(+) \n&\nanti-HBs(+) | ① 서로 다른 아형에 의한 중복감염 \n② HBV 변이 발생 : 고농도의 중화항체에 노출 시 HBs ’a’ 체액성 면역을 벗어나는 변이가 발생\nex) i) HBV(+)산모의 신생아에 HBIG 및 HBV백신을 접종한 경우\nii) HBV관련질환으로 간이식후 예방목적의 고농도의 HBIG 투여 받은 경우\n③ anti HBs와 유사한 클론의 항체반응이 일어나 HBs와 교차반응을 일으키는 \n비특이적 항체측정\n- 자연적으로 생성되거나 여러 종류의 항원자극에 의하여 발생한 항체\n- 비특이 항체에 의한anti HBs의 역가는 일반적으로 10 Index 이하\n- 심한 간질환의 만성HBV 보균자에서 관찰될 수 있는 검사소견\n– 이 항체는 특이적으로 HBs ’a’결정기와 결합불능으로 임상적 의미 없는 항체\n- Anti-HCV, Anti-HIV :모든 양성 검체에 대하여 2회 재검한다.\n- HBsAg: 기존 결과 양성인 경우를 제외하고 양성일 경우 2회 재검한다.\n해당 키트의 별도의 gray zone 이 없으므로 모든 양성구간 동일하게 재검한다.\n★★ 2회 재검결과 ; -/+,+/-또는+ / + : [ Positive], - / - : [ Negative ]\n- 모든 재검의 경우, ①자검체 결과일 경우, 모검체로\n②재검 전 원심분리 재실시\n③ Resample이 가능하다면, Resample하여 재검.\n④ 동일장비가2대 인 경우 1차 분석장비와 다른장비로 재검하는 것을 권장한다.\n- HBsAg, anti-HBs가 재검 후에도 동시 양성인 경우 보고\n(2) 보고방법-코멘트\n검사항목 | 결과 | 내 용\nHBs Ag\n(HBV) | 양성 ≥1.0\n[초진] | HBsAg 재검한 결과이며, clinical correlation 필요합니다.\n필요 시 HBV PCR 및 HBV 관련 혈청학적 검사를 추가로 시행하여 \n결과를 확인하시기 바랍니다.\nHBs Ag/Ab 동시양성\n(HB+) | Ag/Ab 재검 | HBs Ag/Ab 동시 양성으로 다른 subtype 감염이나 seroconversion의 경우 드물게 나타날 수 있으나 HBs Ag 재검 및 HBV DNA, Anti-HBc Ab 검사 시행하여 확인이 필요합니다.\nHCV Ab\n[CV+] | 양성 ≥1.0\n[초진] | HCV Ab 재검한 결과이며, 과거감염 및 생물학적 위양성 가능성도 있으므로 \ncurrent infection의 확인을 위해 HCV RNA 검사를 시행하시기 바랍니다.\nHAV IgM | 0.80 to 1.20 | HAV IgM 수치가 grayzone 으로 1주 이후 follow up이 권장됩니다.\nCMV IgM\n[CMV] | Equivocal \n0.85≤ -<1.0 | Reactive 기준은 아니지만 수치가 높으니 CMV IgM Avidity 검사를 시행하거나 f/u 권장합니다.\n문의전화:면역혈청검사실/진검의국(T.5580)/교수 문희원(T.5583)\nⅢ-8. HIV 검사 업무 Flow\n2026.05. 작성 및 적용\n1. HIV 양성\n① HIV 검사결과 양성인 경우 모 검체를 찾아 Alinity 장비와 Atellica 장비에 교차하여 확인검사를 시행하고 2회 이상 재검하여 보고한다.\n- Alinity (+)/Atellica(+) (+)\n- Alinity (+)/Atellica (-) (-)\n- Atellica (+)/Alinity (-) (-)\n② 재검결과 양성(+/+)일 경우 아래 지침에 따른다.\n[외래/병동]\n- 외래 해당과 연락-> 보고시간 및 피 통보자(주치의 & 담당간호사),\n소견입력 [1 ]또는[AA ] : \"HIV Ab 초기검사 Reactive ( )로 보건환경연구원 확인검사가 의뢰되며, 감염내과 진료보시기를 권고합니다.\nHIV 감염을 의심하는 것은 아니므로, 재검사유설명 시 주의를 요합니다.\" 를 기록한다.\n- 검체량 부족 시(검체 2.5ml이하 검체)- LIC011 HIV 확인검사처방.\n- 의뢰서: [법정감염병관리-> 가검물시험의뢰서->HIV/AIDS(보건환경-확인검사)]\n- 감염내과 담당간호사: Tel. 8176\n- 헬스케어 담당간호사: Tel. 8210\n[ 야간근무, 당직시 ] ** 결과코드 확인 **\n① 주치의, 병동담당간호사 유선보고 후 의뢰서 작성 요청,.\n검체량 부족(2.5mL 이하)시 LIC011 HIV 확인검사처방 처방요청.\n② HIV 보고 : 소견입력 [1 ] 에 통보(유선보고)일시, 피 통보자 기록하고,\n결과 란에 ‘HIV 확인검사요함’ [“0” Enter] 중간보고 한다.\n③ 담당자에게 인계 -> 담당자는 감염관리 담당자(7053)으로 유선보고\n2. CHIV Positive 시 확진 검사 의뢰 : 엑셀파일에 정보등록(바탕화면 HIV 확인검사 파일)\n1) LIC011 HIV 확인검사: 원내 Screening 검사 Positive - 의뢰검체 부족 시 처방\n2) LIC012 HIV (미결정)-질병관리본부; 보건환경연구원/질병관리본부 확인검사 결과 미결정(보류)로 재검사 필요 시 처방\n검사\n코드 | 검사명 | 검체의뢰 접수\nLIC011 | HIV 확인검사\n[검체량부족-처방] | - 검체 : serum 2.5cc 이상 분리(Micro tube) HIV의뢰표시\n- HIV 확인검사 장부에 검체정보기록(바탕화면)\n- 의뢰서: 작성된 의뢰서 조회하여 검사결과 및 측정시약정보 입력 -> \n출력 시 검체의뢰번호: 연도-01-건국대-월-등록번호: 환자이름정보대신) 표기\nLIC012 | 확인검사결과 미결정(보류) \n또는 \n초기감염의심 | - 검체: EDTA 6ml 2개, Heparin 8ml 2개 채혈, HIV의뢰표시\n- HIV 확인검사 장부에 검체정보기록(바탕화면) \n- 의뢰서: 작성된 의뢰서 조회하여 검사결과 및 측정시약정보 입력 -> \n출력 시 해당 검체의뢰번호: 연도-01-건국대-월-등록번호: 환자이름정보대신) 표기\n① 의뢰서 출력 및 검체준비\n** 의뢰서요청: 진검의국 요청-5580 또는 담당 주치의\n[의뢰서] 해당환자조회 -> 법정감염병관리 -> 외부기관시험의뢰서 -> HIV/AIDS(보건환경-HIV확인검사)\n또는 HIV/AIDS(질병관리-미결정, 18개월미만) -> 조회하여 검사결과 및 측정시약정보입력 저장\n[의뢰서 출력] 가검물시험의뢰서조회-> HIV/AIDS(보건환경- HIV확인검사 -> 출력\n검체시험의뢰서조회-> HIV/AIDS(질병관리-미결정, 18개월 미만) -> 출력\n** 검체는 뚜껑을 잘 닫아 검체 bag에 잘 넣어 주고, 한번 더 의뢰서와 함께 검체 bag에 동봉\nSCL 에서 접수하여 각 기관에 의뢰\n② 질병관리청 방역통합정보시스템 검사의뢰접수현황관리-> 의뢰서 작성\n③ 성명[검체번호]: 해당연도-01건국대-월-등록번호[이름]\n예시: 2019.06.: 19-01건국대06-등록번호[홍*동]\n④ 검사의뢰정보 검사명 및 검사방법 선택란 은 클릭 시 생성 됨.-> 검사의뢰\n⑤ 결과보고: 질병관리청 방역통합정보시스템 검사의뢰접수현황관리 - PDF 파일 결과\n-> jpg 변환하여 이미지 보고.\n-> jpg 이미지 결과 보관.\nⅣ. 사고 오류발생\n모든사고나 오류는 즉시 파트장에게 보고 하며 파트장은 이를 담당전문의(진단검사의학과 과장)와 지침에 의하여 조치방법을 결정하고 신속이 대처함\n검체채취, 검사시행 및 결과보고의 모든 과정에서 발생할 수 있는 검사 오류들은 다음과 같이 세가지로 분류하며 이에 따른 적절한 조치가 반드시 취해져야 함.\n검사 오류의 최종책임은 자동화검사 담당전문의에게 있음.\nCategory I, II의 문제발생은 문제발생보고서를 작성해야 하며,\nCategory I 은 진단검사의학과 질향상위원회에 정식 보고 되고\nCategory II는 담당전문의의 관리를 받으며\nCategory III은 각 검사실내에서 자체 해결함.\n1. 심각한 오류 (Category I - Serious)\n검체 채취, 검사시행, 결과판독 및 보고 과정에서의 오류로 검사결과를 잘못 판독하거나, 잘못된 검사를 시행한 경우 혹은 검사시행시 환자의 검체가 바뀌어 잘못된 진단을 초래한 경우로서 절대 발 생하지 않도록 함.\n1) 내부적 오류\n(1)오류발생의 원인이 진단검사의학과에서 발생된 경우로서 담당병리사는 결과오류수정기록을 작성하여 파트장의 확인 후 자동화검사 담당전문의에게 제출하여야 하고 담당전문의는 그 원인을 파악하고 적절한 조치를 취한 후 보고서에 조치사항을 기록하고 서명한 후 진단검사의학과 질향상회의에 보고서를 제출함.\n. (2)진.검 질향상회의는 이를 검토한 후 특정 결정사항이 있는 경우 보고서에 작성하여 회의의 팀장인 진단검사의학과장에게 제출하여 서명 받은 후 간사인 진.검 팀장이 보고서를 최종 보관함.\n2) 외부적 오류\n(1)오류의 원인이 진단검사의학과에서 발생된 것이 아니라 외부에서 비롯된 것으로 담당병리사는 결과 오류수정기록을 작성하여 파트장에게 보고 후 자동화검사 담당전문의에게 제출하여야  하며 담당전문의는 오류발생을 임상의사에게 통보하고 추후 같은 일이 발생하지 않도록 적절한 방법을 의논한 후 보고서에 조치사항을 기록하고 서명한후 진단검사의학과 질향상회의에 보고서를 제출함.\n(2)진.검 질향상회의는 이를 검토한 후 특정 결정사항이 있는 경우 보고서에 작성하여 회의의 팀장인 진단검사의학과장에게 제출하여 서명 받은 후 간사인 진.검 팀장이 보고서를 최종 보관함.\n2. 중대한 오류 (Category II - Major)\n위의 1. 심각한 오류 (Category I - Serious) 의 경우이나 최종보고하기 전 (예비보고 ○)에 발견한 경우로 이 또한 절대 발생하지 않도록 함.\n1) 담당병리사는 전산메모(소견)와 특이결과기록에 해당내용(수정 전,후 결과, 수정사유, 연락받은사람, 연락한 사람)을 기록하여 전산 입력하고 업무일지에 내용을 기록하여 파트장에게 보고 후 담당전문의에게 제출하여야 하고 담당전문의는 그 원인을 파악하고 적절한 조치를 취한 후 필요한 경우 보고서를 받아 조치사항을 기록하고 서명한 후 보관한다.\n2) 담당전문의는 오류발생의 원인을 파악하거나 오류해결을 위해 필요한 경우 임상의사에게 전화로 통보하고 이를 기록하고 서명함.\n3. 경미한 오류(Category III- Minor)\n검사를 시행하는 과정이나 사무적 착오가 발생한 경우로 환자의 검사결과에는 결정적인 영향을 미치지 않은 경우다.\n담당병리사는 파트장에게 이를 보고하고 파트장은 이에 대한 적절 한 조치를 취하고 필요시 문제발생사유서를 기록해 둠.\n<오류 및 수정보고 체계>\n(1) 오류 발생시는 결과를 즉시 수정하며,\n결과가 이미 verify 된 후 진단검사의학과 병리사에 의해 또는 임상으로부터 검사결과의 의심 또는 오류가 발견된 경우(최종보고수정) 에는\n우선 파트장병리사와 담당전문의에게 알린 후 결과를 수정하고\n담당 의료진(의사 또는 간호사)에게 전화하여 사유를 설명.\n(2) 결과보고 오류내용과 결과 수정 내역을 결과수정 점검기록 에 기록한 후 통화내역 등 모든 과정도 기록한 후 수정 전, 후 결과를 print screen 해두고 KIS 결과보고 소견에도 장부에 기록한 내용을 입력.\n(3) 수정된 검사결과는 원칙적으로 통상보고일자 내에 보고 되어야 함.\n매일 시행하는 검사는 당일보고, 검사일이 정해진 검사는 해당검사 당일 또는 익일 오후 5시까지 보고 되어야 함.\n(4) 수정된 결과와 함께 수정 전 결과와 수정사유, 수정일시가 보고서에 명시되어야 하며 수정결과를 통보 받은 담당의사 또는 의료진에 대한 정보를 지침에 따라 기록하고, 연속적으로 수정을 반복한 경우 수정된 결과와 일시 등이 순서대로 보고 되어야 한다.\n(5) 문제 발견 된 시간대의 검체는 모두 전수 조사하며\n이상 발견 시, 문제 발견 한 시간 전 검체 1개 검사 시행, 한 시간 전 검체 문제 발생 시 두 시간 전 검체1개 검사를 시행하고, 2시간 초과된 검체에 대해서는 담담전문의와 상의 후 재채혈 또는 재검사를 결정한다.\n(6) 원래 결과와 수정된 결과는 2년 이상 보관.\n(7) 결과오류 수정에 관한 관리는 진단검사의학과 질향상회의에 보고되어, 진검 팀장 및 과장은 진단검사의학과 key indicator관리 중 [결과 수정율(‰₀)]로 관리함.\nⅤ. 장비 및 기기 관리\n자동화학검사실에서 사용되는 모든 기기 및 장비는 정해진 규격에 따라 주기적으로 그 기능을 검증하며 장비 기능을 효율적으로 유지하고 고장 예방을 위해 청결상태 유지, 점검 목록 등을 마련하여   매일 이를 체크하고 기록.\n이상이 발견된 경우에는 즉시 파트장병리사 또는 담당전문의에게 알려 적절한 조치를 취할 수 있게 함.\n1. 일반 원칙\n1) 모든 장비 및 기기는 기능확인과 장비 유지 및 보수 기록 장부를 준비함.  또한 주기적으로 정해진 점검표에 따라 기능을 확인. 유지, 보수에 관한 어떠한 형태의 조치든 각 장비나 기기의 유지 및 보수 기록 장부에 빠짐없이 기록되어야 함. 기록 양식은 각 장비 지침에 포함되어있는 경우 이를 이용하고, 개별적 양식이 있다면 지침에 별첨하여 사용.\n2) 일부 장비는 공급 회사 또는 의공학과의 예방적 점검을 정기적으로 시행하고 이를 기록.\n3) 장비에 관한 매뉴얼, 유지 및 보수기록은 해당 장비가 있는 장소에 비치, 보관.\n4) 모든 장비 및 기기에 대한 유지 및 보수의 일차적 책임은 담당자에게 있으며 이를 관리하는 책임은 파트장병리사에게 있으며 이상 발생시 팀장 및 담당전문의 (또는 과장)에게 보고.\n5) 장비에 대한 모든 기록은 장비 폐기시까지 보관하며 폐기 후에는 의공학팀으로 이관.\n2. 분석장비\n1) 기기 및 장비의 관리\n(1) 검사실의 분석 장비 및 중요장비는 단전에 대비하여 UPS (Uninterrupted Power Supply)\n체계를 갖추어야 함. 검체 분석 장비는 반드시 UPS 전원을 설치함.\n(2) 전기상태의 문제 발생시 의공학팀 및 시설팀에 즉시 통보하여 해결.\n(3) 각각의 maintenance chart를 참고하여 분기마다 시행하고, 청소와 정기점검의 시행하고 이를 기록함.\n(4) 지침에 따라 Calibration 및 정해진 표준물질을 사용하여 기기의 정확도 및 정밀도를 평가.\n(5) 모든 장비의 control value, instrument function, temperature가 한계치를 넘으면 지침에 따라 corrective action을 취하여 수정하고 기록.\n(6) 담당자는 매일매일 정도관리 물질의 결과를 확인하여 결과가 허용치를 벗어날 경우 지침에 따라 재검과 Re-calibration등 필요한 조치를 취함.\n(7) 검사가 끝나면 기기를 세척하고 장비를 점검. (Daily maintenance)\n2) 자동화면역혈청검사실 점검 장비\n- Atellica IM (SIEMENS) 2대\n- Cobas 8000 e801(Roche) 2대\n- Alinity i (Abbott) 2대\n3) Carry-Over 검증\n- 일회용 Tip을 사용하는 장비를 제외한 자동pipette 장착장비(Alinity i)는 정확도와 재현성을 1년에 2회 점검하고 기록을 보관.\n- Carry Over율 허용범위 : <1%\n- 최초 기기 도입시 혹은 대규모의 기기점검 및 보수 후에는carry-over를 평가.\n(1) Carry over에 대한 평가 기준\n자동Pipette의 정기점검시 허용범위:  ± 1% 미만\n자동화 장비부속 pipette의 허용범위:  ± 1% 미만\n(2) 기기부착 Pipette carry-over 점검방법\n고농도 검체 연속 4회(H1, H2, H3, H4) → 저농도 검체 연속 4회(L1, L2, L3, L4)\n검사 방법 : 각 종목의 HIGH 검체, LOW 검체를 각각 4회 검사하여 아래 계산식에\n의하여 오염율을 구함.\n검사 순서 :  High - High - High - High - Low - Low - Low -Low\n계산식\n3. 기기 및 장비(일반공통기구)\n1) 온도계 관리\n(1) 온도 점검하는 모든 장비는 원칙적으로 매일 온도를 확인하며  관찰 결과를 수기로 기록.\n표준온도계 도입시 1주일간 냉장, 냉동 상태에서 비교한 후 사용하며,\n온도계 식별표에 그 차이를 기록하여 부착함으로 측정되는 온도의 정확성을 판단할 수 있게 함.\n(2) 새로 구입한 온도계는 표준온도계와 비교 시 허용범위 (± 1℃) 를 벗어날 경우 폐기함.\n표준온도계와 비교방법 : 표준온도계로 1-2시간이상 안정화 후 온도비교.\n(3) 자동화검사실에서 사용하는 모든 온도계는 1년에 2회 점검하고 기록을 보관.\n2) 원심분리기(Centrifuge)\n(1) 사용시 주의점\n- 적당한 균형을 위해 0.5g 의 범위 안에서 양쪽 다 무게를 점검.\n- 온도를 사용할 때 작동하는 동안 온도가 유지되는지 점검.\n- 냉장 원심분리기는 RPM 3,500 이상 사용하지 않음.\n- 원심분리기를 사용할 때 사용 용도에 따라 속도와 시간을 유지.\n* 혈청 분리: 2465G (3,500 RPM) / 7분\n(2) 점검사항\n- 원심분리기는 문이 정확하게 닫은 것을 확인한 후 작동을 시작.\n- 뚜껑이 없는 튜브, 인화성 액체 등은 원심분리 하지 않음.\n- 작동이 멈춘 것을 확인한 후 원심분리기의 뚜껑을 개방.\n- 원심분리기 헤드에 손을 대어 멈추게 하거나 속도를 늦춰서는 안됨.\n- 수염, 넥타이 등은 작동중인 원심분리기와 일정한 거리를 유지하여 사고를 미연에 방지.\n- 수시로 원심분리기는 이물질이 없도록 깨끗이 청소.\n- 3개월마다 속도를 점검하여 ± 0.5% 이내에 드는지 확인.\n- 6개월마다 전기접속부위의 상태를 점검.\n- brush, rotor, burket 등 소모품은 필요시 교체.\n★ tachometer를 이용해 특정된 속도의 허용한계는 ± 0.5%  이며, 이 한계를 벗어날 경우,\n의공학팀을 통해 장비회사에 연락하여 전반적인 수리를 받도록 함.\n3) 냉장고 및 냉동고\n(1) 점검사항\n① 매일\n- 온도를 점검한 후 기록하고 확인 서명.\n허용범위를 벗어난 경우, 파트장병리사에게 알려 조치하고 조치내용을 기록.\n<온도허용범위>\n* Deepfreezer : ± 0.5℃ ( -15 ~ -25 ℃)\n* 냉장고: 2 ~ 8℃\n- 허용범위를 벗어날 경우 냉장고 내에 있는 시약, 정도관리물질 등은 즉시 다른 냉장실로\n옮기고 시약의 안정성을 점검.\n- 냉장고 문을 열었을 때 내부 공기순환 송풍장치가 작동하는지 확인하고 팬이 회전 하는지\n점검.\n- 냉동고의 경우 내부성애가 문의 작동을 방해하거나 저장공간을 크게 감소시키는지 여부를\n점검.\n② 매 6개월, 또는 필요시\n- 냉동고의 얼음을 제거. 최소한 내부의 얼음이 1㎝이상 쌓이기 전에 성에제거를 실시.\n<방법>\na. 냉동고 또는 드라이 아이스가 포함된 박스에 내용물을 옮김\nb. 전원코드를 콘센트로부터 분리.\nc. 녹은 얼음이 흡수되도록 냉동고 주위에 두꺼운 타올을 놓음.\nd. 냉동고 문을 열고 실온에 이르도록 하고 빨리 실온화 시키기 위해 따뜻한(뜨겁지\n않은) 물을 냉동고 안에 넣음.\ne. 긁개, 나무, 플라스틱 긁개 또는 다른 기기를 이용하여 붙어있는 얼음을 제거.\nf. (주의) 날카로운 기구로 얼음을 제거하지 말고, 만약 실수로 내부의 코일을 손상\n시켰을 경우 다시 사용하기 전에 서비스를 요청.\ng. 내부 청소 후 냉동고 문을 닫고 전원을 연결한 후 최소한 1시간 정도 온도를 점검.\n이때, 냉동고 온도는 설정된 온도를 유지하고, 내부온도가 설정된 온도 상태로 유지되면\n내용물을 다시 냉동고안에 채움.\ne. 성애방지 기기의 경우 배출팬을 점검하여 물이 고여 있는지, 배출관이 다른 곳으로\n빠져있지는 않은지, 배출관에서 물이 잘 배출되는지 점검.\n<Deepfreezer 얼음 제거>\na. 플라스틱 주걱 또는 나무 긁개를 사용하여 가루형태의 얼음을 컵이나 쓰레받기로 받음.\nb. 가볍게 치거나 두드리면서 가스켓 주위의 얼음을 제거하고, 제거된 얼음 조각이\n냉동고 안쪽이나 바닥에 떨어지지 않게 하고, 떨어져 나온 조각은 즉시 싱크대에 버림.\nc. 내부를 연한 비눗물로 닦아 내고 행구어 말리고, 부드러운 헝겊을 사용하여 냉동고 내부의\n물기를 제거한 후 건조.\n③ 매년\n- 전원코드를 점검.\n- 수평자를 이용하여 바닥과 수평이 되는지 점검.\n- 외부 알람 시스템을 사용한다면, 알람이 작동하는지 확인.\n4) 자동 피펫\n(1) 자동파이펫은 정확성과 재현성을 위해 1년에 2회 이상 점검하여야 하며 점검기록은 담당 파트장(분자유전)이 보관한다.\n(2) 파이펫 점검절차\n① 공기의 큰 흐름이 없는 실내온도 15℃ ~ 30℃의 방에서 실시한다.\n② 측정 가능한 저울과 안정적인 테이블을 준비한다.\n③ 파이펫 점검 시 3차증류수를 사용하며 측정장소의 온도 및 습도를 확인한다.\n③ < 흡입할 때 >\n- pipette을 수직으로 잡는다.\n- 테스트할 액체에 2~3mm 정도 tip을 담근 후 천천히, 변화량 없이 흡입한다.\n< 분주할 때 >\n- 천천히, 일정하게 첫 번째 step까지 분주한다.\n- tip안의 남은 잔량을 제거하기 위해 두 번째 step(blow-out)까지 button을 누른 후 양을 측정한다.\n< Leak test >\n- 팁에 용액을 채워 약 15초 동안 수직으로 들고 용액의 새는 여부를 알아본다\n④ 5회 측정값을 문서화한다.\n(3) Evaluation\n① 무게의 부피환산을 위한 Z-factor를 사용한다.: volume = 25℃ 기준 저울측정값(mg) X Z- factor 1.004\n( Z factor data)\n② 정확도 (Systemic error %, Inaccuracy): z-factor로 환산한 volume값 - target volume/ target volume\n③ 정밀도(Random error %, imprecision): SD/mean x100\nSystemic error(%) | Random error(%)\n10 ul\n1.0 ul | 2.0%\n6.0% | 0.8%\n4.0%\n200 ul\n20.0 ul | 0.8%\n4.0% | 0.3%\n1.5%\n100 ul\n10.0 ul | 0.8%\n4% | 0.3%\n1.5%\n1000 ul\n100.0 ul | 0.8%\n4% | 0.3%\n1.5%\n20 ul\n2.0 ul | 1.0%\n5% | 0.5%\n2.5%\n1000 ul\n100.0 ul\n(multipette) | 1%\n5% | 0.4%\n2%\n(4) 허용범위:\n** 참조: Tietz 및 ISO8655 tolerance range **\n(5) pipette 의 모든 부분은 비눗물 또는 소독용 알코올로 청소 가능하며 상기 용매로 청소된 부분들은\n증류수로 헹구며 Pipette이 건조된 후 조립한다.\n(6) 허용범위를 벗어나는 파이펫은 팀장님께 보고 후 수리, 점검을 진행한다.\n(7) 자동 파이펫은 수시로 내부와 외부를 청소해주어야 하며 검사종료 후 매일 UV로 소독한다.\n(8) 자동 파이펫의 정확성을 비중법으로 검증하는 경우, 합당한 표준분동을 이용한 분석평형저울 점검이 선행되어야 한다. (자체검검-연 2회, 정기점검-연 1회 실시)\n5) Glass ware\n(1) 자동화 검사실은 정확성이 공인된 (class A) 용적 측정용 유리용기 만을 사용함.\n- 본 검사실의 Volumetric pipette 은 정도관리물질과 시약제조에 필요한 D.W만 사용함.\n- 다른 화학적 재료들과 혼용하지 않음\n(2) 세척 : 증류수로 2~3회 세척.\n(3) 꺠지거나 손상된 Volumetric pipette 은 즉시 폐기.\n6) 전기점검\n① 검사실의 분석 장비 및 중요장비는 단전에 대비하여 UPS(Uninterrupted Power Supply)체계를\n갖춤.\n② 전기상태의 문제 발생시 의공학팀 및 시설팀에 통보하여 즉시 해결.\n③ 전기상태를 포함하는 Low risk 장비 및 비품은 LIS - 공통 – 자산관리 – 의료기기 일상점검을 통해 파트장 병리사가 매월 점검한다.\n7) 문제 발생시 해결체계\n(1) 장비 담당자는 고장의 원인과 증상을 파악하여 파트장병리사에게 보고.\n(2) 기기회사에 직접 수리를 요청할 경우 파트장병리사는 의공학팀 (☎ 5959)과 상의하여 연락.\n이상발생 시간과 비용 발생 등 상세내용을 대장에 기록하고 팀장에게 보고.\n(3) 문제 해결이 지체되어 결과보고에 지장을 초래 할 경우 반드시 담당전문의 또는 진단검사의학과장\n에게 보고하여 대책을 마련.\n(4) 수리 후 수리기록을 반드시 받아 보관하고 장비점검대장에 기록함.\nⅥ. 자료보관 및 기록\n1. 자료보관\n1) 외부정도관리 결과는 4년 보관을 원칙으로 함.\n2) 내부정도관리 결과는 2년 보관.\n** 검토 완료된 Law Data 폐기한다.\n3) 장비관리에 대한 기록은 그 장비 보유기간 동안 보관함.\n4). 영구적으로 보관되어야 하는 문서\n- 환자의 검사결과는 적어도 10년 이상, KIS의 영구보관.\n2. 기록\n1) 갑자기 일어난 문제나 사고는 업무일지(인수인계장부)에 기록하여 다음 근무자가 이를 참고하고,\n모든 병리사는 근무 시작시간에 업무일지를 확인.\n인수인계자는 다음 근무자와 함께 업무일지를 검토, 서명.\n2) 업무일지에는 시행한 내부정도관리결과와 조치사항, 기기의 기능점검 내용 및 상태 기록을 비롯한\n온도유지 장비의 온도점검 기록을 포함하여야함. 또한 부적합검체 관리기록, 최종보고 후 수정기록\n및 휴가자 대체에 관한 내용 등 자동화학부서의 업무내용이 기록.\n3) LIS에 error message가 나타날 경우 이를 메모하고, 주간 근무 중 에러메시지가 나타나면 이를\n파트장병리사나 의료정보팀에 알림.\n4) KIS가 다운될 경우 이를 담당전문의, 파트장병리사, 의료정보팀(☎ 7048)에 즉시 알리고,\n전산 다운시 행동지침에 따라 검사, 기록 처리.\nⅦ. 업무규정\n1. 자동화 면역혈청 업무 일반원칙\n1) 면역혈청과 관련된 업무 및 검사를 수행하며, 면역혈청업무를 숙지한 담당병리사에 의해 수행.\n2) 면역혈청 업무 시간\n(1) 주간근무(평일:월~금) : 08:30 ~ 17:30\n(2) 야간근무 : 17;30 ~ 익일 08:30\n(3) 당직근무(토요일, 일요일, 공휴일) : 08:30 ~ 17:30\n3) 모든 면역혈청 근무자는 근무 교대 시 마다 업무일지를 통하여 서로 인계하며 중요사항은 구두로\n재확인함.\n4) 평일의 정규검사 검체 접수 마감 시간은 15:30로 하되, 토요일은 10;30 으로 함.\n공휴일 및 일요일은 진단검사의학과 접수 파트 당직자가 확인 접수하며 다음 평일 08:30이전에\n면역혈청검사실로 인계.\n5) 자동화/면역혈청 담당자는 검사업무를 수행하기 전에 검사에 필요한 모든 기구 및 시약, 재료 등을\n준비하고 점검해야 하며, 특히 온도 기록을 요하는 냉장고 기계에 대하여는 매일 정해진 점검\n시간에 온도를 읽어 기록함.\n6) 담당자가 휴가시 대체근무자(검사자 4) 담당자와 같이 시약의 재고 밎 기기, 장비의 상태 등을\n인수인계하고 업무일지에 서명.\n7) 업무규정을 어기는 일이 발생하면 그 다음날 오전 중으로 파트장병리사가 상황을 검토, 조사하여\n그에 대한 적절한 조치를 취하고 그 내용을 기록, 보관하고 자동화검사 담당전문의에게 상황을 보고.\n8) 파트장병리사가 부재중 일 때는 파트장병리사 다음의 담당병리사가 파트장병리사가 총괄하는 전반적인 업무를 대행하고, 수행된 결과는 자동화검사 담당전문의가 검토하며 파트장병리사는 그 다음날 오전 중으로 업무일지를 통하여 부재중에 있었던 상황을 점검.\n9) 직무교육\n(1) 자동화검사실 임상병리사는 진단검사의학과에서 주관하는 직무교육에 반드시 참여함.\n(2) 자동화검사실 자체에서도 업무에 관련된 주제를 정하여 직무교육을 실시.\n10) 작업공간 : 검사실 공간은 업무수행 및 안전관리에 충분할 수 있도록 함.\n2. 업무기술서(자동화 임상화학/면역혈청)\n1) 자동화검사실 병리사는 다음과 같은 업무분담표에 따라 각각의 업무를 수행.\n2) 검사의 신설 등으로 신규 업무가 추가발생하면 파트장병리사는 담당전문의와 검사담당자들과 의하여 업무를 적절히 재분배하고 운영지침서에 기록.";
SEED_CH="Ⅰ. 운영지침서의 개요\n운영지침서 [B-01-03]\n진단검사의학과 자동화학검사실 임상병리사(면허소지자)는 정도관리에 관련된 업무를 수행하고 기록하며 이상이 발견되는 즉시 적절한 조치를 취할 의무를 가지며 (정도관리담당) 또는 파트장과 진단검사의학과장(담당전문의)는 이에 대한 통합 관리의 책임을 가짐. 아래와 같은 기본원칙으로 시행함.\n자동화학 운영지침서는 다음과 같은 목적으로 작성되었음.\n1) 외부 및 내부정도관리 지침의 설정\n2) 외부 및 내부정도관리 지침의 교육 및 시행\n3) 검사실 정도관리의 평가지침 준수\n4) 검사실 정도관리 프로그램의 수준향상 및 향후 계획 설정\n5) Calibration 및 QC의 시행지침\n6) 지속적인 질관리(Quality management)\n7) 시약관리 및 분석장비(분석기) 관리\n8) 결과보고 및 검체관리\n9) 일반기구 및 장비관리\n10) 자료보관 및 기록\n11) 업무규정\nⅡ. 외부정도관리 (External Quality control)\n국내 외부정도관리에 적극 참여하며 그 결과를 (정도관리담당) 또는 파트장, 담당전문의(진단검사의학과장)가 적극적으로 검토함. 문제점이 발생한 경우 담당병리사는 이에 대한 조치사항을 기록하고 보완하여 외부정도관리 평가 및 대책기록서에 기록으로 남겨 4년간 보관함.\n외부정도관리를 받지 아니하는 항목에 대해서는 연 2회 타 검사기관과 Proficiency Test, CAP Survey 및 진단검사의학회에서 권장하는 외부정도관리 미시행 대체프로그램을 선택하여 시행함.\n검사실에서 시행되고 있는 전체 검사 종목과 외부정도관리를 시행하지 않는 종목의 리스트를 작성함.\n1. 외부정도관리 시행지침\n1) 외부 정도관리 검체분석은 실제 환자의 검체와 동일한 방법으로 동일한 검사자인 소속 임상병리사에 의해 시행하며, 반복검사를 시행해서는 안되고, 외부정도관리물질의 검사를 위해 내부정도관리를\n다시 시행하지 않음.\n2) 외부정도관리 분석결과를 보고하기 이전에는 외부검사실 간의 어떠한 형태의 의사교환이나 검체\n교환이 있어서는 않됨.\n3) 외부정도관리 시행시 본원 감염환자 검사와 동일하게 LIS 에서 처방등록하고, 채혈에서 검체 바코드를 출력하여 EQC 검체에 붙여 검사시행함. 결과 또한 환자결과와 동일하게 LIS –담당자 별결과관리를 통해 확인함.\n4) 외부정도관리 결과와 타 기관과의 비교검사 결과는 매 회마다 평가일로부터 한 달 이내에 결과를 분석하고 문제가 있는 경우 대책을 수립하여 대책을 적절하게 시행한 자료를 보관하고, 이에 대하여 담당전문의가 적극적으로 검토함.\n5) 국내 외부정도관리는 대한임상검사정도관리협회 신빙도조사사업 프로그램에 따라 실시함.\n[표 1] 참조.\n- 실시기관 : 대한진단검사정도관리협회\n- 일반화학검사 : 연 4회\n- 단백면역검사 : 연 2회\n- 보체면역글로블린검사 :연 2회\n- 감염성세균항원항체검사 : 연 2회\n- 뇨화학검사: 연 2회\n- 정확도기반 지질검사 : 연 2회\n- 정확도기반 Creatinine검사 : 연 2회\n- 정확도기반 Glucose검사 : 연 2회\n- Cystatine C : 연 2회\n- 일반치료적약물검사 : 연 2회\n- Creatinine 데이터 품질평가검사 (시범)\n- 암모니아검사 (시범)\n- HIL index (시범)\n6) 환자가 직접 내원해야 하는 검사종목과 검체특성상 변화가 심한 항목은 평가대상에서 제외함.\n7) 외부정도관리 평가\n(1) 외부정도관리 결과는 각 항목별 세분류 SDI수치로 평가함.\n- 세분류 SDI가 없는 경우 기준분류 SDI수치로 평가함.\n- 참여기관 수 (n= ≤10)로 SDI가 산출되지 않는 항목은 검사실간 비교검사 평가지침에 준하여 평\n가함.\n- 국내에 비교기관이 없는 경우(n= ≤1) Lot. No.가 동일한 Q.C 물질을 사용하는 Global Peers\n의 해당기간 Mean, SD, CV 정보를 받아 SDI 산출하여 담당전문의가 평가, 대책 마련할수 있음.\n(2) 각 분과별 평가기준의 세부사항은 해당 평가서에 개별 표기함.\n외부정도관리평가 허용기준\n평가\n평가대응책\n정량\nSDI: ≦ ±2.0\nAccept\n현행유지\nSDI: › ±2.0\nUnaccept\n원인분석 및 개선조치\n정성 /\n반정량\n집계결과(정답)와 100% 일치\nAccept\n현행유지\n집계결과(정답)와 불일치\nUnaccept\n원인분석 및 개선조치\n(3) 전문의 검토, 서명된 결과지와 평가서는 [외부정도관리]장부에 보관함.\n(4) 외부정도관리 허용기준 벗어난 경우 조치사항\n① Proficiency Test 실시하여 평가하고 전문의 검토 확인.\n② 가능할 경우 외부정도관리 보관 물질 재검사 실시.\n③ 필요 시 검사실간 비교검사 허용기준 벗어난 경우의 조차사항에 따름.\n2. 검사실간 비교검사 (Interlaboratory test) 시행지침\n- 외부정도관리 시행지침에 준하여 시행함.\n1) 검사실에서 시행되고 있는 전체 검사종목과 외부정도관리를 시행하지 않는 종목의 리스트를 작성 하고 외부정도관리를 실시하지 않는 검사종목에 대하여 환자검체를 이용하여 6개월마다 (연 2회)\n타기관 검사실과와 비교평가를 시행함. [표 1] 참조.\n2) 가능한 동일한 검사방법과 동일한 보고 단위를 사용하는 기관(peer group)과 비교평가를 시행하며 허 용기준을 벗어난 경우 이에 합당한 적절한 조치를 취하고 이를 기록하여 보관함. peer group 비교 가 불가피한 경우 담당전문의 판단하에 비교기관을 선정할 수 있음.\n- Interlaboratory test 항목\n: Pepsinogen I,II , NGAL , SAA , Valproic acid , Vancomycin , sd LDL , Ammonia\n3) 검사실간 비교검사 평가\n(1) 검체조건- 정량검사: 농도가 다른 최소 2개 이상의 검체 (권장: 참고치 이내의 농도, High)\n- 검체특성상 변화가 심한 Ammonia 항목의 경우 정도관리 물질 2 Level\n(QC물질 Low,High)를 이용하여 검사실간 비교검사를 시행함.\n- 정성검사 및 반정량검사 : 2개 이상의 검체\n(권장 : Negative, Positive 모두 포함되도록 선정)\n(2) 검사실간 비교검사 허용기준\n정량검사 : Diff(%)= ≤ ±10% (저농도 Diff(%)= ≤ ±20%)\n정성 및 반정량 : 일치율 100%\n- 저농도 검체는 오차율이 크게 계산되므로 전문의는 검토 시 이를 고려하여 판정함.\n* 저농도물질 : 본 검사실의 저농도물질은 각 항목 AMR의 1/4 분위값.\n- 항목별 상이하므로 [표 4] 참조.\n① 검체 수 2개: 모두 허용기준 이내 – Accept\n② 검체 수 3개: 2개 이상 허용기준 이내 – Accept\n③ 검체 수 5개: 3개 이상 허용기준 이내 – Accept\n4) Proficiency test 허용범위를 벗어나는 경우 조치사항\n(1) 장비상태 점검(maintenance)\n(2) Calibrator, Control, Reagent 등의 상태를 확인한 후, 교정.\n(3) 5개 이상 검체로 Proficiency Test 재실시 → 전문의 검토, 확인.\n(4) Unaacceptable 시 장비회사의 학술 및 기술부(장비상태 점검)요청 → 원인분석 및 문제해결.\n(5) 10개 이상 검체로 Proficiency Test 재시행하여 전문의 검토, 확인.\n3. CAP Survey 시행지침\n1) 자동화학검사실에서는 연 2회 [College of American Pathologists]에 참여하고 있으며, 각\n검사의 시행은 물질과 같이 동봉되어오는 Testing Instructions 에 따라 실시함.\n2) 참여 Survey [표1] 참조.\n- LN24-A, B\n3) CAP Survey 평가기준.\n- LN24 : Linearity= ≥ 95%, (R2= ≥ 0.95) Best-fit target 과의 Diff(%)= ≤ ±0.1%\n4) CAP Survey 허용기준 벗어난 경우 조치사항\n- 외부정도관리 시행지침에 준하여 시행함.\nⅢ. 내부정도관리 (Internal Quality control)\n진단검사의학과 자동화학검사실에서 행해지는 내부정도관리 결과는 LIS – 정도관리 에서 관리되며 별도의 내부정도관리 장부를 구비하여 (정도관리담당) 또는 파트장과 담당전문의가 적극적으로 관리, 검토함.\n시약관리, control, calibration기록 등의 중요한 기록은 (정도관리담당) 또는 파트장이 확인하고 서명하며 매월 담당전문의가 검토하고 서명함.\n담당병리사는 Q.C기록이 벗어난 결과를 보이는 즉시 이를 정도관리담당에게 보고하며 조치순서에\n따라 적절한 조치를 취하고 이를 업무일지 또는 KIS Program을 통해 기록함.\n자동화학 검사담당자는 지속적으로 안정되고 정확한 결과 산출을 위하여 다음과 같은 방법으로 내부정\n도관리를 시행함.\nⅢ-1. 내부정도관리지침\n1. 내부정도관리 시행지침\n1) 모든 내부정도관리는 자동화학 운영지침서에 준하여 실시함.\n2) 내부정도관리는 환자검사를 담당하는 담당병리사가 직접 환자검체와 동일한 방법으로 시행함.\n3) Q.C 간격은 기기회사에서 권장하는 간격보다 길어서는 않됨,\n4) 매일 최소 2회 이상, 최소 2 level 이상 또는 검사시행일 최소 1회 이상, 최소 2 level 이상을 시행함.\n- 생화학분석기(TBA FX8): 24시간 사용하는 경우 8시간마다 정도관리 실시함이 원칙임, 단 검사 건수 시\n간대별 분석하여 정도관리 시간을 조정할 수 있음.\n(1) 저농도와 고농도의 물질 – Level1, Level3 또는 Level1, Level2\n(2) 반정량검사의 경우도 양성 및 음성 정도관리 물질을 이용하여 매일 최소 1회 이상을 시행함.\n5) 모든 정도관리는 다음과 같은 Rule(허용기준)을 정하여 시행함.\n(1) 매회 QC 시행 시 마다 Westgard’s rules중 1 3s, 2 2s, R 4s, 10x rule 을 검토하여 검체 검사 의 시행 여부를 결정함.\n(2) 1 2S rule에 해당하는 경우 – 환자검체에 대한 검사는 시행함. 이전 Q.C 결과값 재확인함.\n1 3S, 2 2S, R 4S rule 에 해당하는 경우\n- 환자검체에 대한 검사 시행을 중지하고 내부정도관리가 벗어난 원인 분석 및 조치를 취한 후 Q.C를 다시 시행하여 결과 값이 상기 rule을 위반하지 않는 것을 확인하고 환자검체에 대한 검사를 시행함.\n- LIS 에서 자동으로 “결과저장” 단계로 전환됨 (자동 최종보고 불가.)\n- 10x rule 에 해당하는 경우 – Shift 혹은 Trend 추이확인하여 환자검체 검사는 시행함.\n10회의 값이 누적되면 Mean, SD 재설정 시행함.\n(3) 정성 또는 반정량검사의 정도관리 시행\n① 모든 정성/반정량검사는 검사 시행일 마다 양성, 음성 정도관리 물질을 사용하여 시행함.\n② 정도관리 실시 후 음성 정도관리 검체는 음성 결과로, 양성 정도관리 검체는 양성 결과로 산출\n되었는지 확인하여 검사의 정확성을 확인함.\n6) 내부정도관리 rule(허용기준)을 벗어난 경우\n(1) Calibration 검량선의 직선성과 Calibration Curve 를 직전 값과 비교, 확인함.\n(2) 값에 변화가 없는 경우 Re run, 변화가 있는 경우 Q.C after Re-calibration 실시한다.\n(3) 재검 후에도 같은 결과를 보이면 정도관리 물질, 시약 등 사용물질에 대한 점검과 장비점검 등 을 하여 error의 원인을 제거하고 Q.C를 재시행하여 결과가 허용 범위 이내임을 확인해야 함.\n이때 Q.C물질교체, 시약교체, Cal물질 교체와 장비점검을 기기회사에 의뢰할 수 있음.\n(4) 중대한 기기적인 고장이나 지속적인 QC의 문제로 검사를 진행할 수 없게 되는 경우 담당병리 사는 정도관리담당에게 보고한다. 정도관리담당자는 해결책을 논의하고 경중을 판단하여 각 진료 과나 병동에 알리고 담당전문의에게 즉시 보고함.\n(5) 필요시 장비회사에 연락하고 문제가 해결될 때까지 다른 대체장비로 검사시행 함.\n(6) 관련된 조치사항을 업무일지 또는 LIS – 정도관리 – 결과관리 – 물질별결과관리 – 조치사항에\n기록함.\n7) Control이 허용범위를 벗어났을 경우 조치순서. (반드시 숙지)\n(1) Control 물질의 상태, Lot No. 등을 확인하고 잘 혼합한 후 같은 Control로 재검.\n(2) 최근 일주일 정도의 QC data 추이를 관찰. QC data의 Shifting 혹은 Trending (10X) 확인함.\n(3) Calibration 을 다시 하고 Control을 분석함. (Q.C after Re-calibration)\n(4) Calibration 시행 후에는 Calibration factor나 Curve를 확인함.\n(5) 새 Bottle의 Control을 사용하여 다시 검사함. (Re-run)\n(6) 다른 lot 번호의 새로운 Control을 사용하여 다시 검사함. (해당 물질이 있는 경우에만 시행)\n(7) 장비 Maintenance를 시행하고 Control을 다시 분석함.\n(8) 시약 교체함.\n(9) 새로운 Calibrator를 사용하여 QC after Calibration을 시행함\n(10) 이상의 단계에서도 교정이 안 될 경우는 (정도관리담당)또는 파트장 및 담당전문의에게 알림.\n(11) 필요시 장비회사에 연락하고 문제가 해결될 때까지 다른 대체장비로 검사시행 함.\n2. 내부정도관리물질의 관리지침\n1) 모든 검사에는 적절한 Control물질을 사용하여 검사의 신뢰도를 확인하며 기준을 벗어난 경우 지 침에 따른 조치를 취하고 이에 대한 기록함.\n2) QC 물질의 제한성\n• 일반적인 Q.C 물질로는 Cal verification을 하지 못함.\n• (due to matrix interaction of Q.C materials)\n→ Matrix interactions are common & unpredictable for specific reagent lot or method\n• 정도관리물질은 Statistical process control을 하기 위하여 고안됨.\n→ calibration 간 검사방법의 상대적 안전성을 확인하기 위한 수단.\n• 정도관리 물질을 Cal verification에 사용할 수 있는 경우\n→ 제조회사에 의해 특정 방법에 대한 측정값을 부여 받고, 검사방법의 calibration 검증에 사용 할 수 있도록 제조된 물질.\n3) 본 검사실은 Calibrator(Standard material)와 Control(Q.C material)의 혼용을 금지.\n4) 모든 Control물질은 반드시 제조사의 정해진 보관조건에 보관하고 정해진 유효기간을 준수하고 설\n명서에 따라 제조 및 사용함을 원칙으로 함.\n5) 정도관리 물질정보 : 상품화된 Q.C material (assayed material)\n(1) Toshiba FX8 (일반화학 항목) : BIORAD Liquid assayed multi. 1, 3\n: BIORAD Liquicheck immuno con. 1, 3\n: BIORAD Liquichek urine chemi. con. 1, 2\n: TruLab\n(2) 이 외 항목 – 전용 Control [표1.] 참조\n3. 내부정도관리 물질 허용범위 설정지침\n1) 정도관리 물질의 lot. change가 있는 경우\n- Old Control 유효기간 전 2~3주 정도 미리 받아 검증함.\nOld Control 유효기간 만료 전 미리 입고되지 못한 경우 제조사의 Mean, SD를 임시 Taget 으로 입력하여 사용하고 10회의 검증횟수가 완료되면 산출된 Mean,SD 를 최종 입력하여 사용 함.\n2) 사용하는 정도관리물질이 assayed material 인 경우, 설명서의 수치는 참고하되 정도관리 물질을\n각 lot.마다 반복적으로 측정하여 평균과 표준편차를 산출하여 통계학적으로 타당한 허용범위를 설 정하여 사용할 수도 있음.\n3) 정도관리 물질이 다른 회사제품으로 바뀌는 경우 또는 신규 검사 도입시\n- 각기 다른 날 또는 최소한 근무 배치에 나누어 20회 정도의 반복측정를 시행하여 Mean, SD를 구 하고 확인 서명하여 그 기록을 보관함.\n검사 건수가 적은 경우 또는 제품 용량이 적은 검사항목의 전용 Q.C material 경우\n10회 미만의 검증도 인정함.\n4) 허용범위 설정 시 약 10회 정도의 누적결과 (요일지정 검사의 경우 5회 이상) 로부터 새 lot.의\nMean, SD를 구하는 것을 원칙으로 하되, 새 lot.의 QC물질을 5회 이상 검사로 임시 Mean을 하고 Insert의 허용범위 이내임을 확인 후 이전의 SD값으로 일시적인 임시 허용범위로 정하여 적 용하여 사용하는 방법도 가능함.\n이 경우도 측정치가 10회 이상 누적되면 누적된 결과로 Mean, SD를 산출하여 최종 적용함.\n5) 전문의 검토하에 기존 정도관리 기록이 있는 경우 SD는 이전 값을 적용할 수 있다, 또는 실제 산출된 SD값과 가까운 상위 1%, 3%, 5%, 7%의 CV값에 해당되는 값을 SD로 사용하는것도 가 능함. 새 정도관리물질의 평균농도값이 기존 물질의 농도와 크게 다른 경우 표준편차 대신 변이계 수(CV%)를 허용기준으로 사용할 수 있다.\n5) 기존 정도관리 기록이 두 개 이상의 시약 Lot.에서 얻은 결과인 경우, CLSI. C24 에 따라 혼합표 준편차(pooled SD) 계산법을 사용한다.\n6) 동일한 lot.의 정도관리물질을 사용 중 검사 시약 또는 Cal lot. 변경 후 정도관리물질의 기질효과가 의 심되는 경우 기존 허용범위를 재설정할 수 있음.\n7) 정성 또는 반정량검사의 정도관리물질 허용범위 설정도 위의 정량검사 정도관리물질 허용범위 설\n정 지침에 따른다.\n8) 내부정도관리 물질 허용범위 설정 평가허용기준\n- 측정 결과: CV= ≤ 3% (저농도 경우 CV= ≤ 10%)\n- 정성,반정량검사 = 음성 정도관리 검체는 음성 결과로, 양성 정도관리 검체는 양성 결과로 일치\n- 검사항목별 상이하므로 QC 물질 허용범위설정 항목별 Sheet의 기준 참조.\n9) 허용기준 벗어난 경우\n제조사 또는 공급업체에 해당 lot. 제품을 반품하고 다른 lot.의 제품을 받아 다시 검증함.\n4. 내부정도관리 종합검토 지침\n1) 정량으로 보고되는 검사인 경우 매월 내부정도관리 통계인 LIS – 정밀성검증을 통한 Mean, SD,\nCV를 산출하여 그 결과가 이전 달과 차이가 있는지를 정도관리담당과 진단검사의학과 전문의가 적 극적으로 확인, 검토하고 그 내용에 관하여 서명함.\n정밀도의 변화가 있는 경우, 이에 대한 조치와 검토여부를 내부정도관리장부에 기록한다.\n2) 내부정도관리 결과는 L-J Chart로 매월 출력하여 관리하며, 그 기록에는 허용범위를 벗어난 경우나 기타 조치사항과 현재 사용 중인 정도관리 물질의 Lot no.농도별 Mean, SD와 같은 물질정보가 함께 기록되어야 함.\n3) 모든 정도관리 시행 시 매회 업무일지 또는 LIS 에 Q.C내역을 기록함.\n4) 내부정도관리 종합검토 허용기준\n- 당월 CV= ≤ 5%\n- (CV) Diff.= ≤ ±3% * ( CV ) Diff. = 해당기간 CV – 이전기간CV\n- (Mean)% Diff.= ≤ ±3% * ( Mean ) % Diff = (해당기간 Mean – 이전기간 Mean)\n/ 이전기간 Mean x 100\n- 저농도의 결과는 오차율이 크게 계산되므로 전문의는 이를 고려하여 판정.\n- 새 정도관리물질의 (Mean)% Diff.이 기존 물질의 농도와 크게 다른 경우 표준편차 대신\n변이계수(CV,%)를 허용기준으로 사용할 수 있다.\n- 항목별 상이하므로 [표 4] 참조.\n5. 장비간 비교검증\n- 두가지 이상의 기기로 검사하는 항목의 경우 연 2회 (6개월 마다) 상관성 평가를 실시함.\n1) 동일 기종의 장비와 제조사와 Lot. No.가 동일한 Q.C 물질을 사용하므로 매일 실시하는 Q.C결과 로 장비간 검증에 이용할 수도 있으나, 6개월마다 신선 환자검체 20개를 비교검증 함.\n- 장비간 비교검증 평가대상 항목 [표 1] 의 검사장비 참조\n2) 장비간 비교검증 일치도의 허용기준 : Correlation R2= ≥ 0.95 (R= ≥ 0.975)\n항목별 Diff.(%)= ≤ ±5%\n정성, 반정량검사= 음성 검체는 음성 결과로,\n양성 검체는 양성 결과로 일치함.\n- 저농도 검체는 오차율이 크게 계산되므로 이를 고려하여 판정.\n- 항목별 상이하므로 [표 4] 참조.\n3) 허용범위를 벗어나는 경우 조치사항\n- 장비회사의 학술 및 기술부에 장비상태 점검요청 → 원인분석 및 문제해결\n- 장비간 비교검사 재시행.\nⅢ-2. 검사지침서(Procedure manual)\n자동화학검사실에서 시행되는 모든 검사에 대하여 검사지침서를 작성하며 검사지침서의 내용은 (정도관리담당)이 작성하고 파트장, 진단검사의학과장(담당전문의)에 의해 검토가 이루어지도록 함.\n자동화학검사실에서 이루어지는 모든 검사는 검사지침서의 내용에 따라 시행되며 임의적인 변형 및 수\n정은 절대 발생하면 않되며 시약의 변경 및 장비의 교체 등으로 인한 수정이 필요한 경우에는 반드시 (정도관리담당) 또는 파트장이 새로 작성하거나 자필로 교정한 후 진단검사의학과장(담당전문의)의 서명하에 지침서의 내용을 수정한 후 적용함.\n1. 검사지침서 내용\n1) 검사명\n2) 검사코드\n3) 검사원리\n4) 검체 및 검사의뢰\n5) 검체 재요청 기준\n6) 시약(제조회사)\n7) 장비(제조회사)\n8) 검사방법\n9) 결과 판독 및 보고\n10) 참고치\n11) 결과판정\n12) 결과에 영향을 미칠 수 있는 사항\n13) 정도관리(정도관리 물질의 제조회사, 공급회사 기록)\n14) 참고문헌 및 참고사항\n2. 검사지침서는 Clear file로 만들어서 쉽게 활용 할 수 있도록 자동화학 검사실내에 일정장소나 작업 대에 비치하여 항상 숙지함.\n3. 지침서는 (정도관리담당) 및 파트장, 담당전문의에 의해 매년 검토 되어야하며 검토여부를 기록함.\n모든 자동화학검사실 임상병리사는 매년 적어도 1회 지침서를 숙지하여야 하며 확인 서명함.\n검사담당자가 바뀌면 검사지침서를 숙지하고 이에 대한 확인 서명함.\n4. 새로운 검사가 set-up 되면 즉시 검사지침서를 작성하고, (정도관리담당) 또는 파트장이 진단검사의 학과장(담당전문의)은 그 내용을 검토하여 확인 서명함.\n5. 지침서의 내용 중 매년 개정 시기 사이에 수시로 변경되는 사항은 (정도관리담당자)가 파트장, 담당 전문의와 의논한 후 확인 서명 기록지의 비고란에 기재한 후 개정함.\n6. 시약 kit에 들어있는 insert를 검사 시 그대로 이용하지 않으며 검사지침서에 일부 내용으로 기술하 여 사용할 수 있음. 정도관리담당병리사는 새 lot 번호의 시약 kit가 도입될 때마다 Insert에 기술된 검사방법을 확인하여 변경 유무가 있는지 검토, 확인함.\n7. 중단된 검사나 시약이 바뀐 경우의 지침서는 검사시작일과 중단일을 기록하여 2년간 별도보관함.\n[표2] 참조\n8. 신규 또는 교체된 검사자의 각 지침서 숙지 여부를 검사수행능력평가를 통해 평가기록을 남긴다.\nⅢ-3. 시약관리 (Reagent management)\n모든 시약은 환자 검체에 적용하기 전 시약기능을 확인하며 반드시 제조사의 정해진 보관조건에 보관 하고 정해진 유효기간 내에 사용완료, 설명서에 따라 제조 및 사용함(안정성 포함)을 원칙으로 함.\n1. 시약이 제조회사로부터 공급되면 검사담당자는 입고일을 기재한 후 정도관리담당에게 청구서를 인계 하고 인수증 확인을 거쳐 시약보관 냉장고에 입고시킴.\n2. 정도관리담당은 입고된 시약을 LOT No 및 유효기간 등을 확인하고 기록하며, 케어캠프 전용 프로 그램(키오스크) 및 전용 홈페이지 (POC,Point of care system)를 통하여 관리, 사용한다.\n3. 검사실내에서 사용하고 있는 모든 시약 및 정도관리물질의 용기에는 제품명(내용물), 유효기간, 보관 조건, 개봉일이 반드시 적혀있어야 하며 사용 중인 시약은 원칙적으로 같은 Lot. No.를 사용함.\n4. 모든 시약은 표시된 유효기간내에만 사용함이 원칙임. 제조사의 조건들이 지켜지지 않은 시약은 정 도관리담당에게 알리고 폐기함.\n유효기간이 가까워지는 시약의 경우는 납품업체(공급업체)와 상의하여 유효기간이 더욱 긴 시약으 로 교체 받아 사용한다.\n5. 유효기간이 지난 시약은 원칙적으로 환자 검사에 사용할 수 없으나 고가이거나 검사 건수가 적은 시약의 경우 유효기간이 지나도 검증과정을 통과하면 유효기간을 연장할 수 있음.\n1) 유효기간 경과한 시약의 검증\n(1) 저농도, 고농도의 Q.C물질 또는 환자검체로 2회에 걸쳐 검증한 뒤 결과가 허용범위 안에 들면 시약의 검사능을 SHEET에 기록하고 (정도관리담당) 또는 파트장과 담당전문의의 확인 하에 연 장하여 사용함.\n(2) 1회 유효기간 연장은 3~6개월까지 가능하고 위의 방법으로 2회까지 연장할 수 있으며 이때도 성능평가 기록을 (정도관리담당) 또는 파트장과 담당전문의가 확인해야함.\n(3) 시약병에도 이를 반드시 표기한다.\n6. 2개 이상의 시약이 함께 들어 있는 kit형태의 시약은 같은 kit내의 시약을 사용함.\n1) RPR, TPLA, CRP, RF, ASO, Cystatin C, Pepsinogen, LIPA, AMY, T.Bilirubin, D.Bilirubin, Ethanol, NGAL, C3, C4, IgG, IgA, IgM, Valproic acid, Vancomycin, mALB, SAA\n2) kit내의 남은 시약은 폐기함이 원칙임.\n7. 건조된 시약은 각 사용 설명서에 따라 Volumetric pipette을 사용하여 제조함.\n: Ⅲ-4. Calibration →2.→4) 참조\n8. Reagent Parallel Test 시행지침\n1) Lot No.가 바뀐 경우 기존의 시약과 새로운 시약에 대한 비교검증(Reagent Parallel Test)을 시행한 후\n환자검체에 사용함.\n2) Reagent Parallel Test시 정량검사의 경우 3~ 5개의 환자검체와 모든 level의 Q.C물질을 사용하여\nOld Lot. Reagent 와 New Lot. Reagent로 측정한 결과의 평균을 구함.\n적절한 수의 환자검체 사용을 원칙으로 하되, 환자검체를 구할수 없거나 환자검체에서 불안정한 검사인 경우 표준물질이나 정도관리 물질을 사용할 수 있음.\n정성,반정량 검사의 경우 최소한의 점검방법으로 Old Lot. Reagent로 최종보고 완료된 환자검체 중 적 어도 한 개이상의 양성 및 음성 검체를 이용하여 New Lot. Reagent로 재검한 결과가 동일한지 확인함.\n3) Reagent Parallel Test 평가기준 [표4] 참조\n(1) 허용기준 : Mean Diff(%)= ≤±10% (개별값= ≤ ±15%)\n- 저농도 검체의 결과는 오차율이 크게 계산되므로 전문의는 이를 고려하여 판정.\n- 항목별 상이하므로 [표 4] 참조 또는 각 Reagent Parallel Test sheet 허용기준 참조.\n(2) 결과값이 허용범위를 벗어나는 경우 10개 이상의 환자 검체로 재검증 실시함.\n(3) 재검증 후에도 허용범위를 벗어나는 경우 납품회사에 해당 Lot. 의 시약을 반납하고 새로운 시약으로\n교체 받아 다시 검증함.\n(4) 반정량검사의 경우, 최소한의 점검방법으로 기존시약으로 검사를 시행한 환자검체 중 적어도 두 개\n이상의 양성 및 음성 검체를 이용하여 새로운 lot. 의 시약으로 재검한 결과의 동일 여부를 확인함.\n(5) 모든 비교검증 결과는 Reagent Parallel Test에 기록하며 (정도관리담당) 또는 파트장과 담당전 문의가 확인 서명함.\n9. 신규검사 도입 시\n1) Precision Test: 5일 동안 각 5회 반복측정하여 총 25회 검사시행 함. (EP15-A3)\n2) Linearity Test(AMR Test): 제조사에서 제시한 AMR 포함한 저농도 및 고농도 검체를 이용하여\n직선성 확인함. (EP6-ED2).\n3) Reference Test: 정상인 20 검체 이용하여 제조사의 참고치 검증함. (EP28-A3c)\n4) Carryover Test: 고농도 검체 4회 연속측정 후 저농도 검체 4회 연속측정, 오염율을 확인함.\n(EP10-A3)\n5) Accuracy Test *: 표준물질 3회 반복 측정하여 Target 값과 비교 후 정확도 평가함.\n* 는 필요시, 전문의의 판단으로 시행.\n10. 시약이 다른 회사의 제품으로 변경된 경우\n1) 위의 9. 신규검사 도입 시 평가 1) ~ 4) 과 Comparision test 시행.\n2) Comparision test (Correlation Test): 환자검체 20~40개를 검사하여 기존 시약(장비)과 검사결 과 비교검증함. (EP09-ED3)\n11. 평가기준\n1) Precision Test : EFLM Desirable 기준 또는 항목별 제조사 기준에 따른 허용CV 이내.\n2) Linearity Test (AMR Test) - R2= ≥0.95 (R= ≥0.975)\n- Recovery rate (%)= ≤ ±10%\n↳ (measured/expected *100)\n3) Reference Test : 20검체 중 Insert 내 참고치를 벗어나는 검체= ≤ 10% (2개)\n4) Carryover Test : ∠ ±1%\n5) Comparision test (Correlation Test) - R2 Value= ≥ 0.95, (R= ≥0.975)\n- Diff(%)= ≤ ±10%\n6) Accuracy Test - Recovery rate= ≥ 95%, Target Value= ≤ ±2SD\nⅢ-4. Calibration\n모든 검사에는 적절한 Calibrator을 사용하여 검사의 신뢰도를 확인하며 기준을 벗어난 경우 적절한 조\n치를 취하고 이에 대한 기록을 남기도록 함.\nCalibration이 필요한 검사는 calibrator(Standard material)를 이용하여 일정기간마다 혹은 필요한 경\n우에 calibration을 실시.\n본 검사실은 Calibrator(Standard material)와 Control(Q.C material)의 혼용을 금지함.\n1. Calibration 시행지침\n1) 자동화학검사실의 일반화학검사는 Daily Calibration을 원칙으로 함.\n면역검사항목이나 기타 특수항목은 시약 교체나 정도관리 실패 후 등의 필요시나 해당 검사일에\nCalibration를 시행함.\n2) 다음과 같은 경우 Calibration을 실시하고 그 사항을 업무일지에 기록함.\n(1) 본 검사실의 자동생화학분석기 (TBA-FX8)는 ① 매일 검사 시작 전 Calibration과 ② 시약교체 후, ③ 장비 Maintenance 실시 후 Calibration을 원칙으로 함,\n(2) 시약의 Lot No. 변경 시\n(3) 정도관리 실패 시\n(4) 중요한 유지보수 후\n(5) 제조업체가 권유할 때\n(6) 적어도 6개월 내에 (Calibration주기가 6개월 이내의 경우, Calibration Verification은 생략\n가능)\n(7) 시약의 변질이 의심될 때\n3) Calibration사용가능 물질\n(1) 제조사의 각 시약별 전용calibrator\n(2) 전용 calibrator 와 Verification 실시하여 Target value를 가진 범용의 calibrator\n4) Calibration시행 후에는 반드시 정도관리를 실시하여 Calibration의 적합정도를 검증함.\n5) Calibration시행 후 실시한 정도관리 결과의 허용기준 초과한 경우.\n(1) 검량선의 직선성과 Calibration Curve 를 직전값과 비교, 확인함.\n(2) 값에 변화가 없는 경우 Re-run, 변화가 있는 경우 Re-callibration 실시함.\n(3) 중대한 기기적인 고장이나 지속적인 문제발생으로 검사를 진행할 수 없게 되는 경우 담당병리사\n는 (정도관리담당) 또는 파트장에게 보고함.\n(정도관리담당) 또는 파트장은 해결책을 논의하고 경중을 판단하여 각 진료과나 병동에 알 리고 담당전문의에게 즉시 보고함.\n(4) 필요하면 장비회사에 연락하고 문제가 해결될 때까지 다른 대체장비로 검사시행 함.\n(5) 관련된 조치사항을 업무일지 또는 LIS – 정도관리 – 물질별결과관리 - 조치사항에 기록함.\n2. Calibration 물질 관리지침\n1) Calibration을 시행하는 물질은 반드시 Calibrator(Standard) 용으로 명시되어 있어야 하고 명확한\nCut-off 수치의 Target value를 가져야 함.\n2) 모든 Calibrator은 반드시 제조사의 정해진 보관조건에 보관하고 정해진 유효기간을 준수하고 설명 서에 따라 제조 및 사용함을 원칙으로 함.\n3) Calibrator 물질정보\n(1) 일반화학 항목\n- 상품화된 액상 Calibrator\nMulti-Calibrator (제조회사:FUJIFILM Wako Pure Chemical Co)\nISE Calibrator (제조회사:Denka Seiken co.)\nBicarbonate Standard FS (제조회사:Diasys co.)\n- 상품화된 동결건조 Calibrator\nHDL/LDL Calibrator (제조회사:Kyowa medex.)\nTruCal U (제조회사:DiaSys co.)\nEnzyme Calibrator (제조회사:FUJIFILM Wako Pure Chemical Co)\n(2) 이 외 항목 – 전용 Calibrator [표1.] 참조\n4) Calibration시 주의사항\n(1) Calibration을 시행 할 때에는 Sample컵이나 pipette 등이 오염되어서는 안됨.\n(2) Calibrator의 보관 유지\n- 특히, Multi-Calibrator (제조회사: FUJIFILM Wako Pure Chemical Corporation 납품회사:\n㈜봄메디칼) 의 경우에는 –20도 이하의 냉동고에 보관하며 청결을 유지하고 실온에 오래 방치하 는 것을 금지함.\n- 각 제조사별 보관기준을 반드시 준수함.\n(3) 동결건조 Calibrator 제조 시 Volumetric pipette을 사용함.\n(4) 자동화학검사실은 정확성이 공인된 (class A)용적 측정용 유리용기 만을 사용함.\n(5) Volumetric pipette 사용 및 시약 제조방법\n- 자동화검사실의 Volumetric pipette은 정도관리물질과 시약 조제에 필요한 D.W만을 사용함.\n- 다른 화학적 재료들과 혼용하지 않음.\n① 용량의 Volumetric pipette을 pipette filler 또는 pipette aid 을 사용하여 D.W을 채움.\n② D.W의 meniscus 와 pipette 표선 및 눈의 위치가 수평이 되도록 하여 meniscus 밑변이\n표선과 일치되도록 함.\n③ Meniscus 와 표선이 일치되면 제조할 시약 또는 정도관리 물질에 D.W를 분주한다.\n④ 시약 설명서에 따라 실온에서 부드럽게 mix 또는 안정화 → 보관법에 따라 냉장 보관.\n⑤ 사용 후 Volumetric pipette 은 검사실에서 사용하는 정제수(Milli-Q: Type II Reagent Water)로 최종 세척 → 세척 후 건조대에서 완전히 건조 → 오염되지 않도록 전용 보관함 또는 캐비닛에 보관한다.\n3. Calibrator Parallel Test (Cal Verification) 시행지침\n1) Old calibrator 유효기간 전 5~7일 전 미리 받아 검증.\n2) Old calibrator 유효기간 만료 전에 미리 입고되지 못한 경우 제조사의 농도값을 임시 적용하여 사 용 한 후 검증과정이 완료되면 허용범위 내에 있는지 확인함.\n3) Old calibrator로 Calibration 후 New calibrator를 5회 이상 측정하여 결과의 평균이 Insert 상 의 농도값(Target value)과의 차이가 허용범위 내에 들면 제조사의 농도값을 적용하여 검사장비에 입력한 후 사용. (단, 제품 용량이 작은 경우 또는 검사 건수가 적은 경우에 검사항목의 전용\nCalibrator 경우 3회 미만의 검증도 인정함.)\n4) 적용 후 New calibrator로 calibration 후 모든 level의 정도관리물질과 3개 이상의 환자검체로\n검사를 실시하여 그 값이 농도값의 변경 전, 후 차이가 허용범위 내에 있음을 확인함.\n5) 제품 용량이 작고, 수가 여러개인 기타 검사항목의 전용Calibrator의 경우 5회 미만의 검증도 인정함.\n6) Calibrator Parallel test 평가 허용기준\n(1) 농도값 측정 결과의 평균과 Target value 의 Mean Diff.(%)= ∠5%\n(2) 농도값의 변경 전, 후 환자검체 Mean Diff.(%)= ≤ 10% (저농도≤ ±20 %)\n- 저농도의 물질이나 검체는 오차율이 크게 계산되므로 전문의는 이를 고려하여 판정.\n7) 허용기준 벗어난 경우\n(1) 제조사 또는 공급사로부터 새 Calibrator를 받아 재시행\n(2) 다시 벗어나는 경우 다른 Lot. 의 Cal 물질로 검증 재시행.\n4. Cal Verification이 필요 없는 경우\n1) 정량보정을 매일 실시하는 경우\n(제조사의 장비작동법 준수 및 최소 2가지 이상의 정도관리물질을 매 검사일 1회 이상 사용)\n2) 정량보정 유효기간 중 Re-calibration – calibration verification 허용 범위는 Westgard QC 의 Biological Variation Database specifications의 bias (%)를 준용.\nⅢ-5. 검체관리\n검사실에 접수되는 검체는 적절한 용기에 적절한 양이 포함되었는지 확인하며 검사에 적합하지 않은 상태인 경우 부적합 장부에 기록하거나 전산상의 부적합검체관리에 기록을 남긴 후 병동에 resample을 요구함.\n부적합검체로 판단되어 무조건 검사하지 않는 것은 아니고 검사담당자의 판단 하에 검사시행 후 검체상태를 검사결과의 한계를 명시하거나, 부적합 원인으로 영향을 받는 검사항목을 안내하고 소견에 기록하\n여 임상에 보고할 수 있슴.\n1. 검체확인\n1) 검체접수 에서 결과보고까지 검사의 모든 단계에 있어 검체가 바뀌거나 소실되지 않도록 계속적으 로 검체를 확인하며 검사를 시행함.\n2) 진단검사의학과로 접수된 모든 검체는 환자이름, ID, 검체번호 등이 표기된 바코드가 부착되어 있 어야함.\n3) 바코드가 부착된 용기에서 다른 용기로 분주 할 때는 반드시 해당 바코드를 재출력 하거나 TLA 자검체 바코드를 이용하여 정보를 확인함.\n바코드를 재출력 하지 못하는 경우, 접수번호, 환자ID, 환자이름 등을 용기에 2가지 이상 표기함.\n(일부 검사에의 자검체 경우 환자ID, 영문환자이름, 검체번호 등이 표기되어, 모검체와 동일하게\n환자 검체를 확인한다.)\n4) 모검체로 부터 분리된 자검체는 다시 모검체에 넣어서는 안됨.\n5) TLA 투입 전 검체상태(Hemolysis 등)을 우선 확인하고, 결과보고 시 LIS상의 검체 혈청정보 (Serum Index)로 Hemolysis, Lipemic, Icteric 등 검체상태 확인함.\n2. 검체채취\n1) 아침 정규채혈 이외에 병동이나 외래채혈실 등에서 검체를 채취할 경우에는 바코드발행기를 이용\n하여 바코드 발행 후 바코드에 표시된 검체용기에 바코드를 붙인 후 환자확인 과정을 거쳐 정량대 로 검체를 채취함.\n2) 모든 검체는 채취 즉시 검사실로 운반되는 것을 원칙으로 함. 이는 응급검사가 아니더라도 채혈 후\n시간이 경과됨에 따라 결과값의 신빙성이 떨어지는 검사종목이 있기 때문이다.\n3. 검체접수\n1) 검체접수는 진단검사의학과 검체접수실의 자동접수 화면에서 바코드 리더기로 바코드를 스캔하면 부저소리와 함께 접수되었다는 message가 전산화면에 나타남.\n또는 검체 자동 접수분류기를 통한 접수도 위와 같은 작업이 실행됨.\n2) 이 시점이 검체 확인접수시각이며 화면으로 조회 가능. 검체가 진단검사의학과에 도착하여 검사 대\n기 중이라는 의미로 해석함,\n해당 분석기에 투입되는 시점이 바로 검사가 진행되는 개별접수임.\n4. 검체처리 및 보관\n1) 검사실에 도착된 검체는 즉시 정해진 원심분리기를 사용하여 원심분리 실시함.\n2) 즉시 검사가 불가능할 경우는 원심분리한 후 분주(Aliquot)하여 냉장 보관함.\nSST, PST 와 같이 Gel로 분리되는 Tube는 원심분리하여 분리상태 확인 후 냉장보관함.\n3) 검사가 끝난 검체는 정해진 장소에 정해진 보관기간 (5일)동안 보관 한 후 폐기함.\n4) 일반화학용 검체는 검체 채취 후 적어도 검체 채취 후 2시간 이내에는 원심분리를 하여야하며,\n만일 원심분리가 불가능하다면 냉장보관 시 용혈을 피하기 위해 실온보관 함.\n5) 검체채취 후 3일안에 측정 할 때는 검체를 2~8℃에 냉장, 3일 이상 지연 시에는 –10℃ 이하에 냉 동보관함.\n6) 검체에 미립자 적혈구, 또는 혼탁함이 보일 때는 검사하기 전에 고속 원심분리 하여 상층액을 취하\n거나 여과한 후 검사를 실시함. 열처리된 검체, 지방성 검체, 심한 용혈이 일어난 혈청, 또는 확실 히 미생물 오염이 있는 검체는 검사를 실시하지 않는 것이 원칙임.\n7) fluid검체에서 너무 혼탁하거나 점도가 높아 검사할 수 없는 경우 담당주치의와 상의하여 검사시행 여부 결정한다.\n8) 검체는 검체접수 파트에서 전산 자동접수 후 정규근무 시간에는 TLA의 전처리 과정이나 분석장비 에서 개별접수를 하고, 응급검사, 화학 정규검사는 접수 마감 없이 휴일 및 야간당직 시에도 연속\n적으로 검사를 진행한다.\n일부 검사(약물TDM, 보체·면역글로불린 등) 항목은 야간 및 휴일에 검사를 진행하지 않으므로,\n접수 마감 이후 도착 검체는 확인접수 후 원심분리하여 냉장보관함.\n9) 동결한 검체는 해동 후 완전히 혼합하고, 냉동과 해동은 반복하지 않음.\n10) 분주된 자검체는 검사가 종료되면 즉시 폐기함.\n11) 검체폐기 시 본원 의료기관평가인증 – 11.3-3.의료폐기물 관리 절차에 따라 시행함.\n[별첨 1]참조\n12) 연구, 학술 등의 특정목적에 따라 보관되는 검체는 별도로 필요시까지 냉장/냉동 보관한다.\n5. 부적합검체 관리지침\n1) 부적합검체의 정의\n- 검시 결과에 영향을 줄 수 있어 검사시행에 부적절한 검체를 의미함.\n- 부적합검체의 종류\n(1) 환자확인을 할 수 없는 검체 (검체바코드 손상 등)\n(2) 응괴가 생긴 검체\n(3) 심하게 용혈된 검체\n(4) 육안적으로 오염이 의심되는 검체\n(5) 검체량이 부족한 경우\n(6) 부적절한 용기에 채취된 경우\n(7) 심하게 Lipemic한 검체\n(8) 검사실에서 검증되지 않은 검체 (체액, 항응고제 등)\n(9) 기타 검사지침서에 있는 검체 채취 및 보관 방법에 따라 채취, 운반,보관되지 않은 경우\n2) 부적합한 검체의 경우 재채취가 원칙임.\n경우에 따라 부적합 검체로 판단되어도 담당부서의 판단 하에 검사시행 후 그 검체상태를 검사결과 의 한계를 명시하거나, 부적합 원인으로 영향을 받는 검사항목을 안내하고 소견에 기록하여 임상에 보고할 수 있음. 검증되지않은 검체에 대한 검사요청의 경우 제조사의 권장검체가 아님을 소견에 명시함.\n3) 결과보고 전 모든 검체에 대해 담당병리사가 LIS상의 검체 혈청정보(Serum Index)로 Hemolysis, Lipemic, Icteric 정도를 확인하며 검사에 부적합검체로 검사시행한 경우는 환자 결과관리 화면 에서 소견기록을 이용하여 검체상태를 보고하거나 부적합 검체란에 전산입력하고 보고함.\n4) 검체접수 시 부적합검체로 판정된 경우에는 최초 발견자가 자동화검사실에 즉시 통보하여 검체에 대한 처리방안을 의논하여 조치 한 후 부적합 사유와 처리방안을 전산에 기록함.\n다시 채혈할 필요가 없다고 판단된 사항은 즉시 진행하여 검사가 지연되지 않도록 함.\n5) 검체 재채취가 어려운 경우\n담당의사 또는 간호사에게 검체상태를 통보하여 검사진행 여부 의논 후 취소결정 시 LIS – 검사의 뢰취소(변경)의뢰 – 취소 처리함.\n6) 부적합검체는 매월 초, 전월기록을 (정도관리담당) 또는 파트장이 LIS- 진단검사 – 결과관리 – 부적 합검체관리 조회를 통해 확인하고 특이사항 관리함.\nⅢ-6. 결과보고\n모든 결과는 정해진 검증과정을 거쳐 가능한 빠른 시간 내에 보고일 기준에 따라 보고하며 결과 수정은 파트장과 담당전문의의 결정에 따라 시행되며 지침에 따라 환자를 담당하는 의료진에게 유선 등을 통해서 알림. 또한 파트장이 부재중일 때 보고되어야 할 결과에 대해서는 (정도관리담당) 또는 파트장이 담당전문의(진단검사의학과장)에게 보고하여 확인 과정을 거친 후 수정보고 함.\n일반검사는 정해진 시간내에 보고하며 응급검사는 60분, 화학 정규검사는 240분, 일부 기타 검사\n[(약물TDM(L25), 보체·면역글로불린(L26)]는 검사일 또는 익일에 보고하도록 T.A.T 를 설정하며 관리기준를 벗어나서 보고되는 경우에는 그 사유를 분석하여 모니터링 함.\n모든 검사결과에는 참고치를 함께 제공하고 참고치에 대해서는 Insert지의 제공범위를 검증하거나 병원 자체적으로 입증과정을 거친 참고치이어야 함.\n1. Turn Around Time\n1) 매월 초 (정도관리담당) 또는 파트장은 전월 기간의 LIS - 진단검사 - 조회관리 - TurnAroundTime조회 실시하여 자동화 화학파트의 T.A.T. 지연 건수 및 내역을 확인함.\n2) 관리허용 기준을 벗어난 지연사례 발생 시 원인을 분석한 후 필요한 경우 담당전문의에게 보고함.\n3) 장비 ERROR 등 결과보고의 지연이 예상되는 경우 즉시 파트장 및 담당전문의에게 보고 후\n임상에 유선으로 상황을 알리고 원인 분석, 해결 후 통보자, 피통보자, 결과보고의 지연발생 내용\n을 업무일지에 기록함.\n4) 관련 지침은 검사실 운영지침 中 [검사 소요시간 관리지침]에 준하여 실시함.\n5) TAT 관리지침\n(1)\n① [응급], [정규]일반화학·뇨·체액 : 검사 접수마감시간 없이 24시간 검사 실시\n② [정규]약물·단백면역화학 : 월~금 검사 접수마감시간 – 15:30\n주말(토,일요일,공휴일) 검사접수 마감 시간 - 토요일 am10:30\n토,일 도착확인 검체 : 검사실 도착→ ≤ 52 hrs\nTAT 분석시 백분율과 최대소요시간을 함께 분석함.\n③ 위탁검사는 검사시행일, 소요일 및 재위탁 여부에 따라 항목별로 설정함.\n④ 위탁검사는 月10건 이상 시행검사에 대하여 TAT 관리한다.\n- 6개월간 관리 후 시행건수 재확인하여 관리항목 재설정 가능함.\n(2) 관리허용기준\n- 원내검사 : 개별항목 초과율 ≤ 10%\nTotal 초과율 ≤ 5%\n- 위탁검사 : Total 초과율 ≤ 5%\n2. 결과보고\n1) 모든 검사결과 보고 시 참고치를 함께 제공함.\n2) 참고치는 되도록 검사가 처음 set-up될 때 나이, 성별에 맞게 검사실 자체에서 건강 대상군을 정 하여 시행하여 결과값을 얻고 직접 구하기 어려운 경우 진단검사의학과장(담당전문의)이 제조사\nInsert 나 문헌 등에 이미 발표되어 사용되는 자료를 결정하여 대체할 수 있으며 담당전문의의 판\n단 하에 참고치 적합성평가를 통해 검증과정을 거친 참고치 이어야 함,.\n3) 환자의 결과가 임상치료에 중요한 결과를 가져올 경우 즉각 이를 임상 전문의나 담당주치의에게\n보고할 수 있는 경고치에 대한 자료도 보관하고 있어야 함.\n4) 참고치 검증 및 설정\n- 다음과 같은 경우 시약회사의 참고치를 입증하거나 직접 설정하여야 함.\n(1) 새로운 검사의 도입\n(2) 검사방법(시약, 기기)의 변경\n(3) 환자유형의 변경\n(4) 시약회사에서 제공한 참고치의 검사방법과 대상 인구집단이 동일하다면 참고치 검증과정을 거친 후 그 참고치를 사용 가능함.\n참고치의 검증은 정상인 20인의 검체 중 2명(10%)이내의 결과가 제시한 참고치를 벗어난 경우\n그 참고치를 검사실에 적용함.\n5) 정량검사의 경우 장비에서의 얻어지는 linearity 결과로부터 “Measurable Range”를 설정하여야함.\nMesurable range는 Q.C 물질 또는 농도를 아는 환자 검체를 희석하여 구할 수 있으며, 이 구간\n을 벗어나는 결과에 대해서는 재검, 검체의 희석 등 적절한 방법을 이용하여 결과의 검증이 이루어\n진 후 임상에 보고함.\n단, Measurable range의 하한치보다 더 낮게 나오는 결과는 검체 채취의 오류, 희석오류 등이 아 닌 경우 반복검사 없이 “ ∠ 설정값 ”로 보고 가능함.\n분석기의 허용한계치는 확인하기 쉬운 장소에 문서화하여 보관함.\n6) TLA Line에 투입된 검체의 재검은 담당병리사가 재검(Rerun)시스템을 이용하여 수행함.\n재검 Pop-up 화면에서 재검 또는 희석 재검 기능을 선택하여 검사를 실시한 후 결과를 최종 보 고함. 필요 시 검체 상태를 육안으로 확인하기 위하여 검체보관 Program에 보관된 검체를 이용 하여 추가 재검을 실시할 수 있으며, 해당 결과를 최종 보고함.\n재검 시 가능한 다른 장비로 시행함.\n7) 결과에 이상이 발견되면 재검을 실시하고 동일한 결과를 보이면 소견에 “재검한 검사항목입니다“\n라고 소견입력하여 최종보고 함.\n8) 결과가 이미 최종보고된 후 오류가 발견된 경우 즉시 정도관리담당 또는 파트장과 담당전문의에 게 알린 후 담당 의료진에게 전화하여 사유를 설명한 후 결과를 수정한 다음 전산메모(소견)와 특 이결과기록에 해당 내용(소견code –zzz : 수정 전후 결과, 수정사유, 연락받은 사람, 연락한 사람)\n을 기록하여 전산 입력 함.\n- 수정보고의 경우 검사당일(접수일기준, 요일 지정검사는 그 해당일 또는 익일) 오류 발견한 당일 내에 수정.\n- Ⅲ-7. 사고 나 오류발생 지침에 따름.\n(1) 최종보고 완료 후 장비 고장과 같은 중대한 오류가 발견된 경우 문제발생 시점을 추정하기위해\n① 문제발견된 시간대의 검체는 전수 조사 시행. → 이상 발견 시\n② 문제 발견 1시간 전 검체 1개 찾아 재검사 시행. → 이상 발견 시\n③ 2시간 전 검체 1개 찾아 재검사 시행. → 이상 발견 시 시간대를 계속 확대하여 재검사를 시행 한다.\n④ 이상 없는 시간대까지 확인 후 정도관리담당 또는 파트장과 담당전문의에게 알린다.\n담당전문의는 검체안정성 등을 고려하여 재검사 또는 재채혈을 결정한다.\n⑤ 재검사 또는 재채혈 이 실시되어 결과값 수정이 발생하는 경우, 위 8)에 따라 시행한다.\n9) 장비 고장 등 결과보고 장시간 지연 예상 시\n외래 간호팀장, 응급실, 병동간호부에 결과지연 사유와 검사항목 및 결과보고까지의 예상시간을\n알림. (파트장 또는 팀장을 통하여 SMS 및 유선통보)\n10) 매 근무마다 업무마감 후 결과를 통보하지 않은 결과가 있는지 반드시 확인한다.\n진단검사의학과에서 나온 결과는 LIS에 저장되고 정해진 범위를 넘는 결과치는 [미완료]에 남게 되므로 매일 담당병리사는 미완료와 결과저장 상태의 Data를 확인함.\n3. 측정가능범위 (AMR, Analytical Measurement Range Validation)\n1) AMR이란 희석이나 농축 등의 과정이 없이 검체를 측정하여 얻을 수 있는 타당성 있는 결과범위를\n의미함.\n2) 연 2회 검증하여야 하며, 새 기기나 새로운 시약의 검사도입 때는 시약 설명서의 AMR이 명시되어\n있어도 검사실 자체에서 이 범위를 검증하여야 함.\n3) AMR은 낮은값, 중간값, 높은값을 갖는 측정법에 맞는 성질을 갖고 있는 물질로 AMR을 검증 (AMR\nvalidation)하고, 검증한 결과는 문서화하여 보관함.\n4) 검증에 이용하는 물질은 측정법에 맞는 matrix를 갖고 있어야 하고 최소 3개가 있어야 하고 농도값\n은 AMR의 최저값(±50%), 중간값, 최고값(±10%)이어야 하며 정확한 검증을 위하여 5가지의 각기 다른 농도의 물질을 사용하여야 함.\n5) AMR validation에 사용할 수 있는 물질\n(1) 임상 검체 중 높은 값과 낮은 값을 가진 검체\n(2) 다른 비교 검사법이나 참고방법으로 검사를 시행한 임상 검체\n(3) 적합한 matrix 성상과 목표치를 알고 있는 1차 혹은 2차 표준물질\n(4) 측정기기를 calibration하기 위해 사용하는 calibrators\n(5) 적절한 matrix를 갖는 linearity material\n(6) proficiency testing material\n(7) Method manufacturer provide materials specific for AMR validation\n(8) AMR범위에 해당하는 정도관리물질\n6) AMR검증 하지 않아도 되는 경우 [표1.]참조\n(1) Calibration 주기가 6개월 미만으로 Calibrator 수가 3개 이상이며 AMR 범위와 동일한 경우\n(2) 정성 혹은 반정량 검사\n7) AMR 검증을 위한 검체희석 방법\n8) 측정가능범위(AMR)검증\n(1) AMR 검증 허용범위 – R2 = ≥0.95 (R= ≥0.975)\n- Recovery rate (%)= ≤ ±10%\n↳ (measured/expected *100)\n(2) 상품화된 AMR평가물질 사용시\n- 0%, 25%, 50%, 75%, 100% 의 5단계 농도로 제조된 Validate® 물질을 이용하여 2회씩 측정하여 기대값과 비교함.\n- 평가 허용기준 : Total allowable error (출처: CLIA, CAP, AAB, NYS, WLSH, RCPA, SJCLI)\n(3) 적용 AMR 기준\n- Target Value와 Diff= ≤ ±5% mean값 (저농도물질은 +/-Diff 확인)\n- Lower Value는 LoQ 또는 LoD 값으로 적용가능 함.\n9) 측정가능 범위 초과하는 검체에 대한 처리방법\n- AMR을 벗어나는 결과가 Interface되어 나온 경우, LIS –담당자별결과관리 - “ A ” 표시\n(1) AMR의 lower level을 보고가능범위의 lower level로 설정한 후 AMR 미만 결과값이 나온 경우 “∠ 설정값” 으로 보고함.\n- 낮은 농도값의 경우 LoD 또는 LoQ로 대체하여 AMR로 할 수 있다.\n(2) AMR을 초과하는 결과값이 나온 경우 적절한 값이 도출될 때까지 희석하여 검사 시행함이 원칙.\n일부 검사항목의 경우 임상적으로 유용한 한계 내지 한계점을 정하여 희석하여 보고함.\n(3) 희석된 결과값은 AMR의 25 ~ 75% 범위내의 값이 되도록 하여 최초 희석배수를 정하고 희석\n함. 이는 과도한 희석 등으로 인한 검사결과의 불안전성을 해소하기 위함.\n희석된 결과값이 AMR의 25 ~ 75% 범위를 벗어나는 경우에는 다른 농도의 희석배수를 선택 하여 범위 안으로 값이 도출되도록 희석재검을 실시함.\n(4) 제조사가 특별히 명시하지 않은 한 희석액의 종류는 Saline으로 시행함.\n단. 전해질검사의 경우 D.W로 희석하여 검사 시행함.\n희석배수\n검체 (㎕)\n희석액 Saline (㎕)\n1:2\n1:5\n1:10\n1:100\n(5) 희석검사결과 보고방법 : 희석된 측정 결과값 X 희석배수\n:“측정상한치 초과로 희석하여 재검한 검사항목입니다.”라는 소견을 입력하고\n최종보고 함.\n(6) 수기희석의 적절성 검증. (CLSI EP34)\n가이드라인에 따라 검증 수행함. EP34 에서는 수기희석 절차 검증에 대한 특정 정기주기를 규 정하고 있지 않음.\n단, 시약/칼리브레이터 제조사 변경, 주요 희석 배수 변경, 희석액 변경, 제조사 권고 변경, 이밖 의 희석 결과의 신뢰성 문제가 발생한 경우 희석 절차를 다시 검증 시행한다.\n적절성 판정기준 – Recovery rate (%)= Reference value ≤ ±10% : Pass\n수기희석 시 정확한 부피 측정을 위해 검교정된 자동 피펫을 사용함.\n4. Interface 되어 나온 결과는 전산시스템에 저장되어 담당자별 결과등록 화면에서 D/P 이나 Critic\nal Limit 에 해당되는 결과는 미완료에 결과저장 상태로 남아있게 되고 그 외의 정상소견의 결과\n는 자동통보 되어 완료화면에서 확인가능 함.\n5. 이상결과 처리지침 [표 3] 참조\n- 이상결과 [Delta/Panic/Critical]가 발견되면 과거결과와 비교하며, 필요하면 재검을 시행하고 검사 과정에 이상이 없다고 판단되면 결과를 임상에 통보함.\n1) LIS상으로 결과를 처리하는 검사는 최종보고 전 [미완료: 결과저장 △]에 Critical Error의 방지를 위해\nDelta check 와 Panic value check 를 반드시 점검하여야 함.\n2) KIS 상에 D/P 가 표시되면 우선 검체의 적합성 여부를 확인하고, 적합한 검체임이 판단되면 필요 시 즉 시 재검을 실시함.\n3) 재검결과도 동일하면 최종보고하며 소견입력란에 [재검한 검사항목 입니다.] 라고 입력하여 완료함.\n4) 투석환자의 경우 BUN, Crea., Na, K 등 정기적인 반복검사의 경우 기록 및 임상에 보고하지 않아 도 무방함. 이는 아래 Critical Value의 발생 경우에도 동일함.\n5) 환자의 결과가 아래 ※Critical Value 와 같은 임상적경고수치를 보일 때에는 우선적으로 검체의 적합성 여부를 확인하고, 적합한 검체임이 판단되면 즉시 재검하여 검사 전 오류가 없는지 확인 후 담당 주치의나 전담간호사에게 SMS 통해 통보한다.\n- 통보내용, 시간, SMS 받은 사람, SMS 보낸 사람을 전산 (특이결과기록 과 소견)를 통하여 기록.\n피통보자의 실명이 불분명한 경우 담당주치의, 담당간호사로 기록함.\n- SMS수신자가 결과를 확인했는가 여부 조회는 LIS – 결과관리- CVR조회/통계 에서 조회 가능함.\n단, 이전 결과도 Critical Value인 경우 24시간 내에는 재보고하지 않음.\n6) [특이결과기록관리]는 매월 파트장의 확인 후 담당전문의가 검토함.\n※ Delta Check 설정방법\n(1) 변화차 = 현재결과 - 이전결과\n(2) 변화비율 = 변화차/이전결과 * 100\n(3) 기간당 변화차 = 변화차/기간\n(4) 기간당 변화비율 = 변화비율/기간\n(5) 절대변화비율 = 변화차/이전결과\n※ 본 검사실의 즉시 보고(Critical Value) 해야 할 항목 및 기준\n(1) Glucose : ∠40 mg/dL, >700 mg/dL\n(2) Na : ∠110 mM/L, >160 mM/L\n(3) K : ∠2.7 mM/L, >6.4 mM/L\n(4) Total Bilirubin : >20 mg/dl\n(5) Ammonia(NH3) : >300 umol/L\n(6) Lactic Acid : >20 mg/dl\n※ 결과보고까지 이어지는 순차적 자동검증 규칙. (AUTO15. - 3.1.2.10. 임상화학 알고리즘 참조)\nⅢ-7. 사고 나 오류발생\n모든 사고나 오류는 즉시 파트장에게 보고하며 파트장은 이를 담당전문의(진단검사의학과장)와 지침에 의하여 조치방법을 결정하고 신속히 대처함.\n검체채취, 검사시행 및 결과보고의 모든 과정에서 발생할 수 있는 검사 오류들은 다음과 같이 세가지로 분류하며 이에 따른 적절한 조치가 반드시 취해져야 함. 검사 오류의 최종 책임은 자동화학 담당전문의 에게 있음.\nCategory I, II의 문제발생 - 보고서 작성함.\nCategory I - 진단검사의학과 질향상회의에 보고함.\nCategory II - 담당전문의의 관리를 받음.\nCategory III - 각 검사실 내에서 자체 해결함.\n1. 심각한 오류 (Category I - Serious)\n검체체취, 검사시행, 결과판독 및 최종보고 과정에서의 오류로 검사결과를 잘못 판독하거나, 잘못된 검사를 시행한 경우 혹은 검사시행 시 환자의 검체가 바뀌어 잘못된 진단을 초래한 경우로서 절대 발생해서는 않됨.\n1) 내부적 오류\n(1) 오류발생의 원인이 진단검사의학과에서 발생된 경우로서 담당병리사는 결과오류수정기록을 작성 하여 파트장의 확인 후 자동화학 담당전문의에게 제출하여야 하고 담당전문의는 그 원인을 파악 하고 적절한 조치를 취한 후 보고서에 조치사항을 기록하고 서명한 후 진단검사의학과 질향상 회의에 보고서를 제출함.\n(2) 진.검 질향상회의는 이를 검토한 후 특정 결정사항이 있는 경우 보고서에 작성하여 회의의 팀장 인 진단검사의학과장에게 제출하여 서명 받은 후 간사인 진,검 팀장이 보고서를 최종 보관함.\n2) 외부적 오류\n(1) 오류의 원인이 진단검사의학과에서 발생된 것이 아니라 외부에서 비롯된 것으로 담당병리사는 결 과오류수정기록을 작성하여 파트장에게 보고 후 자동화학 담당전문의에게 제출하여야 하며 담당 전문의는 오류발생을 임상의사에게 통보하고 추후 같은 일이 발생하지 않도록 적절한 방법을 의 논하여 보고서에 조치사항을 기록하고 서명한 후 진단검사의학과 질향상회의에 보고서를 제출함.\n(2) 질향상회의는 이를 검토한 후 특정 결정사항이 있는 경우 보고서에 작성하여 회의의 팀장인 진단 검사의학과장에게 제출하여 서명 받은 후 간사인 진,검 팀장이 보고서를 최종 보관함.\n2. 중대한 오류 (Category II - Major)\n위의 1. 심각한 오류 (Category I - Serious) 의 경우이나 최종보고하기 전 [예비보고 ○]에 발견한 경우로 이 또한 발생해서는 않됨.\n1) 담당병리사는 전산메모(소견)와 특이결과기록에 해당 내용(수정 전 후 결과, 수정사유, 연락받은 사람, 연락한 사람)을 기록하여 전산입력하고 업무일지에 내용을 기록하여 파트장에게 보고 후 담 당전문의에게 제출하여야 하고 담당전문의는 그 원인을 파악하고 적절한 조치를 취한 후 필요한 경우 보고서를 받아 조치사항을 기록하고 서명한 후 보관한다.\n2) 담당전문의는 오류발생의 원인을 파악하거나 오류해결을 위해 필요한 경우 임상의사에게 전화로 통보하고 이를 기록하고 서명해야 함.\n3. 경미한 오류(Category III- Minor)\n검사를 시행하는 과정이나 사무적 착오가 발생한 경우로 환자의 검사결과에는 결정적인 영향을 미 치지 않은 경우임.\n1) 담당병리사는 파트장에게 이를 보고하고 파트장은 이에 대한 적절한 조치를 취하고 필요시 문제발 생사유서를 기록함.\n4. 오류 및 수정보고 체계\n1) 오류 발생시는 결과를 즉시 수정하며 결과가 이미 verify 된 후 오류가 발견된 경우 (최종보고수정 - 1. 심각한 오류)에는 우선 (정도관리담당) 또는 파트장에게 알린다. (정도관리담당) 또는 파트장 은 담당전문의에게 알린 후 결과를 수정하고 담당 의료진 (의사 또는 간호사)에게 전화하여 사유를 설명함.\n2) 결과보고 오류내용과 결과 수정 내역을 결과오류수정기록에 기록한 후 통화내역 등 모든 과정도 기록한 후 수정 전, 후 결과를 print screen 또는 결과조회를 출력해두고 LIS 결과보고 소견에도 장부에 기록한 내용을 입력함.\n3) 결과의 오류를 의심하는 연락이 온 경우 즉시 보관검체 프로그램을 통해 검체를 확보한 후 검체의\n유효성을 확인한 뒤 즉시 재검을 시행함. 보관검체의 확보가 불가능한 경우 즉시 임상에 유선으로 재채혈을 요청하여 재검을 실시함.\n4) 재검의 결과는 즉시 유선으로 통보한 후 의심결과의 수정보고 시 위의 절차를 따름.\n5) 수정된 검사결과는 원칙적으로 통상보고일자 내에 보고되어야 함.\n매일 시행하는 검사는 당일보고, 검사일이 정해진 검사는 해당검사 당일 또는 익일 오후 5시까지\n보고 되어야 함.\n6) 수정된 결과와 함께 수정 전 결과와 수정사유가 보고서에 명시되어야 하며 연속적으로 수정을 반 복한 경우 수정된 결과와 일시 등이 순서대로 보고되어야 함.\n7) 원래 결과와 수정된 결과는 2년 이상 보관되어야 함.\n8) 결과오류 수정에 관한 관리는 진단검사의학과 질향상회의에 보고되어, 진검 팀장 및 과장은 진단검 사의학과 key indicator 관리 中 [결과 수정율(‱)]로 관리함.\nⅣ. 장비 및 일반기기 관리\n자동화학검사실에서 사용되는 모든 기기 및 장비는 정해진 규격에 따라 주기적으로 그 기능을 검증하며 장비기능을 효율적으로 유지하고 고장 예방을 위해 청결상태 유지, 점검 목록 등을 마련하여 매일 체크 하고 기록함. 이상이 발견된 경우에는 즉시 파트장 또는 담당전문의에게 알려 적절한 조치를 취할 수 있게 함.\n1. 일반 원칙\n1) 모든 장비 및 기기는 기능확인과 장비 유지 및 보수 기록 장부를 준비함.\n또한 주기적으로 정해진 점검표에 따라 기능을 확인한다. 유지, 보수에 관한 어떠한 형태의 조치든\n각 장비나 기기의 유지 및 보수 기록 장부에 빠짐없이 기록되어야 함.\n기록 양식은 각 장비지침에 포함되어있는 경우 이를 이용하고, 개별적 양식이 있다면 지침에 별첨 하여 사용.\n2) 일부 장비는 공급 회사 또는 의공학과의 예방적 점검을 정기적으로 시행하고 이를 기록함.\n3) 장비에 관한 매뉴얼, 유지 및 보수기록은 해당 장비가 있는 장소에 비치, 보관함.\n4) 모든 장비 및 기기에 대한 유지 및 보수의 일차적 책임은 (정도관리담당)병리사에게 있으며 이를 관리하는 책임은 파트장에게 있고 이상 발생 시 팀장 및 담당전문의 (또는 과장)에게 보고함.\n5) 장비에 대한 모든 기록은 장비 폐기 시까지 보관함.\n2. 분석장비\n1) 기기 및 장비의 관리\n(1) 검사실의 분석 장비 및 중요장비는 단전에 대비하여 UPS (Uninterrupted Power Supply) 체계\n를 갖추어야 함.\n- 분석장비는 반드시 UPS 전원 설치해야 함. [별첨 2]참조\n(2) 전기상태의 문제 발생시 의공학팀 및 시설팀에 즉시 통보하여 해결함.\n(3) 각각의 maintenance chart를 참고하여 정해진 시기마다 시행하고, 청소와 정기점검의 시행 및\n기록을 빠지지 않도록 함.\n(4) 지침에 따라 Calibration 및 정해진 표준물질을 사용하여 기기의 정확도 및 정밀도를 평가함.\n(5) 모든 장비의 control value, instrument function, temperature가 한계치를 넘으면 지침에 따 라 corrective action을 취하여 수정하고 기록함.\n(6) 담당자는 매일매일 정도관리 물질의 결과를 확인하여 결과가 허용치를 벗어날 경우 지침에 따라\n재검과 Re-calibration등 필요한 조치를 취함.\n(7) 검사가 끝나면 기기를 세척하고 장비를 점검함. (Daily maintenance)\n2) 자동화학검사실 점검 장비\n- TLA\n- Canon TBA FX8\n3) Carry-Over 검증\n- 일회용 Tip을 사용하는 장비를 제외한 자동pipette 장착장비는 정확도와 재현성을 1년에 2회 점검\n하고 기록을 보관함.\n- 허용범위 = ‹ ±1%\n- 최초 기기 도입 시 혹은 대규모의 기기점검 및 보수 후에는 Carry-over 평가실시 함.\n(1) Carry over 허용기준\n- 자동 Pipette의 정기점검 시 허용범위 : ∠ ±1%\n- 자동화 장비부속 pipette의 허용범위 : ∠ ±1%\n(2) 기기부착 Pipette carry-over 점검방법\n- 고농도 검체 연속 4회(H1, H2, H3, H4) → 저농도 검체 연속 4회(L1, L2, L3, L4)\n- Carry over % = [L1-(L3+L4)/2 ] X100 / [(H3+H2)/2 – (L3+L4) /2 ]\n(3) TBA FX8 검증\n① 검사 방법: 각 종목의 High 검체, Low 검체 를 각각 4회 검사하여 아래 계산식에 의해\n오염율을 구함..\n② 검사 순서: High – High - High - High - Low - Low - Low -Low\n③\nL1 - (L3 + L4) / 2\nCarry over % = X 100 (%)\n(H2 + H3) / 2 - (L3 + L4) / 2\n④ 점검항목 : A line – AST, CA\nB line – ALT, GLU\n4) 문제 발생시 해결체계\n(1) 장비 담당자는 고장의 원인과 증상을 파악하여 (정도관리담당) 또는 파트장에게 보고함.\n(2) 기기회사에 직접 수리를 요청할 경우 (정도관리담당) 또는 파트장은 의공학팀 (☎ 5959)과 상의 하여 연락함.\n이상 발생 시간과 비용 발생 등을 고려하여 상세내용을 충실히 Repair report에 기록한다.\n(3) 문제 해결이 지체되어 결과보고에 지장을 초래 할 경우 반드시 담당전문의 또는 진단검사의학\n과장에게 보고하여 대책을 마련함.\n(4) 수리 후 수리기록내역서을 반드시 받아 장비 점검 일지에 보관하거나, LIS - 기본정보관리 – 일 반관리 - 진검 History관리에 스캔하여 보관할 수 있음.\n3. 기기 및 장비(일반공통기구)\n1) 온도계 관리\n(1) 온도 점검하는 모든 장비는 원칙적으로 매일 온도를 확인하며 관찰 결과를 수기로 기록함.\n표준온도계 도입 시 1주일간 냉장, 냉동 상태에서 비교한 후 온도계식별표에 그 차이를 기록하여\n부착함으로 측정되는 온도의 정확성을 판단할 수 있게함\n표준온도계와 점검 대상 온도계를 냉장고/냉동고 내부 동일 위치에 설치한 후 1~2시간 이상 안정화 시킨 뒤 온도를 비교하여 오차를 확인 후 온도계식별표에 그 차이를 기록하여 부착함.\n(2) 일반온도계는 표준온도계와 비교 시 허용범위 (± 1℃) 를 초과할 경우 폐기함.\n(3) 자동화학검사실에서 사용하는 모든 온도계는 1년에 1회 이상 (2회) 표준온도계와 점검하고 기록을 보관함.\n2) 원심분리기(Centrifuge)\n(1) 사용 시 주의점\n- 본 검사실은 AutoBalance Centrifuge이므로 균형확인을 위한 무게점검은 생략 가능함.\n- 온도를 사용할 때 작동하는 동안 온도가 유지되는지 점검함.\n- 냉장 원심분리기는 RPM 3,500 이상 사용하지 않음.\n- 원심분리기를 사용할 때 사용 용도에 따라 속도와 시간을 유지시킴.\n* 혈청(혈장) 분리 : 3,500 RPM (2.465g) 7분\n(2) 점검사항\n- 원심분리기는 문이 정확하게 닫은 것을 확인한 후 작동을 시작함.\n- 뚜껑이 없는 튜브, 인화성 액체 등은 원심분리 하지 않음.\n- 작동이 멈춘 것을 확인한 후 원심분리기의 뚜껑을 연다.\n- 원심분리기 헤드에 손을 대어 멈추게 하거나 속도를 늦춰서는 안됨.\n- 수염, 넥타이 등은 작동중인 원심분리기와 일정한 거리를 유지하여 사고를 미연에 방지함.\n- 수시로 원심분리기는 이물질이 없도록 깨끗이 청소함.\n- 3개월마다 속도를 점검하여 ± 0.5% 이내에 드는지 확인함.\n- 6개월마다 전기접속부위의 상태를 점검함.\n- brush, rotor, burket 등 소모품은 필요시 교체한다.\n(3) tachometer를 이용해 특정된 속도의 허용한계는 ± 0.5% 이며, 이 한계를 벗어날 경우 의공학팀을 통해 장비 회사에 연락하여 전반적인 수리를 받음.\n3) 냉장고 및 냉동고\n(1) 점검사항\n① 매일\n- 온도를 점검한 후 수기로 기록하고 확인 서명함.\n- 허용범위를 벗어난 경우 (정도관리담당) 또는 파트장에게 알려 조치하고 조치내용을 기록함.\n<온도허용범위>\n* 냉장고 : 2 ~ 8 ℃\n* 중앙냉장고/중앙냉동고 : 2 ~ 8℃ / -22 ~ -18 ℃\n- 허용범위를 벗어날 경우 냉장고,냉장고 내에 있는 시약, 정도관리물질 등은 즉시 부서 내\n온도관리 확인된 다른 냉장고/냉동고로 옮기고 시약의 안정성을 점검함.\n냉장고 문을 열었을 때 내부 공기순환 송풍장치가 작동하는지 확인하고 팬이 회전하는\n지 점검함.\n중앙냉동고의 경우 내부성애가 문의 작동을 방해하거나 저장공간을 크게 감소시키는지\n여부를 점검함.\n냉각센서의 위치에 따라 점검온도의 오차 발생하므로 디지털 온도계가 아닌 아날로그 온도계 로 매일 확인함.\n② 매 6개월, 또는 필요시\n- 냉동고의 얼음을 제거함.\n- 최소한 내부의 얼음이 1㎝ 이상 쌓이기 전에 서리제거 함.\na. 냉동고 또는 드라이 아이스가 포함된 박스에 내용물을 옮김.\nb. 전원코드를 콘센트로부터 뽑아둠.\nc. 녹은 얼음이 흡수되도록 냉동고 주위에 두꺼운 타올을 놓음.\nd. 냉동고 문을 열고 실온에 이르도록 한다. 빨리 실온화 시키기 위해 따뜻한(뜨겁지 않은)\n물을 냉동고 안에 넣어도 됨.\ne. 긁개, 나무, 플라스틱 긁개 또는 다른 기기를 이용하여 붙어있는 얼음을 제거함.\nf. (주의) 날카로운 기구로 얼음을 제거하지 말고, 만약 실수로 내부의 코일을 손상 시켰을\n경우 다시 사용하기 전에 서비스를 받아야 함.\ng. 내부 청소 후 냉동고 문을 닫고 전원을 연결한 후 최소한 1시간 정도 온도를 점검함.\n이때, 냉동고 온도는 설정된 온도가 되어야 한다. 내부온도가 설정된 온도 상태로 유지되면\n내용물을 다시 냉동고 안으로 이동함.\n- 성애방지 기기의 경우 배출팬을 점검하여 물이 고여 있는지, 배출관이 다른 곳으로 빠져있지 는 않은지, 배출관에서 물이 잘 배출되는지 점검한다.\n- Defreezer 얼음 제거 - 과내 담당파트 (분자유전)에서 관리함.\na. 플라스틱 주걱 또는 나무 긁개를 사용하여 가루형태의 얼음을 컵이나 쓰레받기로 받아냄.\nb. 가볍게 치거나 두드리면서 가스켓 주위의 얼음을 제거하고, 제거된 얼음 조각이 냉동고 안쪽이나 바닥에 떨어지지 않게 하고, 떨어져 나온 조각은 즉시 싱크대에 버림.\nc. 내부를 연한 비눗물로 닦아 내고 행구어 말리고, 부드러운 헝겊을 사용하여 냉동고 내부의\n물기를 제거한 후 건조 시킴.\n- 가스켓 점검\na. 점검 중 곰팡이가 있으면 10% 표백제를 사용하여 작은솔로 닦아준다. 세정 후 바세린\n또는, ArmorAll 를 고무 가스켓에 얇게 도포하여 고무 유연성을 유지하도록 한다.\nb. 도어 가스켓이 갈라지거나, 찢어지거나 휘어져 있으면 교체한다.\nc. A4 용지를 4인치 정도 넣고 냉동고문을 닫은 후 당겨보아 저항이 느껴지지 않으면\n가스켓을 교체한다.\n③ 매년\n- 전원코드를 점검함.\n- 수평자를 이용하여 바닥과 수평이 되는지 점검함.\n- 외부 알람 시스템을 사용한다면, 알람이 작동하는지 확인함.\n4) 자동 피펫\n- 과내 담당자(분자유전 파트장)에 의해 점검된 자료를 기기와 함께 보관함.\n(1) 자동피펫은 정확성과 재현성을 위해 1년에 2회 이상 점검하여야 하며 이것은 기록되어야함..\n(2) 피펫 점검절차\n① 공기의 큰 흐름이 없는 실내온도 15℃ ~ 30℃의 방에서 실시함.\n② 측정 가능한 저울과 안정적인 테이블을 준비함.\n③ 피펫 점검 시 3차증류수를 사용하며 측정장소의 온도 및 습도를 확인한다.\n< 흡입할 때 >\n- pipette을 수직으로 잡기.\n- 테스트할 액체에 2~3mm 정도 tip을 담근 후 천천히, 변화량 없이 흡입한다.\n< 분주할 때 >\n- 천천히, 일정하게 첫 번째 step까지 분주한다.\n- tip안의 남은 잔량을 제거하기 위해 두 번째 step(blow-out)까지 button을 누른 후 양을 측정한다.\n< Leak test >\n- 팁에 용액을 채워 약 15초 동안 수직으로 들고 용액의 새는 여부를 확인함.\n④ 5회 측정값을 문서화 함.\n(3) Evaluation\n① 무게의 부피환산을 위한 Z-factor를 사용한다.\nvolume = 25℃ 기준 저울측정값(mg) X Z-factor 1.004\n② 정확도 (Systemic error %, Inaccuracy): z-factor로 환산한 volume값 – target volume/ target volume\n③ 정밀도(Random error %, imprecision): SD/mean x100\n<Z-factor>\n(4) 허용범위\nSystemic error(%)\nRandom error(%)\n10 ul\n1.0 ul\n2.0%\n6.0%\n0.8%\n4.0%\n200 ul\n20.0 ul\n0.8%\n4.0%\n0.3%\n1.5%\n100 ul\n10.0 ul\n0.8%\n4%\n0.3%\n1.5%\n1000 ul\n100.0 ul\n0.8%\n4%\n0.3%\n1.5%\n20 ul\n2.0 ul\n1.0%\n5%\n0.5%\n2.5%\n1000 ul\n100.0 ul\n(multipette)\n1%\n5%\n0.4%\n2%\n** 참조: Tietz 및 ISO8655 tolerance range\n(5) pipette의 모든 부분은 비눗물 또는 소독용 알코올로 청소 가능하며 상기 용매로 청소된 부분 들은 증류수로 헹구며 Pipette이 건조된 후 조립함.\n(6) 허용범위를 벗어나는 피펫은 팀장에게 보고 후 수리, 점검을 진행함.\n(7) 자동 피펫은 수시로 내부와 외부를 청소해주어야 함.\n(8) 자동 피펫의 정확성을 비중법으로 검증하는 경우, 합당한 표준분동을 이용한 분석평형저울 점 검이 선행되어야 함. (자체검검-연 2회, 정기점검-연 1회 실시)\n5) Glass ware\n(1) 유리제 부피계(Volumetric Pipette)는 제조사의 정확도 기준(Class A)을 만족하는 제품만을 사용 하며 신규 도입 시 정확도를 검증함.\n이후 사용 중에는 파손, 눈금 이상, 오염 여부 등 상태점검을 시행하고, 이상이 발견되거나 정확 도 문제가 의심되는 경우 재검증 또는 즉시 교체한다.\n- 본 검사실의 Volumetric pipette은 정도관리물질과 시약 조제에 필요한 D.W만 사용함.\n- 다른 화학적 재료들과 혼용하지 않음.\n(2) 세척 : 정제수(Milli-Q: Type II Reagent Water)로 최종 2~3회 세척.\n완전 건조 → 전용 보관함 또는 캐비닛에 보관.\n(3) 깨지거나 손상된 Volumetric pipette은 즉시 폐기한다.\n6) 전기점검\n검사실의 분석 장비 및 중요장비는 단전에 대비하여 UPS(Uninterrupted Power Supply) 체계를\n반드시 갖추어야 함. [별첨 2]참조\n(1) 전기상태의 문제 발생시 의공학팀(☎5956) 및 시설팀(☎6000)에 통보하여 즉시 해결한다.\n(2) 전기상태를 포함하는 Low risk 장비 및 비품의 일반점검사항은 LIS – 공통 – 자산관리 – 의료기 기 일상점검을 통해 파트장이 매월 점검한다.\n[장비점검 현황]\n화학분석장비\nTLA system\n일반 기기\n기기명\nTBA-FX8 #1, 2, 3, 4.\nCLINILOG Ver.4\n각 냉장고, 냉동고\n중앙냉장고,냉동고\n일 반\n제조사\nCanon\nA & T\n[점검 주기]\n[점검 현황]\nDaily\n매일점검\n매일점검\n매일 온도점검\n사용자 일상점검\nWeekly\n주간점검\n주간점검\nMonthly\n월간점검\n월간점검\nQuarterly\n분기점검\n분기점검\n중앙냉장고,냉동고의 경고음 점검\ncentrifuge\n- 속도, 타이머\nSEMI-Annual\n반기점검\n반기점검\n중앙냉동고의\n얼음, 서리 제거\n① Auto Pipettes 점검\n② 온도계 - 표준온도계와 비교점검\nAnnual\n전원코드 점검.\n외부 알람 시스템의 알람이 작동하는지 확인.\n※ 제조사 권장사항에 따라 시행함.\nDaily : 매일 시행.\nWeekly : 주의 하루를 정하여 시행.\nMonthly : 월의 하루를 정하여 시행.\nQuarterly : 3월, 6월 9월, 12월의 하루를 정하여 시행.\n분석장비의 경우 정기예방점검(PM)으로 대신할수 있음.\nSEMI-Annual : 6월, 12월의 하루를 정하여 시행. 또는 필요시\n분석장비의 경우 정기예방점검(PM)으로 대신할수 있음\nAnnual: 1년 중의 하루를 정하여 시행.\nⅤ. 기록 및 자료의 보관\n환자결과는 전산보관되며 각종 내부정도관리 결과는 적어도 2년, 외부정도관리 결과는 4년 보관을 원칙으로 함. 장비 관리에 대한 기록은 그 해당장비 보유기간 동안 보관함.\n1. 자료보관\n1) 외부정도관리 결과는 4년 보관 원칙.\n2) 내부정도관리 관련 기록은 2년 보관.\n3) 장비관리에 대한 기록(일일, 주중, 월별, 연중)은 그 장비 보유기간 동안 보관함을 원칙.\n4) 업무일지는 2년간 보관.\n5) 영구적으로 보관되어야 하는 문서\n- 환자의 검사결과는 10년 이상, LIS로는 영구보관.\n- 자동화학 운영지침서, 검사별 지침서 : 영구보관\n- 검사 중단된 검사의 지침서는 2년간 보관한다.\n6) 검사수행능검증이 완료되고 전문의의 검토, 확인 서명 후 적용완료된 Raw Data는 보관하지 않음.\n2. 기록\n1) 자동화학검사실의 모든 점검기록 및 검증기록은 (정도관리담당) 또는 파트장의 확인, 서명이 있어 야하고 내용에 따라 특히 검사에 관한 검증기록은 전문의의 확인, 서명이 있어야 함.\n2) 갑자기 일어난 문제나 사고는 업무일지(인수인계장부)에 기록하여 다음 근무자가 이를 참고하도록\n하며, 모든 병리사는 근무 시작 시간에 업무일지 읽기.\n인수인계시는 다음 근무자와 함께 업무일지를 검토, 서명함.\n- 업무일지에는 시행한 내부정도관리결과와 조치사항, 기기의 기능점검 내용 및 상태 기록을 비롯한 온도유지 장비의 온도점검 기록을 포함하므로 업무 인수인계 시 정확한 내용의 인수인계가 이루어\n졌음을 자필 서명하고 또한, 특이사항 등의 전반적인 자동화학부서의 업무내용이 기록 되어야함.\n- (정도관리담당) 또는 파트장은 업무일지의 내용을 확인, 기록, 서명하고 필요에 따라 팀장 또는 담 당전문의 에게 보고함.\n3) LIS에 error message가 나타날 경우 이를 무시하지 말아야 함. 주간 근무 중 에러메시지가 나타나 면 이를 파트장 또는 팀장과 의료정보팀에 알림.\n업무일지에 에러 메시지 내용, 에러 발생 당시의 환자이름과 병록번호, 사용하던 기능을 기록하고 print screen 하거나 에러코드 또는 에러 메세지를 기록함.\n4) LIS가 다운될 경우 이를 담당전문의, 파트장 및 팀장, 의료정보팀(☎ 7067)에 즉시 알림.\n- 전산장애 시 업무처리 및 행동지침에 따라 검사, 기록 처리함. [별첨 3]참조\nⅥ. 업무규정\n1. 자동화학 업무 일반원칙\n1) 일반화학과 관련된 업무 및 검사를 수행하며, 일반화학 업무를 숙지한 임상병리사에 의해 수행됨.\n2) 자동화학 업무 시간\n(1) 주간근무 : 평일 (월 ~ 금) – 08:30 ~ 17:30\n(2) 야간근무 : - 17:30 ~ 익일 08:30\n(3) 당직근무 : 토요일, 일요일 및 공휴일 – 08:30 ~ 17:30\n3) 모든 자동화학 근무자는 근무 교대 시 마다 업무일지를 통하여 기록으로 서로 인계하며 내부정도 관리 결과, 기기 기능 유지 및 온도 기록 등을 구두로 다시 확인함.\n4) [정규]약물·단백면역화학 검체 접수 마감 시간은 15:30으로 하고, 토요일은 10:30 으로 함.\n공휴일 및 일요일은 진단검사의학과 접수 파트 당직자가 확인 접수하며 다음 평일 08:30 이전에\n자동화학검사실로 인계함.\n5) 자동화학 검사담당자는 검사업무를 수행하기 전에 검사에 필요한 모든 기구 및 시약, 재료 등을 준 비하고 점검해야 하며, 특히 온도 기록을 요하는 냉장고 기계에 대하여는 매일 정해진 점검시간에\n온도를 읽어 기록하도록 함.\n6) 담당자 휴가 시 업무기술서에 따라 정해진 대체근무자는 담당자와 같이 시약의 재고 및 기기, 장\n비의 상태 등을 인수인계하고 업무일지에 서명함.\n7) 업무규정을 어기는 일이 발생하면 다음날 오전 중으로 파트장이 상황을 검토, 조사하여 그에 대 한 적절한 조치를 취하고 그 내용을 기록, 보관하고 자동화학 담당전문의에게 상황을 보고함.\n8) 파트장이 부재중 일 때 정도관리 담당병리사는 파트장이 총괄하는 전반적인 업무를 대행하고, 수행 된 결과는 자동화학 담당전문의가 검토하며 파트장은 출근날 오전 중으로 업무일지를 통하여 부재 중에 있었던 상황을 점검함.\n9) 직무교육\n(1) 자동화검사실 임상병리사는 진단검사의학과에서 주관하는 직무교육에 반드시 참여하여야 함.\n(2) 자동화검사실 자체에서도 업무에 관련된 주제를 정하여 직무교육을 실시 할수 있다. 이 경우 자 동화검사실 직원의 전원 참석함을 원칙으로 하고 발표의 의무를 가짐.\n10) 자동화학검사실의 물리적 설비지침\n(1) 검사업무공간을 둔다.\n(2) 일정한 사무공간을 둔다.\n(3) 일정한 기구를 장치할 수 있는 공간을 둔다.\n(4) 물품을 보관할 수 있는 창고를 둔다. (공간 부족으로 잉여공간 활용함.)\n(5) 냉장고를 비치한다.\n(6) 담당자들이 일하기 위한 각각의 위치는 충분한 공간을 둔다.\n(7) 바닥과 실험대는 깨끗하게 청소하여 유지한다.\n(8) 적절한 설비를 갖춘다.(개수대, 환기, 온도, 조명, 전화, 업무용PC 등)";

function uid(p){return p+"_"+Math.random().toString(36).slice(2,8);}
function nowTs(){return new Date().toISOString().slice(0,16).replace("T"," ");}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ---------- DB layer ---------- */
let DB, memoryOnly=false;
function ensureFields(){
  const d=seed();
  ["bookmarks","recent","progress","started","audit","trainings","customVisuals","drafts"].forEach(k=>{ if(!Array.isArray(DB[k])) DB[k]=[]; });
  if(!DB.pins) DB.pins=d.pins;
  if(!DB.quizzes) DB.quizzes={};
  if(!DB.itemAssess) DB.itemAssess=deriveAssess(DB);
  if(!DB.session) DB.session={user:null};
  if(!DB._tab) DB._tab={};
}
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    DB = raw ? JSON.parse(raw) : seed();
    ensureFields();
    if(!raw) save();
  }catch(e){ memoryOnly=true; DB = seed(); }
}
function save(){
  if(memoryOnly) return;
  try{ localStorage.setItem(LS_KEY, JSON.stringify(DB)); }
  catch(e){ memoryOnly=true; }
}
function logAudit(action,target){
  DB.audit.unshift({id:uid("au"),at:nowTs(),actor:userName(DB.curUser),action,target:target||"-"});
  save();
}
function userName(id){const u=USERS.find(x=>x.id===id);return u?u.name+" ("+u.short+")":id||"-";}
function userRole(id){const u=USERS.find(x=>x.id===id);return u?u.role:"";}
function curUser(){return DB.curUser;}
function isAdmin(){return userRole(DB.curUser)==="담당 전문의";}
function canApprove(){return userRole(DB.curUser)==="담당 전문의";}
function canReview(){const r=userRole(DB.curUser);return r==="담당 전문의"||r==="파트장 병리사";}
function doc(id){return DB.documents.find(d=>d.id===id);}
function docRevs(id){return DB.revisions.filter(r=>r.docId===id).sort((a,b)=>a.date<b.date?-1:1);}
function latestRev(id){const r=docRevs(id);return r[r.length-1];}

/* ---------- Status helpers ---------- */
function statusChip(s){
  const m={"승인":"c-ok","검토":"c-warn","초안":"c-grey","사용중단":"c-bad"};
  return `<span class="chip ${m[s]||'c-grey'}">${s}</span>`;
}
function overdue(t){ return !t.completedAt && t.due < today(); }
function reviewOverdue(d){ return d.status!=="사용중단" && d.reviewDue < today(); }
function reviewSoon(d){ return d.status!=="사용중단" && d.reviewDue>=today() && d.reviewDue<=daysFromNow(30); }

/* ---------- Readiness computation ---------- */
/* 문항별 수동 판정(예/부분/아니오/해당없음) 기반 인증 준비도.
   문서 매핑은 근거로 유지하고, 판정은 전문의·파트장이 직접 지정한다.
   해당없음=분모 제외, 미평가=0점(분모 포함). */
const ASSESS_VALUES=["예","부분","아니오","해당없음"];
function assessOf(no){ return (DB.itemAssess&&DB.itemAssess[no])||"미평가"; }
function setAssess(no,val){ DB.itemAssess=DB.itemAssess||{}; if(val==="미평가"||!val) delete DB.itemAssess[no]; else DB.itemAssess[no]=val; logAudit("인증 문항 판정",no+" → "+(val||"미평가")); save(); render(); }
/* 근거(문서 매핑)로부터 초기 판정 자동 추정 — 사람이 검토·수정하는 초안 */
function deriveAssess(db){
  const res={}; const t=today();
  db.items.forEach(it=>{
    const m=db.mappings[it.no]; let s="아니오";
    if(m){
      const hasDoc=m.docs&&m.docs.length, hasNote=m.note&&m.note.trim();
      if(hasDoc){ const anyValid=m.docs.some(id=>{const d=db.documents.find(x=>x.id===id);return d&&d.status==="승인"&&d.reviewDue>=t;}); s=anyValid?"예":"부분"; }
      else if(hasNote){ s="부분"; }   // 문서 없이 메모만 있으면 '부분'(근거 확인 필요)
    }
    res[it.no]=s;
  });
  if(res["23.210.460"]) res["23.210.460"]="아니오";  // 예: 요경검 지침서 미등록
  return res;
}
function autofillAssess(){ if(confirm("문서 매핑 근거로 모든 문항 판정을 자동 추정값으로 채울까요? (기존 수동 판정은 덮어씁니다)")){ DB.itemAssess=deriveAssess(DB); logAudit("인증 판정 자동 추정 채움",""); save(); render(); } }
function clearAssess(){ if(confirm("모든 문항 판정을 '미평가'로 초기화할까요?")){ DB.itemAssess={}; logAudit("인증 판정 초기화",""); save(); render(); } }
function itemStatus(it){ const a=assessOf(it.no); return a==="예"?"충족":a==="부분"?"부분":a==="아니오"?"미충족":a==="해당없음"?"해당없음":"미평가"; }
function readinessByField(){
  const res={};
  FIELDS.forEach(f=>res[f]={pts:0,got:0,total:0,ok:0,part:0,no:0,na:0,exempt:0});
  DB.items.forEach(it=>{
    const f=res[it.field]; if(!f) return;
    f.total++;
    const a=assessOf(it.no);
    if(a==="해당없음"){ f.exempt++; return; }   // 분모 제외
    f.pts+=it.pts;
    if(a==="예"){f.ok++;f.got+=it.pts;}
    else if(a==="부분"){f.part++;f.got+=Math.round(it.pts*0.5);}
    else if(a==="아니오"){f.no++;}
    else {f.na++;}   // 미평가: 0점, 분모 포함
  });
  return res;
}
function overallReadiness(){
  const r=readinessByField(); let pts=0,got=0,ok=0,total=0,na=0;
  Object.values(r).forEach(v=>{pts+=v.pts;got+=v.got;ok+=v.ok;total+=v.total;na+=v.na;});
  return {pct: pts?Math.round(got/pts*100):0, ok, total, na};
}

function openDoc(id){
  const d=doc(id); const revs=docRevs(id);
  const cur=latestRev(id);
  let hist = revs.slice().reverse().map(r=>{
    const rv=r.reviewBy?`검토 ${userName(r.reviewBy.u)} (${r.reviewBy.at})`:'검토 대기';

    return `<div class="ev"><b>v${esc(r.version)}</b> · ${r.date} · ${esc(userName(r.editor))}<br>

  let diffHtml="";
  if(revs.length>1){ diffHtml=`<h4 style="margin:14px 0 6px">변경 대비 (v${esc(revs[revs.length-2].version)} → v${esc(cur.version)})</h4>`+makeDiff(revs[revs.length-2].content,cur.content); }

    <div><b>소유자</b> ${esc(userName(d.owner))}</div><div><b>검토만기</b> ${d.reviewDue} ${reviewOverdue(d)?'<span class="chip c-bad">초과</span>':''}</div></div>
    <h4 style="margin:14px 0 6px">현재 유효본 내용</h4>

  `);
}
/* ----- 작성·개정 이력 조회 + 전자서명 + 개정내용 확인 ----- */
function sigBox(label,by){
  if(!by) return `<span style="display:inline-block;border:1px dashed #cbd2d9;border-radius:8px;padding:6px 10px;margin:2px 6px 2px 0;font-size:12px;color:#98a2b3">${label}: 서명 대기</span>`;
  return `<span style="display:inline-block;border:1px solid #2e7d32;background:#f1f8f2;border-radius:8px;padding:6px 10px;margin:2px 6px 2px 0;font-size:12px"><b style="color:#2e7d32">✔ ${label}</b> · ${esc(userName(by.u))}<br><span class="muted">전자서명 ${by.at}</span></span>`;
}
function openDocHistory(id){
  const d=doc(id); const revs=docRevs(id); const cur=latestRev(id);
  const rows = revs.map((r,idx)=>{
    const kind = idx===0?'<span class="chip c-navy">제정(작성)</span>':'<span class="chip c-blue">개정</span>';
    const rv=r.reviewBy?`${esc(userName(r.reviewBy.u))}<div class="muted">${r.reviewBy.at}</div>`:'<span class="chip c-grey">검토 대기</span>';
    const ap=r.approveBy?`${esc(userName(r.approveBy.u))}<div class="muted">${r.approveBy.at}</div>`:'<span class="chip c-grey">승인 대기</span>';
    const label = idx===0?'내용 보기':'개정 내용 확인';
    return `<tr>
      <td><b>v${esc(r.version)}</b><div>${kind}</div></td>
      <td class="muted" style="white-space:nowrap">${r.date}</td>
      <td>${esc(userName(r.editor))}</td>
      <td>${esc(r.reason)}</td>
      <td>${rv}</td>
      <td>${ap}</td>
      <td class="row-actions"><button class="btn sm" onclick="viewRevision('${id}','${r.id}')">${label}</button></td>
    </tr>`;
  }).join("");
  const needReview = !cur.reviewBy && canReview();
  const needApprove = cur.reviewBy && !cur.approveBy && canApprove();
  const cmp = revs.length>1?`<h4 style="margin:18px 0 6px">버전 간 변경 비교 (개정 내용 확인)</h4>
    <div class="toolbar no-print" style="gap:6px;flex-wrap:wrap">
      <label class="muted">이전</label>
      <select id="cmpA" style="padding:6px 8px;border:1px solid var(--line);border-radius:7px">${revs.map((r,i)=>`<option value="${i}" ${i===revs.length-2?'selected':''}>v${esc(r.version)} · ${r.date}</option>`).join("")}</select>
      <span>→</span>
      <label class="muted">이후</label>
      <select id="cmpB" style="padding:6px 8px;border:1px solid var(--line);border-radius:7px">${revs.map((r,i)=>`<option value="${i}" ${i===revs.length-1?'selected':''}>v${esc(r.version)} · ${r.date}</option>`).join("")}</select>
      <button class="btn" onclick="compareRevs('${id}')">변경 비교</button>
    </div><div id="cmpOut"></div>`:'';
  openModal(`작성·개정 이력 · ${esc(d.docNo)} ${esc(d.title)}`, `
    <div class="two"><div><b>문서번호</b> ${esc(d.docNo)}</div><div><b>현재버전</b> v${esc(d.version)} ${statusChip(d.status)}</div>
    <div><b>제정일</b> ${revs[0]?revs[0].date:'-'}</div><div><b>총 개정</b> ${Math.max(0,revs.length-1)}회 (전체 ${revs.length}판)</div></div>
    <h4 style="margin:16px 0 6px">이력 조회 — 일자 · 작성/개정자 · 전자서명(검토·승인)</h4>
    <div class="tbl-wrap"><table><thead><tr><th>버전/구분</th><th>일자</th><th>작성/개정자</th><th>사유</th><th>검토 전자서명</th><th>승인 전자서명</th><th>내용</th></tr></thead><tbody>${rows}</tbody></table></div>
    ${cmp}
  `, `
    ${needReview?`<button class="btn ok" onclick="signDoc('${id}','review')">✔ 검토 전자서명 (${userRole(curUser())})</button>`:''}
    ${needApprove?`<button class="btn ok" onclick="signDoc('${id}','approve')">✔ 승인 전자서명 (전문의)</button>`:''}
    <button class="btn" onclick="window.print()">🖨 인쇄/PDF</button>
    <button class="btn" onclick="closeModal()">닫기</button>
  `);
  if(revs.length>1) compareRevs(id);
}
function compareRevs(id){
  const revs=docRevs(id);
  const ea=document.getElementById('cmpA'), eb=document.getElementById('cmpB');
  if(!ea||!eb) return;
  let a=parseInt(ea.value), b=parseInt(eb.value);
  const ra=revs[a], rb=revs[b];
  const same = ra.content===rb.content;
  document.getElementById('cmpOut').innerHTML =
    `<div class="muted" style="margin:6px 0">v${esc(ra.version)} (${ra.date}) → v${esc(rb.version)} (${rb.date})</div>`+
    (same?'<div class="notice">두 버전의 내용이 동일합니다.</div>':makeDiff(ra.content,rb.content));
}
function viewRevision(id,revId){
  const d=doc(id); const revs=docRevs(id);
  const idx=revs.findIndex(r=>r.id===revId); const r=revs[idx];
  const prev=idx>0?revs[idx-1]:null;
  const kind=idx===0?'제정(작성)':'개정';
  let diffHtml="";
  if(prev){ diffHtml=`<h4 style="margin:18px 0 6px">개정 내용 확인 — 변경 대비 (v${esc(prev.version)} → v${esc(r.version)})</h4>`+
    `<div class="muted no-print" style="margin-bottom:4px">– 삭제 / + 추가된 문장</div>`+makeDiff(prev.content,r.content); }
  openModal(`${kind} 내용 · ${esc(d.docNo)} v${esc(r.version)}`, `
    <div class="two"><div><b>구분</b> ${kind}</div><div><b>일자</b> ${r.date}</div>
    <div><b>작성/개정자</b> ${esc(userName(r.editor))}</div><div><b>사유</b> ${esc(r.reason)}</div></div>
    <div style="margin:10px 0">${sigBox('검토 전자서명',r.reviewBy)}${sigBox('승인 전자서명',r.approveBy)}</div>
    <h4 style="margin:14px 0 6px">${idx===0?'제정본':'개정본'} 전체 내용 (v${esc(r.version)})</h4>
    <div class="diff same" style="color:#333">${esc(r.content).replace(/\n/g,"<br>")}</div>
    ${diffHtml}
  `, `<button class="btn" onclick="window.print()">🖨 인쇄/PDF</button><button class="btn" onclick="openDocHistory('${id}')">← 이력으로</button><button class="btn" onclick="closeModal()">닫기</button>`);
}
function makeDiff(oldT,newT){
  const o=(oldT||"").split("\n"), n=(newT||"").split("\n");
  const oset=new Set(o), nset=new Set(n);
  let html='<div class="diff">';
  // deletions
  o.forEach(l=>{ if(!nset.has(l) && l.trim()) html+=`<span class="del">- ${esc(l)}</span>`; });
  n.forEach(l=>{ if(oset.has(l)) html+=`<span class="same">  ${esc(l)}</span>`; else if(l.trim()) html+=`<span class="add">+ ${esc(l)}</span>`; });
  html+='</div>';
  return html;
}
function signDoc(id,kind){
  const cur=latestRev(id); const d=doc(id);
  if(kind==='review'){ cur.reviewBy={u:curUser(),at:nowTs()}; logAudit("지침서 검토 서명",d.docNo+" v"+cur.version); }
  else { cur.approveBy={u:curUser(),at:nowTs()}; d.status="승인"; d.version=cur.version; d.effective=today();
    // set review due +1yr
    d.reviewDue=daysFromNow(365);
    logAudit("지침서 승인 서명·발효",d.docNo+" v"+cur.version);
    // auto-assign 숙지 training to owner + 담당자
    autoAssignTraining(d,cur.version);
  }
  save(); closeModal(); render();
}
function autoAssignTraining(d,version){
  ["u2","u3"].forEach(uidv=>{
    DB.trainings.push({id:uid("tr"),docId:d.id,version,assignee:uidv,type:"숙지",assignedAt:today(),due:daysFromNow(30),completedAt:null,signed:false,score:null,passed:null});
  });
  logAudit("개정 재숙지 자동 배정",d.docNo+" v"+version);
}

    </div>

    <div class="field"><label>개정 사유</label><input id="f_reason" placeholder="변경 내용 요약"></div>`:

function normalize(paras, filename, forceType){
  const lines=paras.map(p=>({t:(p.text||"").replace(/\s+$/,""),head:p.head})).filter(p=>p.t.trim()||p.head);
  const allText=lines.map(l=>l.t).join("\n");
  const type=forceType||guessType(filename,allText.slice(0,2000));
  const defs=SECTION_DEFS[type];
  // find title: first heading or first meaningful line
  let title=(lines.find(l=>l.head&&l.t.trim())||lines.find(l=>l.t.trim().length>3)||{t:filename.replace(/\.[^.]+$/,"")}).t.trim();
  // classify each line into a section by scanning for header-like lines
  const buckets=defs.map(d=>({name:d.name,lines:[]}));
  const preamble=[];
  let cur=-1;
  function headerMatch(txt){
    const clean=txt.replace(/^[\sⅠ-Ⅻ0-9().\-–·]+/,"").trim();
    if(clean.length>28) return -1; // headers are short
    for(let i=0;i<defs.length;i++){ for(const kw of defs[i].kw){ if(clean.toLowerCase().includes(kw.toLowerCase())) return i; } }
    return -1;
  }
  lines.forEach(l=>{
    const txt=l.t.trim(); if(!txt) return;
    const m=headerMatch(txt);
    if(m>=0 && (l.head || txt.length<=28)){ cur=m; return; }
    if(cur<0) preamble.push(txt); else buckets[cur].lines.push(txt);
  });
  // essential presence (from ESSENTIALS keyword scan over whole text)

  return {title,type,field:guessField(filename,allText),buckets,preamble,detected,ess,allText,paraCount:lines.length,charCount:allText.length};
}

function keyHighlights(text){
  const KEY=["westgard","1 3s","1-3s","2 2s","r 4s","10x","sdi","amr","panic","critical","delta","경고치","위험치","참고구간","참고치","mg/dl","연 2회","연 4회","calibration","보정","정도관리협회","cv"];
  const lines=(text||"").split("\n").map(l=>l.trim()).filter(Boolean);
  const seen=new Set(); const out=[];
  for(const l of lines){ const low=l.toLowerCase(); const hit=KEY.find(k=>low.includes(k)); if(hit && !seen.has(l) && l.length<160){ seen.add(l); out.push(l); if(out.length>=12)break; } }
  return out;
}

function normPreview(norm){

function buildNormContent(norm){

   ========================================================= */
let _vwrSearch="", _vwrScopeAll=false;
function hi(text,term){
  const t=esc(text);
  if(!term) return t;
  try{ const re=new RegExp("("+term.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi"); return t.replace(re,'<mark>$1</mark>'); }catch(e){ return t; }
}
function isMajor(t){ return /^[Ⅰ-Ⅻ]+[.\s]/.test(t) || /^【.+】/.test(t); }
function isSub(t){ return /^\d+\.\s+\S/.test(t) && t.length<55 && !/^\d+\.\d/.test(t) && !/(ul|㎕|%|mg|mL|nm|초|분)\s*$/i.test(t); }
function isItemStart(t){ return isMajor(t)||isSub(t)|| /^\d+[.)]/.test(t) || /^\(\d+\)/.test(t) || /^[①-⑳]/.test(t) || /^[-*·▪]/.test(t) || /^\[.+\]/.test(t) || t.includes(" | ") || /^[가-힣A-Za-z]\)\s/.test(t); }
function endsComplete(t){ return /[.!?:;)"'”』】\]]$/.test(t) || /(함|음|임|됨|한다|된다|없다|있다|같다|위함|경우)\.?$/.test(t); }
/* 원문에서 마침표 없이 줄바꿈된 문장을 한 문장으로 병합 */
function mergeWrapped(rawLines){
  const out=[];
  rawLines.forEach(raw=>{
    const t=(raw||"").trim();
    if(!t){ out.push(""); return; }
    const prev = out.length? out[out.length-1] : null;
    const prevT = prev? prev.trim() : "";
    const canMerge = prevT && !isItemStart(t) && !isMajor(prevT) && !isSub(prevT) && !prevT.includes(" | ") && !/^\[.+\]$/.test(prevT) && !endsComplete(prevT);
    if(canMerge){ out[out.length-1] = prevT + " " + t; }
    else out.push(t);
  });
  return out;
}
function parseDoc(content){
  const lines=mergeWrapped((content||"").split("\n"));
  const sections=[]; let cur={name:"머리말",anchor:"sec_head",lines:[],major:false}; sections.push(cur);
  const toc=[];
  lines.forEach((raw,idx)=>{
    const t=raw.trim(); if(!t){cur.lines.push({t:"",anchor:null});return;}
    if(isMajor(t)){ cur={name:t.replace(/^【|】$/g,""),anchor:"sec_"+idx,lines:[],major:true}; sections.push(cur); toc.push({level:1,text:cur.name,anchor:cur.anchor}); }
    else{ const sub=isSub(t); const a=sub?("h_"+idx):null; if(sub) toc.push({level:2,text:t,anchor:a}); cur.lines.push({t,anchor:a}); }
  });
  return {sections:sections.filter(s=>s.major||s.lines.some(l=>l.t)),toc};
}
function renderLines(lines,term){
  let html="";
  lines.forEach(L=>{
    const t=L.t; if(!t){html+='<div class="v-sp"></div>';return;}
    let cls="v-p"; let inner;
    if(isSub(t)) cls="v-h3";
    else if(/^\d+\)\s/.test(t)) cls="v-i1";
    else if(/^\(\d+\)/.test(t)||/^[①-⑳]/.test(t)) cls="v-i2";
    else if(/^[-*·▪]\s?/.test(t)) cls="v-bul";
    else if(/^\[.+\]/.test(t)) cls="v-label";
    if(t.includes(" | ")){ cls="v-row"; inner=t.split(" | ").map(c=>'<span>'+hi(c,term)+'</span>').join(""); }
    else inner=hi(t,term);
    const id=L.anchor?` id="${L.anchor}"`:"";
    const star=L.anchor?`<button class="v-star no-print" title="즐겨찾기" onclick="toggleBookmark('${DB._viewerDoc}','${L.anchor}',this)">${isBookmarked(DB._viewerDoc,L.anchor)?'★':'☆'}</button>`:"";
    html+=`<div class="${cls}"${id}>${inner}${cls==='v-h3'?star:''}</div>`;
  });
  return html;
}
function isBookmarked(docId,anchor){ return DB.bookmarks.some(b=>b.docId===docId&&b.anchor===anchor&&(!b.user||b.user===curUser())); }
function toggleBookmark(docId,anchor,btn){
  const i=DB.bookmarks.findIndex(b=>b.docId===docId&&b.anchor===anchor&&(!b.user||b.user===curUser()));
  if(i>=0){ DB.bookmarks.splice(i,1); if(btn)btn.textContent='☆'; }
  else{
    // find heading text
    const el=document.getElementById(anchor); const name=el?el.textContent.replace(/[★☆]$/,'').trim():anchor;
    DB.bookmarks.push({docId,anchor,name,user:curUser(),at:nowTs()}); if(btn)btn.textContent='★';
    logAudit("즐겨찾기 추가",name);
  }
  save();
  if(currentView==="viewer") renderViewer();
}
function setViewerDoc(id){
  DB._viewerDoc=id; _vwrSearch=""; _vwrScopeAll=false; _vwrEdit=false; _vwrSecEdit=null;
  DB.recent=[{docId:id,at:nowTs()}].concat((DB.recent||[]).filter(r=>r.docId!==id)).slice(0,8);

  return `

    .vwr-wrap{display:grid;grid-template-columns:270px 1fr;gap:16px;align-items:start}
    .vwr-toc{position:sticky;top:78px;max-height:calc(100vh - 100px);overflow:auto;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px}

function fchart(nodes){
  let h='<div class="fc">'; let prevMain=false;
  nodes.forEach(n=>{
    if(n.t==='branch'){
      const k=n.kind||'warn';
      h+=`<div class="fc-branch fc-${k}"><span class="fc-bl">↳ ${esc(n.cond)}</span> ${esc(n.x)}</div>`;
    }else{
      if(prevMain) h+='<div class="fc-arrow">▼</div>';
      const cls=n.t==='start'?'fc-start':n.t==='end'?'fc-end':n.t==='dec'?'fc-dec':'fc-step';
      h+=`<div class="fc-node ${cls}">${n.t==='dec'?'◆ ':''}${esc(n.x)}</div>`; prevMain=true;
    }
  });
  return h+'</div>';
}

/* custom visual parsing */
function parseFlow(text){
  const nodes=[];
  (text||"").split("\n").forEach(raw=>{
    const line=raw.trim(); if(!line) return;
    let m;
    if(/^시작\s*[:：]/.test(line)) nodes.push({t:"start",x:line.replace(/^시작\s*[:：]/,"").trim()});
    else if(/^종료\s*[:：]/.test(line)) nodes.push({t:"end",x:line.replace(/^종료\s*[:：]/,"").trim()});
    else if(/^판단\s*[:：]/.test(line)) nodes.push({t:"dec",x:line.replace(/^판단\s*[:：]/,"").trim()});
    else if((m=line.match(/^분기\s*(통과|주의|위반)\s*(.*)$/))){
      const kind=m[1]==="통과"?"ok":m[1]==="위반"?"alert":"warn";
      const rest=m[2]; const ci=rest.search(/[:：]/);
      const cond= ci>=0?rest.slice(0,ci).trim():m[1]; const x= ci>=0?rest.slice(ci+1).trim():rest.trim();
      nodes.push({t:"branch",kind,cond:cond||m[1],x});
    }
    else if(/^단계\s*[:：]/.test(line)) nodes.push({t:"step",x:line.replace(/^단계\s*[:：]/,"").trim()});
    else nodes.push({t:"step",x:line});
  });
  return nodes;
}
function parseTableText(text){
  const lines=(text||"").split("\n").map(l=>l.trim()).filter(Boolean);
  if(lines.length<1) return null;
  const rows=lines.map(l=>l.split("|").map(c=>c.trim()));
  const headers=rows.shift();
  if(!rows.length) return null;
  return vtable(headers,rows);
}

  const FLOW_HELP="시작: 매회 QC 시행\n단계: 관리물질 측정\n판단: 규칙 위반?\n분기 위반 위반 시: 검사 중지·원인분석\n분기 통과 통과: 환자검사 진행\n종료: 결과 보고";
  const TBL_HELP="항목 | 기준\n혈액·체액 검체 | 48시간\n슬라이드 | 7일";
  openModal(id?"순서도·표 편집":"순서도·표 추가",`
    <div class="two"><div class="field"><label>제목</label><input id="cvTitle" value="${cv?esc(cv.title):''}" placeholder="예: 응급 혈액 부적합 처리 흐름"></div>
    <div class="field"><label>분류</label><input id="cvCat" value="${cv?esc(cv.cat||''):''}" placeholder="예: 검사전단계"></div></div>
    <div class="field"><label>근거/설명</label><input id="cvBasis" value="${cv?esc(cv.basis||''):''}" placeholder="예: 사내 절차서 P-03"></div>
    <div class="field"><label>순서도 (한 줄에 한 단계)</label>
      <textarea id="cvFlow" style="min-height:150px;font-family:monospace;font-size:12px" placeholder="${esc(FLOW_HELP)}">${cv?esc(cv.flowText||''):''}</textarea>
      <div class="hint">시작: · 단계: · 판단: · 종료: / 분기 통과|주의|위반 라벨: 내용 &nbsp;(예: <code>분기 위반 위반 시: 검사 중지</code>)</div></div>
    <div class="field"><label>표 (첫 줄=머리글, 이후 각 줄=행, 셀은 | 로 구분)</label>
      <textarea id="cvTbl" style="min-height:90px;font-family:monospace;font-size:12px" placeholder="${esc(TBL_HELP)}">${cv?esc(cv.tableText||''):''}</textarea></div>
    <div class="hint">순서도·표 중 하나만 입력해도 됩니다. 실시간 미리보기는 저장 후 카드에서 확인하세요.</div>
  `,`<button class="btn pri" onclick="saveVisual('${id||''}')">저장</button><button class="btn" onclick="closeModal()">취소</button>`);
}
function saveVisual(id){
  const g=x=>document.getElementById(x).value;
  const title=g("cvTitle").trim(); if(!title){alert("제목을 입력하세요.");return;}
  const obj={title,cat:g("cvCat").trim(),basis:g("cvBasis").trim(),flowText:g("cvFlow"),tableText:g("cvTbl")};
  if(id){ const cv=DB.customVisuals.find(v=>v.id===id); Object.assign(cv,obj); logAudit("시각자료 수정",title); }
  else{ obj.id="cv_"+Math.random().toString(36).slice(2,7); DB.customVisuals.push(obj); logAudit("시각자료 추가",title); }
  save(); closeModal(); render(); setTimeout(()=>scrollVis(id||DB.customVisuals[DB.customVisuals.length-1].id),200);
}
function deleteVisual(id){ if(confirm("이 사용자 추가 자료를 삭제할까요?")){ DB.customVisuals=DB.customVisuals.filter(v=>v.id!==id); logAudit("시각자료 삭제",id); save(); render(); } }

function progOf(id){return PROGRAMS.find(p=>p.id===id);}
function progDone(pid,uid){return DB.progress.some(p=>p.program===pid&&p.user===(uid||curUser()));}

    const done=progDone(p.id);

      </div>
      <p class="muted" style="font-size:12.7px;margin:10px 0 12px">${esc(p.desc)}</p>

        ${canReview()?`<button class="btn sm" onclick="manageQuiz('${p.id}')">문항 관리 (${getQuiz(p.id).length})</button>`:''}
